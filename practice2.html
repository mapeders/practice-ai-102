  {"id": 302, "topic": "natural-language", "category": "test1", "type": "mc_multi", "question": "You are preparing to deploy a disconnected Azure AI Language container on-premises. Which TWO requirements MUST you satisfy before the container will start serving requests offline? (Choose two.)", "options": [{"id": "A", "text": "Purchase a commitment tier (commitment plan) for the specific Azure AI service."}, {"id": "B", "text": "Run the container with the EULA, Billing, and ApiKey environment variables at first launch while it is still connected, so it can download a license file."}, {"id": "C", "text": "Open outbound TCP 443 to the public Azure endpoint for the lifetime of the container."}, {"id": "D", "text": "Deploy the container exclusively to Azure Kubernetes Service; disconnected containers cannot run on a generic Docker host."}], "correct": ["A", "B"], "explanation": "Disconnected containers require both (A) a commitment tier purchase and (B) an initial connected run to download the license file using EULA, Billing, and ApiKey environment variables. Once licensed, the container runs offline for the duration of the commitment. Outbound internet (C) is explicitly NOT required after activation — that is the whole point of disconnected containers. They run on any standards-compliant Docker host (D); AKS is not mandatory.", "source": {"path": "Azure AI Services containers documentation", "module": "Use Azure AI services containers", "unit": "Disconnected containers", "url": "https://learn.microsoft.com/azure/cognitive-services/containers/disconnected-containers"}},
  {"id": 303, "topic": "natural-language", "category": "test1", "type": "mc_multi", "question": "You are configuring the Azure AI Language PII detection feature to redact resumes before they are passed to a downstream skills-matching model. The business requires removing candidate names and home addresses, but you must KEEP job titles (e.g., 'Senior Engineer') and IP addresses present in network-engineer resumes so the downstream model can use them. Which TWO PII entity categories should you include in the piiCategories filter? (Choose two.)", "options": [{"id": "A", "text": "Person"}, {"id": "B", "text": "PersonType"}, {"id": "C", "text": "Address"}, {"id": "D", "text": "IPAddress"}, {"id": "E", "text": "Organization"}], "correct": ["A", "C"], "explanation": "Person matches individual names (e.g., 'Sarah Johnson'); Address matches mailing/home addresses. PersonType matches job roles or titles like 'Engineer' or 'CEO' — including it would redact the job titles the business wants to keep. IPAddress would scrub IPs that the downstream model is supposed to consume. Organization would remove company names, which the requirement does not mention. Restrict piiCategories to exactly the entity types you want removed.", "source": {"path": "Azure AI Language documentation", "module": "Detect personally identifiable information in text", "unit": "PII entity categories", "url": "https://learn.microsoft.com/azure/cognitive-services/language-service/personally-identifiable-information/concepts/entity-categories"}},
  {"id": 304, "topic": "natural-language", "category": "test1", "type": "hotspot", "question": "A developer calls the Azure AI Language PII detection API against several short text snippets. For each snippet, identify the entity category the API will assign to the highlighted token.", "blanks": [{"id": "B1", "prompt": "In 'Contact our **Lead Data Scientist** on Tuesday', the highlighted phrase is categorized as:", "options": [{"id": "a", "text": "Person"}, {"id": "b", "text": "PersonType"}, {"id": "c", "text": "Organization"}, {"id": "d", "text": "JobTitle (not an Azure category)"}], "correct": "b"}, {"id": "B2", "prompt": "In 'Server logs from **10.20.30.40** show repeated failures', the highlighted token is categorized as:", "options": [{"id": "a", "text": "IPAddress"}, {"id": "b", "text": "PhoneNumber"}, {"id": "c", "text": "Address"}, {"id": "d", "text": "URL"}], "correct": "a"}, {"id": "B3", "prompt": "In 'Patient John Doe lives at **123 Maple Avenue, Seattle**', the highlighted phrase is categorized as:", "options": [{"id": "a", "text": "Person"}, {"id": "b", "text": "Address"}, {"id": "c", "text": "Location"}, {"id": "d", "text": "Organization"}], "correct": "b"}], "explanation": "The Azure AI Language PII categories include Person (individual names), PersonType (roles/titles like CEO, Engineer, Data Scientist), Address (mailing addresses), IPAddress, and PhoneNumber. JobTitle is not an Azure category — roles map to PersonType. Distinct mailing addresses map to Address, not the broader Location category used by NER.", "source": {"path": "Azure AI Language documentation", "module": "Detect personally identifiable information in text", "unit": "PII entity categories", "url": "https://learn.microsoft.com/azure/cognitive-services/language-service/personally-identifiable-information/concepts/entity-categories"}},
  {"id": 305, "topic": "natural-language", "category": "test1", "type": "mc_single", "question": "Your call-center transcription pipeline uses the Azure AI Speech service. After evaluation in Speech Studio, you see a high Word Error Rate (WER) driven mostly by SUBSTITUTION errors — the recognizer outputs incorrect tokens in place of valid ones. Which mitigation should you prioritize?", "options": [{"id": "A", "text": "Train a Custom Speech model with audio + human-labeled transcripts containing the in-domain product names and customer/agent names."}, {"id": "B", "text": "Increase the audio sample rate to 48 kHz on the client microphone."}, {"id": "C", "text": "Reduce background noise from people talking near the agent."}, {"id": "D", "text": "Switch to the conversation transcription scenario to handle overlapping speakers."}], "correct": ["A"], "explanation": "Substitution errors mean the model heard something but transcribed it as a different (often more common) word — typically a vocabulary gap. The fix is a Custom Speech model trained on in-domain text and audio with human-labeled transcripts so the base model learns the correct product names, customer names, and agent names. Background-noise / overlapping-speaker problems show up as INSERTION (extra words) or DELETION (missing words) errors, not substitutions. Sample-rate alone does not address vocabulary issues.", "source": {"path": "Azure AI Speech documentation", "module": "Evaluate and improve Custom Speech accuracy", "unit": "Resolve errors and improve WER", "url": "https://learn.microsoft.com/azure/cognitive-services/speech-service/how-to-custom-speech-evaluate-data?pivots=speech-studio#resolve-errors-and-improve-wer"}},
  {"id": 306, "topic": "natural-language", "category": "test1", "type": "hotspot", "question": "You evaluate a Custom Speech model in Speech Studio and analyze the per-utterance error breakdown. For each error pattern, choose the most likely root cause.", "blanks": [{"id": "B1", "prompt": "The recognizer frequently adds extra words that were not spoken. This is most likely caused by:", "options": [{"id": "a", "text": "Background voices / chatter being picked up as foreground speech"}, {"id": "b", "text": "Domain-specific product names not in the model's vocabulary"}, {"id": "c", "text": "Overlapping speakers (two people talking over each other)"}], "correct": "a"}, {"id": "B2", "prompt": "The recognizer frequently drops words that WERE spoken. This is most likely caused by:", "options": [{"id": "a", "text": "Microphone gain set too high"}, {"id": "b", "text": "Overlapping speakers"}, {"id": "c", "text": "Wrong reference transcript format"}], "correct": "b"}, {"id": "B3", "prompt": "The recognizer outputs a phonetically similar but semantically wrong word in place of the correct one (e.g., 'wave' instead of a product code 'Wavn'). This is most likely caused by:", "options": [{"id": "a", "text": "Sample rate mismatch between training and runtime audio"}, {"id": "b", "text": "Background noise"}, {"id": "c", "text": "Domain-specific terms / proper nouns missing from training data"}], "correct": "c"}], "explanation": "Insertion errors (extra words) are typically introduced by background voices being treated as foreground speech. Deletion errors (missing words) commonly arise when multiple speakers overlap and the recognizer can only follow one stream. Substitution errors arise when the base model lacks the domain vocabulary and picks the closest common-language match — the cure is more in-domain training data.", "source": {"path": "Azure AI Speech documentation", "module": "Evaluate and improve Custom Speech accuracy", "unit": "Resolve errors and improve WER", "url": "https://learn.microsoft.com/azure/cognitive-services/speech-service/how-to-custom-speech-evaluate-data?pivots=speech-studio#resolve-errors-and-improve-wer"}},
  {"id": 307, "topic": "natural-language", "category": "test1", "type": "mc_single", "question": "You train a Conversational Language Understanding (CLU) model. After evaluation, the dashboard shows precision = 0.92, recall = 0.66, and F1 = 0.77. The business priority is that EVERY time the model predicts the intent 'TransferFunds', the prediction is correct — false transfers must be avoided even if some genuine 'TransferFunds' utterances are missed. Which metric should you optimize, and what does it tell you in this scenario?", "options": [{"id": "A", "text": "Precision — the ratio of correctly predicted positives to all predicted positives; here it tells you what fraction of 'TransferFunds' predictions are actually correct."}, {"id": "B", "text": "Recall — the ratio of correctly predicted positives to all actual positives; here it tells you what fraction of real 'TransferFunds' utterances the model catches."}, {"id": "C", "text": "F1 score — the harmonic mean of precision and recall; here it tells you the balanced single-number quality of the model."}, {"id": "D", "text": "BLEU score — measures n-gram overlap; here it tells you how close the predicted intent is to the gold-label intent."}], "correct": ["A"], "explanation": "Precision = true positives / (true positives + false positives) — the share of predictions for a class that were correct. When the cost of a false positive (a wrong 'TransferFunds' prediction) is high, optimize precision. Recall measures coverage of actual positives, not correctness of predictions. F1 is a balanced summary but is the wrong metric to optimize when the business explicitly favors avoiding false positives over avoiding false negatives. BLEU is from Azure Translator and is not used by CLU.", "source": {"path": "Azure AI Language documentation", "module": "Conversational Language Understanding", "unit": "Evaluation metrics", "url": "https://learn.microsoft.com/azure/cognitive-services/language-service/conversational-language-understanding/concepts/evaluation-metrics"}},
  {"id": 308, "topic": "natural-language", "category": "test1", "type": "mc_multi", "question": "You are reviewing the per-intent confusion matrix for a Conversational Language Understanding (CLU) project. Which TWO statements about the standard evaluation metrics are correct? (Choose two.)", "options": [{"id": "A", "text": "Precision for an intent is the ratio between the correctly identified positives (true positives) and all identified positives (TP + FP)."}, {"id": "B", "text": "Recall measures the model's ability to predict actual positive classes — TP / (TP + FN)."}, {"id": "C", "text": "F1 score is the arithmetic mean of precision and recall, calculated as (precision + recall) / 2."}, {"id": "D", "text": "BLEU is a CLU evaluation metric specifically suited for measuring intent classification quality."}], "correct": ["A", "B"], "explanation": "Precision and recall are defined as in (A) and (B). F1 is the HARMONIC mean of precision and recall, 2·P·R / (P + R), not the arithmetic mean — so (C) is wrong. BLEU is from Azure Translator and is not a CLU metric; CLU reports precision, recall, and F1.", "source": {"path": "Azure AI Language documentation", "module": "Conversational Language Understanding", "unit": "Evaluation metrics", "url": "https://learn.microsoft.com/azure/cognitive-services/language-service/conversational-language-understanding/concepts/evaluation-metrics"}},
  {"id": 309, "topic": "natural-language", "category": "test1", "type": "mc_single", "question": "Your company receives customer feedback as MP3 recordings of agent-customer calls. For each recording, you need (a) the full transcript, (b) sentiment classification, and (c) a short summary of the conversation, all returned by a single Foundry service in one analyzer call. Which service should you use?", "options": [{"id": "A", "text": "Azure AI Speech in Foundry Tools (speech-to-text) followed by separate Azure AI Language calls for sentiment and summarization."}, {"id": "B", "text": "Azure Content Understanding in Foundry Tools with a multimodal analyzer schema that requests transcription, sentiment, and summary fields."}, {"id": "C", "text": "Azure AI Document Intelligence in Foundry Tools using the prebuilt-read model."}, {"id": "D", "text": "Azure AI Video Indexer with custom language model."}], "correct": ["B"], "explanation": "Azure Content Understanding is a multimodal service that processes audio, video, documents, and images and returns structured fields — including transcription, sentiment classification, and summaries — from a single analyzer call against a single schema. While option A works, it requires multiple service calls and orchestration. Document Intelligence does not handle audio. Video Indexer focuses on video assets and customization, and is not the recommended Foundry path for audio-only customer feedback analysis.", "source": {"path": "Analyze content with Azure AI Content Understanding", "module": "Analyze content with Azure AI Content Understanding", "unit": "Content Understanding in Foundry", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-content-ai/02-content-understanding"}},
  {"id": 310, "topic": "natural-language", "category": "test1", "type": "sequence", "question": "You build a customer-feedback analyzer with Azure Content Understanding to process MP3 recordings. Place the high-level workflow steps in the correct order.", "items": [{"id": "S1", "text": "Create an Azure AI services resource (or Foundry project) that exposes Content Understanding."}, {"id": "S2", "text": "Define an analyzer schema (JSON) that specifies the output fields: transcript, sentiment, summary."}, {"id": "S3", "text": "Submit the MP3 audio (via blob URL or direct upload) to the analyzer using the schema."}, {"id": "S4", "text": "Poll the operation, then read the structured JSON result (transcript + sentiment + summary fields)."}, {"id": "S5", "text": "Persist the structured output to downstream storage (Cosmos DB / Fabric / Power BI) for analysis."}], "correct_order": ["S1", "S2", "S3", "S4", "S5"], "explanation": "The Content Understanding workflow is: provision the service, author an analyzer schema that declares the fields you want, submit content (audio / image / document / video) against the schema, poll and read the structured JSON result, then forward the result to downstream storage or BI. The schema-first design is what lets a single call return transcription, sentiment, and summary in one shot.", "source": {"path": "Analyze content with Azure AI Content Understanding", "module": "Analyze content with Azure AI Content Understanding", "unit": "Content Understanding in Foundry", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-content-ai/02-content-understanding"}},
  {"id": 311, "topic": "agentic", "category": "test1", "type": "mc_single", "question": "You need to retrieve the endpoint URL for an existing Microsoft Foundry Service resource named 'mads-foundry-prod' that lives in the resource group 'ai-rg' so you can hard-code it into a deployment manifest. From the Azure CLI, which command should you run?", "options": [{"id": "A", "text": "az cognitiveservices account show --name mads-foundry-prod --resource-group ai-rg"}, {"id": "B", "text": "az cognitiveservices account show"}, {"id": "C", "text": "az cognitiveservices account list-endpoints --name mads-foundry-prod"}, {"id": "D", "text": "az resource show --resource-type Microsoft.CognitiveServices/accounts"}], "correct": ["A"], "explanation": "az cognitiveservices account show requires BOTH --name (the resource name) and --resource-group. Without those parameters (B) the command fails with a missing-required-argument error. There is no `list-endpoints` subcommand on `az cognitiveservices account` (C). `az resource show` without --name / --resource-group (D) is also incomplete. The supported command returns the endpoint, kind, location, SKU, and properties of the account.", "source": {"path": "Azure CLI reference", "module": "az cognitiveservices account", "unit": "az cognitiveservices account show", "url": "https://learn.microsoft.com/cli/azure/cognitiveservices/account?view=azure-cli-latest#az-cognitiveservices-account-show"}},
  {"id": 312, "topic": "agentic", "category": "test1", "type": "mc_multi", "question": "After running `az cognitiveservices account show --name myresource --resource-group rg1`, which TWO pieces of information appear in the JSON output that you can rely on for application configuration? (Choose two.)", "options": [{"id": "A", "text": "properties.endpoint — the base URL clients call to reach the resource."}, {"id": "B", "text": "sku.name — the pricing tier (e.g., S0, F0)."}, {"id": "C", "text": "properties.subscriptionKey — the primary subscription key value, base64-encoded."}, {"id": "D", "text": "tenantId of the requesting user's Microsoft Entra tenant."}], "correct": ["A", "B"], "explanation": "`az cognitiveservices account show` returns the endpoint URL (under properties.endpoint) and the SKU (sku.name), along with kind, location, and properties. The keys themselves are NEVER returned by `show` — use `az cognitiveservices account keys list` for that. The command does not echo the calling user's tenant ID.", "source": {"path": "Azure CLI reference", "module": "az cognitiveservices account", "unit": "az cognitiveservices account show", "url": "https://learn.microsoft.com/cli/azure/cognitiveservices/account?view=azure-cli-latest#az-cognitiveservices-account-show"}},
  {"id": 313, "topic": "agentic", "category": "test1", "type": "mc_multi", "question": "You are authoring a system message for a customer-service chat assistant deployed on a Foundry generative model. Which TWO of the following are valid, documented uses of the system message? (Choose two.)", "options": [{"id": "A", "text": "Define what the model should and should not do (its scope and guardrails)."}, {"id": "B", "text": "Describe the assistant's persona and tone (e.g., 'You are a concise, empathetic support agent')."}, {"id": "C", "text": "Detect which language the user's prompt is written in."}, {"id": "D", "text": "Override the deployment's content-safety filter levels at request time."}], "correct": ["A", "B"], "explanation": "The Azure OpenAI advanced prompt-engineering guide states that the system message is used to prime the model with context: define the assistant's personality and tone, declare what the model should and should not do, and specify the desired output format. Language detection is the job of Azure AI Language (Detect Language API) — it is NOT the system message's role. Content-safety filter levels are configured on the deployment in the portal/API; they cannot be overridden through the system message.", "source": {"path": "Azure OpenAI documentation", "module": "Advanced prompt engineering", "unit": "System message", "url": "https://learn.microsoft.com/azure/ai-services/openai/concepts/advanced-prompt-engineering?pivots=programming-language-chat-completions"}},
  {"id": 314, "topic": "agentic", "category": "test1", "type": "mc_single", "question": "Your team is iterating on the system message of a Foundry assistant that helps Norwegian users book ferry tickets. End users sometimes ask questions in English, Norwegian, or German. Which placement of language handling is correct?", "options": [{"id": "A", "text": "Add an instruction in the system message: 'Reply in the same language the user wrote in.' The model itself handles language detection and matching."}, {"id": "B", "text": "Add an instruction in the system message: 'Detect the user's language using Azure AI Language Detect Language API.' The system message will then invoke the API itself."}, {"id": "C", "text": "Configure the deployment to use the Language Detection content filter to translate the prompt before the model sees it."}, {"id": "D", "text": "Switch from chat completions to legacy completions because chat completions do not handle multilingual input."}], "correct": ["A"], "explanation": "The system message is just text — it shapes the model's behaviour but it cannot itself invoke external APIs (B). Generative Foundry models can natively reply in the user's language when instructed to do so via the system message (A). There is no 'Language Detection content filter' on Foundry deployments (C); content filters address harm categories, not translation. Chat completions handle multilingual input fine (D).", "source": {"path": "Azure OpenAI documentation", "module": "Advanced prompt engineering", "unit": "System message", "url": "https://learn.microsoft.com/azure/ai-services/openai/concepts/advanced-prompt-engineering?pivots=programming-language-chat-completions"}},
  {"id": 315, "topic": "agentic", "category": "test1", "type": "mc_multi", "question": "You are configuring a Microsoft Foundry Agent Service agent for a customer-support team. The agent must (1) call several internal REST APIs, (2) be deployable through your team's Python release pipeline, and (3) answer questions that require up-to-the-minute web data (e.g., 'is the road over Filefjell currently closed?'). Which THREE configuration choices should you make? (Choose three.)", "options": [{"id": "A", "text": "Define tools (function tools / OpenAPI tools) that expose the internal REST APIs to the agent."}, {"id": "B", "text": "Deploy the agent through Python using the Azure AI Agents SDK in your release pipeline."}, {"id": "C", "text": "Attach the Grounding with Bing Search (Bing tool) so the agent can fetch real-time web data."}, {"id": "D", "text": "Use Azure Blob Storage as the conversation-state store and disable the built-in thread/message persistence."}, {"id": "E", "text": "Configure an Azure AI Search index as the SOLE knowledge source for real-time web data."}], "correct": ["A", "B", "C"], "explanation": "Foundry Agent Service uses tools (function/OpenAPI tools) to call external APIs (A), is deployed via the Azure AI Agents SDK from Python/CI (B), and grounds on real-time web data through the Bing Search (Grounding with Bing Search) tool (C). Conversation state is handled by the built-in Threads/Messages model — you do NOT need (and should not replace it with) Blob Storage (D). Azure AI Search is for indexed internal content, not real-time web data (E).", "source": {"path": "Develop AI agents on Azure", "module": "Develop AI agents with Microsoft Foundry Agent Service", "unit": "Configure agents with tools and knowledge sources", "url": "https://learn.microsoft.com/en-us/training/modules/develop-ai-agent-azure/"}},
  {"id": 316, "topic": "agentic", "category": "test1", "type": "mc_single", "question": "You need a Foundry Agent Service agent to answer 'What is the current Brent crude spot price?' with up-to-the-minute data from public news sites. Which Foundry tool should you attach to the agent?", "options": [{"id": "A", "text": "Grounding with Bing Search (Bing tool)"}, {"id": "B", "text": "Azure AI Search tool"}, {"id": "C", "text": "File search tool over an uploaded PDF of last quarter's commodities report"}, {"id": "D", "text": "Code interpreter tool"}], "correct": ["A"], "explanation": "Grounding with Bing Search retrieves fresh web results and grounds the agent's answer in cited sources — the right choice for real-time public data. Azure AI Search (B) retrieves from a pre-built internal index — it cannot fetch current prices unless something else keeps the index live. File search (C) is bound to uploaded documents — also stale. Code interpreter (D) runs Python in a sandbox; it has no live network access.", "source": {"path": "Develop AI agents on Azure", "module": "Develop AI agents with Microsoft Foundry Agent Service", "unit": "Knowledge tools — Grounding with Bing Search", "url": "https://learn.microsoft.com/en-us/training/modules/develop-ai-agent-azure/"}},
  {"id": 317, "topic": "agentic", "category": "test1", "type": "hotspot", "question": "Match each Foundry Agent Service capability to the correct tool / mechanism.", "blanks": [{"id": "B1", "prompt": "The agent needs to call your internal '/orders/{id}/refund' REST endpoint. You should configure:", "options": [{"id": "a", "text": "An OpenAPI tool (function tool) that describes the endpoint to the agent."}, {"id": "b", "text": "A Bing Search grounding tool."}, {"id": "c", "text": "An Azure AI Search index built over /orders."}, {"id": "d", "text": "A file search tool with an uploaded OpenAPI spec."}], "correct": "a"}, {"id": "B2", "prompt": "The agent needs to remember the running conversation across multiple user turns. You should rely on:", "options": [{"id": "a", "text": "Foundry Agent Service Threads (built-in conversation state)."}, {"id": "b", "text": "An Azure Blob Storage container holding manually serialized JSON state."}, {"id": "c", "text": "Cookie storage in the front-end app, sent on every request as the agent's memory."}, {"id": "d", "text": "A Code interpreter session variable."}], "correct": "a"}, {"id": "B3", "prompt": "The agent must answer based on the company's internal HR policy PDFs. You should configure:", "options": [{"id": "a", "text": "Bing Search grounding."}, {"id": "b", "text": "Azure AI Search OR File Search tool over the HR PDFs."}, {"id": "c", "text": "A System message instruction repeating the policy text."}, {"id": "d", "text": "A function tool that returns a static HR string."}], "correct": "b"}], "explanation": "Foundry Agent Service uses tools for action (call APIs — OpenAPI/function tools), knowledge sources for grounding (Azure AI Search and File Search for internal content, Grounding with Bing Search for real-time web), and threads for conversation state. Don't reinvent thread storage with Blob/Cookies. Don't paste large internal documents into the system message — use a knowledge source so the agent retrieves only the relevant chunks.", "source": {"path": "Develop AI agents on Azure", "module": "Develop AI agents with Microsoft Foundry Agent Service", "unit": "Configure agents with tools and knowledge sources", "url": "https://learn.microsoft.com/en-us/training/modules/develop-ai-agent-azure/"}},
  {"id": 318, "topic": "agentic", "category": "test1", "type": "sequence", "question": "You are deploying a Microsoft Foundry Agent Service agent through a Python release pipeline. Place the steps in the correct order.", "items": [{"id": "S1", "text": "Create / verify a Microsoft Foundry project and a connected model deployment."}, {"id": "S2", "text": "Install azure-ai-agents (Azure AI Agents SDK) and authenticate with DefaultAzureCredential."}, {"id": "S3", "text": "Define the agent: choose a model deployment, attach tools (OpenAPI / Bing / Azure AI Search) and the system message."}, {"id": "S4", "text": "Create or open a thread, add messages, and run the agent against the thread."}, {"id": "S5", "text": "Persist the agent definition into source control and reference it from your CI/CD release pipeline."}], "correct_order": ["S1", "S2", "S3", "S4", "S5"], "explanation": "The end-to-end workflow is: provision the project + model, install/authenticate the SDK, declare the agent and its tools, run it against a thread, and finally version-control the definition for repeatable deploys. Persisting the definition AFTER you have proved the agent runs prevents storing a configuration that has not been tested.", "source": {"path": "Develop AI agents on Azure", "module": "Develop AI agents with Microsoft Foundry Agent Service", "unit": "Develop an AI agent (end-to-end)", "url": "https://learn.microsoft.com/en-us/training/modules/develop-ai-agent-azure/"}},
  {"id": 319, "topic": "computer-vision", "category": "test1", "type": "mc_single", "question": "You enable the firewall on an Azure AI Services account that backs a Custom Vision deployment. Your application is hosted on a third-party cloud (NOT in an Azure VNet). After you save the firewall settings the app starts receiving 403 'IP forbidden' errors. What should you do?", "options": [{"id": "A", "text": "Add the application server's public IP address (or CIDR range) to the firewall's IP rules."}, {"id": "B", "text": "Include the AI Services subscription key in the Authorization header of every request."}, {"id": "C", "text": "Disable the firewall on the AI Services account — firewall rules are incompatible with key-based authentication."}, {"id": "D", "text": "Move the application into the same Azure subscription as the AI Services resource."}], "correct": ["A"], "explanation": "An enabled firewall denies all network traffic except what is explicitly allowed. Because the application is hosted outside Azure, the only available allow mechanism is the IP rules list: add the application server's public IP or CIDR. Subscription keys (B) authenticate the request but do not bypass the network firewall — 403 is a network-layer block, not auth. Disabling the firewall (C) defeats the purpose of enabling it. Putting the app and AI Services resource in the same subscription (D) does not establish network connectivity between a non-Azure host and a firewalled service.", "source": {"path": "Azure AI Services documentation", "module": "Configure virtual networks for Azure AI Services", "unit": "Allow access from selected networks (IP rules)", "url": "https://learn.microsoft.com/azure/cognitive-services/cognitive-services-virtual-networks"}},
  {"id": 320, "topic": "computer-vision", "category": "test1", "type": "mc_multi", "question": "An Azure AI Services account hosts both an Azure AI Vision endpoint (called from a Function App in VNet 'vnet-app') and a Custom Vision endpoint (called from a partner data centre on the public internet, source IP 198.51.100.0/24). You enable the firewall on the AI Services account. Which TWO firewall configurations must you apply so that both clients can call the service? (Choose two.)", "options": [{"id": "A", "text": "Add a virtual-network rule that grants 'vnet-app' access (via a service endpoint or private endpoint)."}, {"id": "B", "text": "Add the IP range 198.51.100.0/24 to the firewall's IP rules."}, {"id": "C", "text": "Set the default action to Allow so all internet traffic can reach the account."}, {"id": "D", "text": "Add the AI Services subscription key to the firewall allow-list so requests carrying it bypass the network check."}], "correct": ["A", "B"], "explanation": "When the firewall is enabled, allow Azure clients through a VNet rule (service endpoint or private endpoint) (A) and allow non-Azure clients by their public source IP / CIDR (B). Setting the default action to Allow (C) means there is effectively no firewall. Subscription keys and the firewall live at different layers — keys cannot be added to firewall rules (D).", "source": {"path": "Azure AI Services documentation", "module": "Configure virtual networks for Azure AI Services", "unit": "VNet and IP rules", "url": "https://learn.microsoft.com/azure/cognitive-services/cognitive-services-virtual-networks"}},
  {"id": 321, "topic": "computer-vision", "category": "test1", "type": "mc_single", "question": "App1 uses Azure AI Face in Foundry Tools to find faces in surveillance still images. Many of the images are captured in low light and contain small, blurry, or side-view faces. App1 currently uses detection_01 and accuracy is poor. What should you change to maximize detection accuracy for these difficult images?", "options": [{"id": "A", "text": "Set the detection model to detection_03."}, {"id": "B", "text": "Change the recognition model to recognition_02."}, {"id": "C", "text": "Increase faceIdTimeToLive so face IDs stay cached longer."}, {"id": "D", "text": "Disable returnFaceAttributes to make detection faster."}], "correct": ["A"], "explanation": "detection_03 is specifically designed to improve accuracy on small, side-view, and blurry faces. The recognition model (B) governs identity matching, not face detection — switching it cannot help find faces that detection missed. faceIdTimeToLive (C) controls how long a face ID is cached after detection and has no impact on detection accuracy. Disabling face attributes (D) is a latency optimization, not an accuracy one.", "source": {"path": "Azure AI Vision documentation", "module": "Detect, analyze, and recognize faces", "unit": "Specify a face detection model", "url": "https://learn.microsoft.com/azure/cognitive-services/computer-vision/how-to/specify-detection-model"}},
  {"id": 322, "topic": "computer-vision", "category": "test1", "type": "hotspot", "question": "You are configuring an Azure AI Face client. For each scenario, choose the correct model parameter and value.", "blanks": [{"id": "B1", "prompt": "You need to maximize face detection accuracy on low-light surveillance images with small / side-view / blurry faces. Set:", "options": [{"id": "a", "text": "detectionModel = detection_03"}, {"id": "b", "text": "detectionModel = detection_01"}, {"id": "c", "text": "recognitionModel = recognition_04"}, {"id": "d", "text": "recognitionModel = recognition_02"}], "correct": "a"}, {"id": "B2", "prompt": "You need the best face recognition (identity verification) accuracy on new enrollments. Set:", "options": [{"id": "a", "text": "detectionModel = detection_03"}, {"id": "b", "text": "detectionModel = detection_01"}, {"id": "c", "text": "recognitionModel = recognition_04"}, {"id": "d", "text": "recognitionModel = recognition_02"}], "correct": "c"}], "explanation": "Detection models control how faces are found; recognition models control how face embeddings are computed for identity comparison. For difficult images (small/blur/side), use the latest detection model (detection_03). For best identity-matching accuracy on new enrollments, use the latest recognition model (recognition_04). Don't confuse the two roles — they are independent settings.", "source": {"path": "Azure AI Vision documentation", "module": "Detect, analyze, and recognize faces", "unit": "Specify a face detection model", "url": "https://learn.microsoft.com/azure/cognitive-services/computer-vision/how-to/specify-detection-model"}},
  {"id": 323, "topic": "computer-vision", "category": "test1", "type": "mc_single", "question": "A municipal parking authority wants an app that monitors a 200-space parking lot from a roof-mounted camera and reports both (a) how many spaces are empty and (b) the exact stall location of each empty space. Which Custom Vision project type should you choose?", "options": [{"id": "A", "text": "Object detection — returns labels with bounding-box coordinates for each detected object."}, {"id": "B", "text": "Image classification — assigns labels to the entire image."}, {"id": "C", "text": "Image description — returns a human-readable sentence summarising the image."}, {"id": "D", "text": "OCR (Read API) — extracts text from the image."}], "correct": ["A"], "explanation": "Object detection finds multiple instances of a target class in an image AND returns the bounding-box coordinates of each — letting you both count empty spaces and pinpoint where they are. Image classification (B) returns only labels for the whole image — it cannot localize individual stalls. Image description (C) returns prose. OCR (D) is for text extraction. When you need 'where' as well as 'what', the answer is almost always object detection.", "source": {"path": "Azure AI Custom Vision", "module": "Detect objects in images with Custom Vision", "unit": "Object detection vs image classification", "url": "https://learn.microsoft.com/azure/cognitive-services/custom-vision-service/overview"}},
  {"id": 324, "topic": "computer-vision", "category": "test1", "type": "mc_single", "question": "A new project must extract structured information from a heterogeneous content lake that includes scanned PDF contracts, JPEG product photos, MP3 customer calls, and short MP4 site-visit videos. Stakeholders want one Foundry service that handles all four content types with a unified developer experience. Which service should you choose?", "options": [{"id": "A", "text": "Azure AI Content Understanding in Foundry Tools — multimodal extraction across documents, images, audio, and video."}, {"id": "B", "text": "Azure AI Document Intelligence in Foundry Tools — for documents and forms only."}, {"id": "C", "text": "Azure AI Vision Image Analysis — for static images only."}, {"id": "D", "text": "Azure AI Speech in Foundry Tools — for audio only."}], "correct": ["A"], "explanation": "Azure AI Content Understanding is a multimodal Foundry service that processes documents, images, audio, and video through a unified analyzer + schema model. Document Intelligence covers docs/forms only, Vision Image Analysis covers static images only, and Speech covers audio only — combining them would force three separate SDKs, three sets of credentials, and three result formats. Content Understanding is purpose-built for the unified scenario.", "source": {"path": "Analyze content with Azure AI Content Understanding", "module": "Analyze content with Azure AI Content Understanding", "unit": "What is Content Understanding?", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-content-ai/02-content-understanding"}},
  {"id": 325, "topic": "computer-vision", "category": "test1", "type": "mc_multi", "question": "Which TWO statements correctly contrast Azure AI Content Understanding with Azure AI Document Intelligence? (Choose two.)", "options": [{"id": "A", "text": "Content Understanding accepts documents, images, audio, and video; Document Intelligence focuses on documents/forms."}, {"id": "B", "text": "Content Understanding uses an analyzer schema that lets you declare the output fields you want; Document Intelligence uses prebuilt or custom form models with fixed field sets per model."}, {"id": "C", "text": "Content Understanding only runs on-premises; Document Intelligence only runs in Azure."}, {"id": "D", "text": "Document Intelligence supports audio; Content Understanding does not."}], "correct": ["A", "B"], "explanation": "Content Understanding is the multimodal, schema-driven service: you author an analyzer schema declaring the fields to extract, then submit any of the supported content types (A, B). Document Intelligence operates on documents/forms with prebuilt models (read, layout, invoice, receipt, ID) or custom models, each with their own field sets. Both services run in Azure (C is wrong). Document Intelligence does NOT handle audio (D is wrong).", "source": {"path": "Analyze content with Azure AI Content Understanding", "module": "Analyze content with Azure AI Content Understanding", "unit": "Content Understanding in Foundry", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-content-ai/02-content-understanding"}},
  {"id": 326, "topic": "computer-vision", "category": "test1", "type": "sequence", "question": "You build a Custom Vision object-detection model that locates empty parking spaces in lot photos. Place the project workflow steps in the correct order.", "items": [{"id": "S1", "text": "Create a Custom Vision project and choose the Object Detection project type."}, {"id": "S2", "text": "Upload representative training images and tag each instance with a label and bounding box."}, {"id": "S3", "text": "Train an iteration and review the precision / recall / mAP metrics."}, {"id": "S4", "text": "Publish the trained iteration to a prediction resource."}, {"id": "S5", "text": "Call the prediction endpoint from the application with new images and use the returned bounding boxes."}], "correct_order": ["S1", "S2", "S3", "S4", "S5"], "explanation": "Custom Vision object detection follows the create → label → train → publish → predict pattern. Object detection requires bounding-box annotations at the labeling step (not just image-level tags); the published iteration exposes a prediction endpoint that returns bounding boxes for new images.", "source": {"path": "Azure AI Custom Vision", "module": "Detect objects in images with Custom Vision", "unit": "Build an object detection model", "url": "https://learn.microsoft.com/azure/cognitive-services/custom-vision-service/overview"}},
  {"id": 327, "topic": "genai-foundry", "category": "test1", "type": "mc_multi", "question": "Your company is deploying a generative AI customer-support assistant in Microsoft Foundry that suggests responses to user queries. You need to ensure the assistant produces outputs that are safe and free from harmful content while satisfying Responsible AI requirements. Which THREE actions should you take? (Choose three.)", "options": [{"id": "A", "text": "Conduct red team exercises to test the assistant for prompt-injection and harmful-content vulnerabilities."}, {"id": "B", "text": "Document the model's decision-making logic and limitations to support transparency and explainability."}, {"id": "C", "text": "Integrate the Microsoft Foundry Content Safety APIs (Analyze Text, Prompt Shields, Groundedness) into the request and response path."}, {"id": "D", "text": "Rely solely on a thumbs-up/thumbs-down user feedback button to flag harmful responses after they reach end users."}, {"id": "E", "text": "Train the model exclusively on synthetic data so it never sees realistic harmful prompts."}], "correct": ["A", "B", "C"], "explanation": "Microsoft Foundry's Responsible AI guidance for generative apps recommends (A) red-team exercises to surface vulnerabilities before release, (B) documenting decision-making logic to satisfy transparency/explainability principles, and (C) integrating Content Safety APIs to filter harmful content in real time. End-user feedback alone (D) is reactive (harmful output has already reached the user) and isn't sufficient on its own. Synthetic-only training (E) limits realism and doesn't address output safety at runtime.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Implement a responsible generative AI solution in Microsoft Foundry", "unit": "What is Content Safety", "url": "https://learn.microsoft.com/en-us/training/modules/responsible-content-safety/2-what-is-content-safety"}},
  {"id": 328, "topic": "genai-foundry", "category": "test1", "type": "mc_single", "question": "You are calling an Azure OpenAI DALL-E 3 image generation deployment from Python and want to maximize image fidelity and pick a portrait aspect ratio. Which option correctly configures the request parameters?\n\nresult = client.images.generate(\n    model=\"my-dalle3-deploy\",\n    prompt=\"A travel poster of the Lofoten islands at dawn\",\n    # configure fidelity and portrait resolution here\n    n=1\n)", "options": [{"id": "A", "text": "Set quality=\"hd\" and size=\"1024x1792\"."}, {"id": "B", "text": "Set output_format=\"JPEG\" and resolution=\"high\"."}, {"id": "C", "text": "Set n=4 and style=\"vivid\"."}, {"id": "D", "text": "Set dpi=300 and aspect_ratio=\"portrait\"."}], "correct": ["A"], "explanation": "The Azure OpenAI image generation reference shows that DALL-E 3 fidelity is controlled by quality (standard or hd) and resolution by size (1024x1024, 1024x1792, or 1792x1024). 1024x1792 is the portrait orientation. n only controls the number of images, and style (vivid / natural) controls visual style — neither affects fidelity or resolution. There is no resolution, dpi, or aspect_ratio parameter, and output_format is not a DALL-E 3 parameter.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Generate images with Azure OpenAI in Microsoft Foundry", "unit": "How to use Azure OpenAI image generation models", "url": "https://learn.microsoft.com/en-us/azure/ai-foundry/openai/how-to/dall-e?tabs=dalle-3"}},
  {"id": 329, "topic": "genai-foundry", "category": "test1", "type": "hotspot", "question": "You are grounding a GPT-based corporate Q&A chat application with the 'Using your data' feature in Microsoft Foundry. Your file share contains a mix of formats. Complete the design decisions.", "blanks": [{"id": "B1", "prompt": "Of the following bundles, the set that can ALL be ingested directly by 'Using your data' is [BLANK].", "options": [{"id": "a", "text": "policy.txt, faq.md, handbook.pdf, training.pptx"}, {"id": "b", "text": "policy.txt, schema.xml, archive.zip, handbook.pdf"}, {"id": "c", "text": "policy.csv, faq.json, handbook.pdf, training.pptx"}, {"id": "d", "text": "policy.rtf, faq.md, handbook.epub, training.key"}], "correct": "a"}, {"id": "B2", "prompt": "Your team also has product specs in XML and an archive of legacy docs in a ZIP file. To use those with the 'Using your data' feature, you must [BLANK].", "options": [{"id": "a", "text": "Convert the content into one of the supported formats (for example, .txt, .md, .html, .docx, .pptx, or .pdf) before uploading."}, {"id": "b", "text": "Upload the XML and ZIP files as-is — both are natively supported by 'Using your data'."}, {"id": "c", "text": "Switch the data source from Azure AI Search to Azure Cosmos DB; only Cosmos DB supports XML and ZIP."}, {"id": "d", "text": "Enable a custom 'binary-passthrough' indexer in the Foundry portal."}], "correct": "a"}], "explanation": "The 'Data formats and file types' section of the 'Using your data' documentation lists exactly six supported formats: .txt, .md, .html, .docx, .pptx, and .pdf. XML and ZIP are NOT supported — the docs explicitly state that if you're converting unsupported formats you must do so while preserving data quality (no significant data loss, no unexpected noise). There is no Cosmos DB workaround or 'binary-passthrough' indexer that bypasses the format list.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Develop a generative AI chat app with Microsoft Foundry", "unit": "Using your data with Azure OpenAI Service", "url": "https://learn.microsoft.com/azure/ai-services/openai/concepts/use-your-data?tabs=ai-search"}},
  {"id": 330, "topic": "genai-foundry", "category": "test1", "type": "mc_single", "question": "A regulator reviewing your Microsoft Foundry generative AI assistant asks how the team satisfies the Responsible AI principle of transparency. Your application already has red-team test reports and Foundry Content Safety filters configured in the pipeline. Which ADDITIONAL practice most directly addresses transparency and explainability?", "options": [{"id": "A", "text": "Document the model's decision-making logic, its known limitations, and the data it was grounded on, and make that documentation available to stakeholders."}, {"id": "B", "text": "Lower the temperature parameter to 0 so the model is fully deterministic on every request."}, {"id": "C", "text": "Enable a thumbs-up/thumbs-down feedback widget on every response and treat the aggregate signal as the transparency record."}, {"id": "D", "text": "Replace the deployed model with the most recently released Foundry model on each release cadence."}], "correct": ["A"], "explanation": "Microsoft's Responsible AI guidance places transparency and explainability alongside safety, fairness, and accountability. The recommended practice is to document the model's decision-making logic, its limitations, and the data sources used to ground it, then share that documentation with stakeholders. Lowering temperature (B) only affects determinism. User feedback widgets (C) are reactive signals and not explainability artifacts. Frequently swapping models (D) actually undermines transparency.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Plan and prepare to develop AI solutions on Azure", "unit": "Microsoft Foundry", "url": "https://learn.microsoft.com/en-us/training/modules/prepare-azure-ai-development/4-azure-ai-foundry"}},
  {"id": 331, "topic": "knowledge-mining", "category": "test1", "type": "mc_single", "question": "You are developing a Microsoft Foundry Agent Service agent that helps internal users query the company's product catalog and policy library. The catalog and policies already exist as ~30,000 documents. You need the agent to ground its answers in those documents and cite the sources. Which knowledge source should you configure on the agent?", "options": [{"id": "A", "text": "Azure AI Search — index the documents and attach the index as the agent's knowledge source."}, {"id": "B", "text": "Microsoft Bot Framework — host the agent in Bot Service so it can read documents on demand."}, {"id": "C", "text": "Azure Machine Learning — deploy a custom embedding model that loads documents at query time."}, {"id": "D", "text": "Azure Document Intelligence prebuilt-read model — call it on every user query to extract text."}], "correct": ["A"], "explanation": "Azure AI Search is the standard Foundry knowledge source for grounded answers over a corpus: build (or reuse) a vector + keyword index, then attach the index as a knowledge tool on the agent. The agent retrieves matching chunks and returns citations. Bot Framework (B) is a hosting framework; it does not index documents. Azure ML (C) deploys models, not catalog search. Document Intelligence (D) extracts text from a SINGLE document at request time — running it on the full library on every query would be both slow and costly.", "source": {"path": "Develop AI agents on Azure", "module": "Plan and prepare to develop AI solutions on Azure", "unit": "Tools and SDKs for Foundry development", "url": "https://learn.microsoft.com/en-us/training/modules/prepare-azure-ai-development/5-tools-and-sdks"}},
  {"id": 332, "topic": "knowledge-mining", "category": "test1", "type": "mc_multi", "question": "You are wiring an Azure AI Search index as a knowledge tool on a Foundry Agent Service agent. Which TWO requirements apply? (Choose two.)", "options": [{"id": "A", "text": "The Foundry project must have a connection to the Azure AI Search service (service-level connection, with a key or managed identity)."}, {"id": "B", "text": "The search index used as the knowledge source must contain a vector field (e.g., Collection(Edm.Single)) and a searchable text field."}, {"id": "C", "text": "The search service must be in the same Azure region as the Foundry project; cross-region connections are blocked."}, {"id": "D", "text": "The agent code must call the Azure AI Search REST API directly because Foundry has no built-in Azure AI Search tool."}], "correct": ["A", "B"], "explanation": "The Foundry Azure AI Search tool needs (A) a project-level connection to the search service and (B) an index that has a vector field plus searchable content fields — the tool performs vector + keyword retrieval over those. Cross-region connections (C) are permitted (latency aside). The Azure AI Search tool is a first-class built-in tool in Foundry — you do NOT have to call the REST API yourself (D).", "source": {"path": "Develop AI agents on Azure", "module": "Develop AI agents with Microsoft Foundry Agent Service", "unit": "Azure AI Search tool", "url": "https://learn.microsoft.com/en-us/azure/ai-foundry/agents/how-to/tools/azure-ai-search"}},
  {"id": 333, "topic": "knowledge-mining", "category": "test1", "type": "mc_single", "question": "You are configuring an Azure AI Search knowledge tool on a Foundry agent using the Python `azure-ai-agents` SDK. Which call pattern correctly passes the Azure AI Search tool to the agent?\n\nfrom azure.ai.agents.models import AzureAISearchTool\nai_search = AzureAISearchTool(index_connection_id=..., index_name=...)", "options": [{"id": "A", "text": "agents_client.create_agent(model=..., name=..., instructions=..., tools=ai_search.definitions, tool_resources=ai_search.resources)"}, {"id": "B", "text": "agents_client.create_agent(model=..., name=..., instructions=..., knowledge_source=ai_search)"}, {"id": "C", "text": "agents_client.create_agent(model=..., name=..., instructions=..., search_index=ai_search.index_name)"}, {"id": "D", "text": "agents_client.create_agent(model=..., name=..., instructions=..., azure_search=ai_search)"}], "correct": ["A"], "explanation": "The Azure AI Agents SDK exposes tools through the standard pair of `tools=...definitions` and `tool_resources=...resources` parameters on create_agent. The other shapes (knowledge_source=, search_index=, azure_search=) are not parameters of create_agent — they are common but incorrect guesses. The definitions describe what the tool is, and tool_resources binds the runtime configuration (index connection + name).", "source": {"path": "Develop AI agents on Azure", "module": "Develop AI agents with Microsoft Foundry Agent Service", "unit": "Azure AI Search tool — Python samples", "url": "https://learn.microsoft.com/en-us/azure/ai-foundry/agents/how-to/tools/azure-ai-search-samples"}},
  {"id": 334, "topic": "knowledge-mining", "category": "test1", "type": "mc_multi", "question": "You are using the Azure Document Intelligence prebuilt-read model to extract text from a mix of files. Which THREE file formats does prebuilt-read support? (Choose three.)", "options": [{"id": "A", "text": "PDF"}, {"id": "B", "text": "Microsoft Word (.docx)"}, {"id": "C", "text": "Microsoft Excel (.xlsx)"}, {"id": "D", "text": "Plain text (.txt)"}, {"id": "E", "text": "XML"}], "correct": ["A", "B", "C"], "explanation": "The prebuilt-read model supports PDF, Microsoft Word (.docx), Microsoft Excel (.xlsx), PowerPoint (.pptx), HTML, and image formats (JPEG/PNG/BMP/TIFF/HEIF). Plain text (.txt), JSON, and XML are NOT supported by prebuilt-read — that's a common trap on the exam.", "source": {"path": "Azure AI Document Intelligence documentation", "module": "Use Azure AI Document Intelligence", "unit": "Prebuilt-read model — supported formats", "url": "https://learn.microsoft.com/azure/applied-ai-services/form-recognizer/concept-read?view=form-recog-3.0.0"}},
  {"id": 335, "topic": "knowledge-mining", "category": "test1", "type": "hotspot", "question": "For each input file, indicate whether the Azure Document Intelligence prebuilt-read model can process it directly.", "blanks": [{"id": "B1", "prompt": "A PowerPoint deck (.pptx):", "options": [{"id": "y", "text": "Supported"}, {"id": "n", "text": "Not supported"}], "correct": "y"}, {"id": "B2", "prompt": "A TIFF scan of a paper invoice (.tif):", "options": [{"id": "y", "text": "Supported"}, {"id": "n", "text": "Not supported"}], "correct": "y"}, {"id": "B3", "prompt": "A plain-text README (.txt):", "options": [{"id": "y", "text": "Supported"}, {"id": "n", "text": "Not supported"}], "correct": "n"}, {"id": "B4", "prompt": "A JSON export of a database table (.json):", "options": [{"id": "y", "text": "Supported"}, {"id": "n", "text": "Not supported"}], "correct": "n"}], "explanation": "Prebuilt-read supports PDF, Office formats (.docx, .xlsx, .pptx), HTML, and image formats including TIFF, JPEG, PNG, BMP, and HEIF. It does NOT process .txt or .json — Document Intelligence is for documents and images, not for already-structured data formats. For .txt or .json content, read the file directly and pass it to a downstream service.", "source": {"path": "Azure AI Document Intelligence documentation", "module": "Use Azure AI Document Intelligence", "unit": "Prebuilt-read model — supported formats", "url": "https://learn.microsoft.com/azure/applied-ai-services/form-recognizer/concept-read?view=form-recog-3.0.0"}},
  {"id": 336, "topic": "knowledge-mining", "category": "test1", "type": "mc_single", "question": "You need to extract structured fields (invoice number, vendor name, line items, totals, tax) from a stack of scanned vendor invoices with minimum custom labeling effort. Which Azure Document Intelligence model should you call?", "options": [{"id": "A", "text": "prebuilt-invoice"}, {"id": "B", "text": "prebuilt-read"}, {"id": "C", "text": "prebuilt-layout"}, {"id": "D", "text": "A custom-trained extraction model with 50 labeled samples"}], "correct": ["A"], "explanation": "The prebuilt-invoice model already understands invoice-specific fields (vendor, invoice number, line items, totals, tax, dates) and returns them out of the box — no labeling needed. prebuilt-read (B) returns only text and lines. prebuilt-layout (C) returns text, tables, and selection marks but does not understand invoice fields. A custom-trained model (D) is the most labor-intensive option and is only justified when the prebuilt-invoice model does not match your forms.", "source": {"path": "Azure AI Document Intelligence documentation", "module": "Use Azure AI Document Intelligence", "unit": "Prebuilt models — invoice", "url": "https://learn.microsoft.com/azure/applied-ai-services/form-recognizer/concept-read?view=form-recog-3.0.0"}},
  {"id": 337, "topic": "plan-and-manage", "category": "test1", "type": "mc_single", "question": "You manage a Custom Question Answering (CQA) project in Azure AI Language. Active learning is on. A customer just submitted a question that is not in the knowledge base. You navigate to the active-learning suggestions pane and the new question is not listed. What should you do?", "options": [{"id": "A", "text": "Wait at least 30 minutes and re-check the active-learning suggestions pane."}, {"id": "B", "text": "Toggle active learning off and back on to force-refresh the suggestions list."}, {"id": "C", "text": "Add the question manually as a 'suggested alternate question' on a similar QnA pair."}, {"id": "D", "text": "Re-publish the project; suggestions only appear after each publish."}], "correct": ["A"], "explanation": "Active learning suggestions are not real-time — there is an approximate 30-minute delay between an unanswered question being seen and it surfacing in the suggestions pane. Microsoft accepts this delay to balance the high index-update cost against service performance. You do not need to toggle anything, add manual suggestions, or re-publish — just wait.", "source": {"path": "Azure AI Language documentation", "module": "Build a question answering solution", "unit": "Active learning", "url": "https://learn.microsoft.com/azure/cognitive-services/language-service/question-answering/tutorials/active-learning"}},
  {"id": 338, "topic": "plan-and-manage", "category": "test1", "type": "mc_multi", "question": "You are scoping the Azure resources for a Custom Question Answering chatbot and need to project monthly operational cost. Which TWO parameters most directly drive the pricing of the underlying Azure resources? (Choose two.)", "options": [{"id": "A", "text": "The required throughput (transactions per second / Search SKU)."}, {"id": "B", "text": "The size and number of knowledge bases (which determine the Azure AI Search index size and the Language resource tier)."}, {"id": "C", "text": "The number of metadata tags assigned to QnA pairs."}, {"id": "D", "text": "The number of synonyms configured in the language settings."}], "correct": ["A", "B"], "explanation": "Custom Question Answering cost is driven by the Azure AI Search resource (which depends on index size and SKU — i.e., the size/number of knowledge bases AND the required throughput) and the Azure AI Language resource pricing tier. Metadata tags and synonyms shape ranking behavior but do NOT change the pricing tier of either resource.", "source": {"path": "Azure AI Language documentation", "module": "Build a question answering solution", "unit": "Azure resources for question answering", "url": "https://learn.microsoft.com/azure/cognitive-services/language-service/question-answering/concepts/azure-resources"}},
  {"id": 339, "topic": "plan-and-manage", "category": "test1", "type": "mc_single", "question": "A Custom Question Answering chatbot needs to sustain about 10 transactions per second (TPS) during peak hours. The team is selecting the SKU for the backing Azure AI Search resource. Which SKU is the recommended starting point per the Azure resources guidance for question answering?", "options": [{"id": "A", "text": "Standard S1 (Azure AI Search)"}, {"id": "B", "text": "Free F0 (Azure AI Search)"}, {"id": "C", "text": "Basic B1 (Azure AI Search) with two replicas"}, {"id": "D", "text": "Storage Optimized L1 (Azure AI Search)"}], "correct": ["A"], "explanation": "The Custom Question Answering Azure-resources guidance recommends Standard S1 as the starting point for production workloads — it provides the throughput headroom (roughly enough for the typical chatbot TPS) and the storage to host realistic knowledge bases. Free F0 is for evaluation only and has tight limits. Basic B1 is for small workloads. Storage-Optimized L1 is for very large indexes, not the typical CQA scenario.", "source": {"path": "Azure AI Language documentation", "module": "Build a question answering solution", "unit": "Azure resources for question answering", "url": "https://learn.microsoft.com/azure/cognitive-services/language-service/question-answering/concepts/azure-resources"}},
  {"id": 340, "topic": "plan-and-manage", "category": "test1", "type": "hotspot", "question": "For each design decision in a Custom Question Answering project, choose the correct answer.", "blanks": [{"id": "B1", "prompt": "Active learning in a new CQA project is, by default:", "options": [{"id": "a", "text": "Off — you must turn it on per project."}, {"id": "b", "text": "On — turned on automatically for every new project."}, {"id": "c", "text": "Only available on the Premium SKU."}], "correct": "b"}, {"id": "B2", "prompt": "After a user submits an unanswered question, suggestions appear in the active-learning pane after approximately:", "options": [{"id": "a", "text": "30 minutes"}, {"id": "b", "text": "5 seconds (real-time)"}, {"id": "c", "text": "24 hours"}], "correct": "a"}, {"id": "B3", "prompt": "Two parameters that drive operational cost for the backing Azure resources are:", "options": [{"id": "a", "text": "Required throughput AND size/number of knowledge bases."}, {"id": "b", "text": "Number of metadata tags AND number of synonyms."}, {"id": "c", "text": "Time of day AND number of admin users."}], "correct": "a"}], "explanation": "Active learning is on by default for new CQA projects; suggestions appear after roughly a 30-minute delay (not real-time). Operational cost is driven by the throughput requirement (Search SKU) and the size/number of knowledge bases (index size). Metadata tags and synonyms affect ranking but not pricing tier.", "source": {"path": "Azure AI Language documentation", "module": "Build a question answering solution", "unit": "Active learning and Azure resources", "url": "https://learn.microsoft.com/azure/cognitive-services/language-service/question-answering/tutorials/active-learning"}},
  {"id": 341, "topic": "computer-vision", "category": "test2", "type": "mc_single", "question": "Your Custom Vision app is hosted on a third-party cloud VM (not in any Azure VNet) and calls a firewalled Azure AI Services endpoint. After turning on the firewall the client receives HTTP 403 'Forbidden by firewall' even though the API key is correct. What is the SINGLE most appropriate fix?", "options": [{"id": "A", "text": "Add the application server's public IP (or its CIDR range) to the IP rules on the Azure AI Services firewall."}, {"id": "B", "text": "Add a virtual-network rule for the Azure AI Services account that grants access to the third-party cloud."}, {"id": "C", "text": "Add the Azure AI Services subscription key as a custom 'allow' header in the firewall settings."}, {"id": "D", "text": "Switch the Custom Vision project to a public endpoint that does not require firewall configuration."}], "correct": ["A"], "explanation": "When the firewall is on, the only way an internet-hosted client (without an Azure VNet connection) can reach the service is to be allow-listed by source IP / CIDR. VNet rules (B) only cover Azure VNets — they cannot grant access to a third-party cloud. Subscription keys and firewall rules live at different layers — keys cannot be added to firewall rules (C). There is no Custom Vision option that bypasses the firewall (D).", "source": {"path": "Azure AI Services documentation", "module": "Configure virtual networks for Azure AI Services", "unit": "Allow access from selected networks (IP rules)", "url": "https://learn.microsoft.com/azure/cognitive-services/cognitive-services-virtual-networks"}},
  {"id": 342, "topic": "computer-vision", "category": "test2", "type": "mc_multi", "question": "An Azure AI Services account is shared by (1) a Python Function App in 'vnet-prod' inside Azure and (2) a partner SaaS running on AWS that calls the same endpoint from public IP 203.0.113.5. You enable the firewall on the account. Which TWO actions are required to keep both clients working? (Choose two.)", "options": [{"id": "A", "text": "Add a virtual-network rule covering 'vnet-prod' (via service endpoint or private endpoint)."}, {"id": "B", "text": "Add the IP 203.0.113.5 (or its /32) to the firewall IP rules."}, {"id": "C", "text": "Set the firewall default action to Allow so all traffic can reach the account."}, {"id": "D", "text": "Add a virtual-network rule referencing the partner's AWS VPC."}], "correct": ["A", "B"], "explanation": "Azure-side clients are allowed via a VNet rule (A); external internet clients are allowed by public IP / CIDR (B). Setting the default action to Allow (C) defeats the firewall. VNet rules cannot reference non-Azure VPCs (D) — for those, use IP rules.", "source": {"path": "Azure AI Services documentation", "module": "Configure virtual networks for Azure AI Services", "unit": "VNet and IP rules", "url": "https://learn.microsoft.com/azure/cognitive-services/cognitive-services-virtual-networks"}},
  {"id": 343, "topic": "computer-vision", "category": "test2", "type": "hotspot", "question": "For each Azure AI Services firewall scenario, choose the correct configuration approach.", "blanks": [{"id": "B1", "prompt": "A Function App in an Azure VNet must call a firewalled Azure AI Services endpoint:", "options": [{"id": "a", "text": "Add a Virtual-Network rule (service endpoint or private endpoint)."}, {"id": "b", "text": "Add the Function App's outbound public IP to the firewall IP rules."}, {"id": "c", "text": "Disable the firewall on the account."}], "correct": "a"}, {"id": "B2", "prompt": "A client running on a third-party cloud (no Azure VNet) must call the firewalled endpoint:", "options": [{"id": "a", "text": "Add a Virtual-Network rule."}, {"id": "b", "text": "Add the client's public IP / CIDR to the firewall IP rules."}, {"id": "c", "text": "Add the client's resource group as an allowed scope."}], "correct": "b"}, {"id": "B3", "prompt": "An on-prem batch job behind a corporate NAT calls the firewalled endpoint:", "options": [{"id": "a", "text": "Allow the corporate NAT's egress public IP range in the firewall IP rules."}, {"id": "b", "text": "Disable Azure AI Services authentication so the corporate proxy can call without keys."}, {"id": "c", "text": "Inline the subscription key as a query string parameter (?subscription-key=...) to bypass the firewall."}], "correct": "a"}], "explanation": "Azure-side traffic → VNet rules. External traffic (other clouds, on-prem behind NAT) → IP rules covering the actual public source IP / range. Never disable auth or bypass the firewall — those are not real options.", "source": {"path": "Azure AI Services documentation", "module": "Configure virtual networks for Azure AI Services", "unit": "VNet and IP rules", "url": "https://learn.microsoft.com/azure/cognitive-services/cognitive-services-virtual-networks"}},
  {"id": 344, "topic": "computer-vision", "category": "test2", "type": "mc_single", "question": "App1 calls the Azure AI Vision Image Analysis (Analyze Image) REST endpoint. The product manager wants the response to include BOTH (a) a human-readable description of the picture AND (b) every visible piece of text in the picture. Which value should you pass for the `features` (or `visualFeatures`) query-string parameter?", "options": [{"id": "A", "text": "features=read,caption"}, {"id": "B", "text": "features=description"}, {"id": "C", "text": "features=tags,objects"}, {"id": "D", "text": "features=color,brands"}], "correct": ["A"], "explanation": "The Image Analysis 4.0 API uses the `features` parameter (older 3.x used `visualFeatures`) and accepts a comma-separated list. To return a description AND the visible text, request `read` (OCR — visible text) AND `caption` (a natural-language description). Asking only `description` (B) returns prose but no OCR text. Tags/objects (C) and color/brands (D) do neither.", "source": {"path": "Azure AI Vision documentation", "module": "Read text in images and documents with Computer Vision", "unit": "Call the Analyze Image API", "url": "https://learn.microsoft.com/azure/cognitive-services/computer-vision/how-to/call-analyze-image?tabs=rest"}},
  {"id": 345, "topic": "computer-vision", "category": "test2", "type": "mc_multi", "question": "You are calling Azure AI Vision Image Analysis from Python and want a single call that returns captions, tags, AND all visible text (OCR). Which TWO statements are true? (Choose two.)", "options": [{"id": "A", "text": "You request multiple visual features in one call by passing a list of feature flags (e.g., VisualFeatures.READ | VisualFeatures.CAPTION | VisualFeatures.TAGS)."}, {"id": "B", "text": "`read` returns the visible text in the image; it is the modern replacement for the standalone OCR endpoint."}, {"id": "C", "text": "You must make three separate API calls — one per feature — because Image Analysis returns a single feature per call."}, {"id": "D", "text": "The `description` feature returns OCR text; the `read` feature only returns colors."}], "correct": ["A", "B"], "explanation": "Image Analysis is designed to return multiple visual features in one request (A); pass a feature list (or comma-separated query string). `read` is the OCR feature (B) and is the recommended replacement for the standalone OCR/Read endpoint for in-image text. Multiple calls (C) are not required. The `description` feature returns a caption, not OCR (D).", "source": {"path": "Azure AI Vision documentation", "module": "Read text in images and documents with Computer Vision", "unit": "Call the Analyze Image API", "url": "https://learn.microsoft.com/azure/cognitive-services/computer-vision/how-to/call-analyze-image?tabs=rest"}},
  {"id": 346, "topic": "computer-vision", "category": "test2", "type": "mc_single", "question": "You receive an Image Analysis response payload. Which JSON path holds the OCR text recognized in the image?", "options": [{"id": "A", "text": "readResult.blocks[].lines[].text  (under the read feature)"}, {"id": "B", "text": "captionResult.text  (the model's natural-language caption)"}, {"id": "C", "text": "tagsResult.values[].name  (the descriptive tags)"}, {"id": "D", "text": "smartCropsResult.values[].boundingBox"}], "correct": ["A"], "explanation": "The Read feature returns OCR text under `readResult` → `blocks` → `lines` → `text`. `captionResult.text` is the natural-language caption, not OCR. Tags are descriptive labels. SmartCrops returns crop bounding boxes. If you need 'the visible text', look at the `read` / `readResult` output.", "source": {"path": "Azure AI Vision documentation", "module": "Read text in images and documents with Computer Vision", "unit": "Call the Analyze Image API", "url": "https://learn.microsoft.com/azure/cognitive-services/computer-vision/how-to/call-analyze-image?tabs=rest"}},
  {"id": 347, "topic": "computer-vision", "category": "test2", "type": "mc_single", "question": "You are building a real-time retail-store app that must detect when PEOPLE enter, exit, and dwell inside zones defined on a live video feed from ceiling-mounted cameras. Which Azure Vision feature should you use?", "options": [{"id": "A", "text": "Spatial Analysis — real-time analysis of streaming video to count people and detect movement across configurable zones."}, {"id": "B", "text": "Image Analysis — extract tags, captions, objects, OCR text, and colors from STILL images."}, {"id": "C", "text": "Custom Vision (image classification) — assigns labels to whole images."}, {"id": "D", "text": "Face API — verify and identify individual people from their face embeddings."}], "correct": ["A"], "explanation": "Spatial Analysis is purpose-built for real-time video analytics: counting people, detecting zone entry/exit, and dwell-time metrics on a live feed. Image Analysis operates on still images (B) — not the right fit for live video flow. Custom Vision classifies entire images (C). The Face API recognizes individuals (D) — not the goal here.", "source": {"path": "Azure AI Vision documentation", "module": "Analyze video", "unit": "Spatial Analysis overview", "url": "https://learn.microsoft.com/azure/cognitive-services/computer-vision/overview"}},
  {"id": 348, "topic": "computer-vision", "category": "test2", "type": "mc_multi", "question": "Which TWO Azure Vision capabilities are designed primarily for VIDEO content (as opposed to single still images)? (Choose two.)", "options": [{"id": "A", "text": "Spatial Analysis — real-time presence/movement analytics on a live video feed."}, {"id": "B", "text": "Azure AI Video Indexer — extracts insights (faces, brands, transcripts, scenes, sentiments) from uploaded video files."}, {"id": "C", "text": "Image Analysis 4.0 — multi-feature analysis on still JPEG/PNG images."}, {"id": "D", "text": "Custom Vision Image Classification — apply one or more labels to a single image."}], "correct": ["A", "B"], "explanation": "Spatial Analysis (A) runs on live video streams; Azure AI Video Indexer (B) processes video files into structured insights. Image Analysis (C) and Custom Vision classification (D) both operate on still images, not video.", "source": {"path": "Azure AI Vision documentation", "module": "Analyze video", "unit": "Vision capabilities for video", "url": "https://learn.microsoft.com/azure/cognitive-services/computer-vision/overview"}},
  {"id": 349, "topic": "computer-vision", "category": "test2", "type": "hotspot", "question": "Match each scenario to the correct Azure Vision capability.", "blanks": [{"id": "B1", "prompt": "Real-time count of customers entering a store zone via a ceiling camera:", "options": [{"id": "a", "text": "Spatial Analysis"}, {"id": "b", "text": "Image Analysis"}, {"id": "c", "text": "OCR / Read API"}], "correct": "a"}, {"id": "B2", "prompt": "Generate a transcript and a list of speakers in a recorded meeting video:", "options": [{"id": "a", "text": "Azure AI Video Indexer"}, {"id": "b", "text": "Spatial Analysis"}, {"id": "c", "text": "Custom Vision object detection"}], "correct": "a"}, {"id": "B3", "prompt": "Extract caption, tags, and visible text in a single call on a JPEG product photo:", "options": [{"id": "a", "text": "Spatial Analysis"}, {"id": "b", "text": "Image Analysis 4.0 (features=caption,tags,read)"}, {"id": "c", "text": "Face API"}], "correct": "b"}], "explanation": "Live video → Spatial Analysis. Recorded video files → Video Indexer (transcript/speakers/insights). Still images → Image Analysis with a feature list. Picking the wrong service forces you to stitch multiple calls together unnecessarily.", "source": {"path": "Azure AI Vision documentation", "module": "Analyze video", "unit": "Vision capabilities overview", "url": "https://learn.microsoft.com/azure/cognitive-services/computer-vision/overview"}},
  {"id": 350, "topic": "computer-vision", "category": "test2", "type": "mc_multi", "question": "You are training a CUSTOM LANGUAGE MODEL in Azure AI Video Indexer to improve transcription of domain-specific terms (drug names, product codes). Which TWO authoring rules MUST you follow for the training corpus? (Choose two.)", "options": [{"id": "A", "text": "Put only one sentence per line in the training file."}, {"id": "B", "text": "Include multiple example sentences for each new term so the model sees them in context."}, {"id": "C", "text": "Include uncommon special characters (~, #, @, %, &) so the model learns to handle symbol-heavy text."}, {"id": "D", "text": "Concatenate every sentence onto a single line to maximize context per training example."}], "correct": ["A", "B"], "explanation": "Video Indexer custom-language-model training requires one sentence per line (A) and multiple example sentences for each new term (B). Uncommon special characters (~, #, @, %, &) are explicitly discarded along with the sentences they appear in (C is wrong). Putting all text on a single line (D) breaks the per-sentence parsing.", "source": {"path": "Azure AI Video Indexer documentation", "module": "Analyze video", "unit": "Customize a language model", "url": "https://learn.microsoft.com/azure/azure-video-indexer/customize-language-model-overview"}},
  {"id": 351, "topic": "computer-vision", "category": "test2", "type": "mc_single", "question": "You are reviewing the training file for a Video Indexer custom language model. Each line currently begins with a stock ticker symbol and a few words, e.g., 'AAPL: Apple announced Q3 results.' What will happen to these sentences during training?", "options": [{"id": "A", "text": "They will be retained as-is and improve the model on the highlighted tokens."}, {"id": "B", "text": "Lines containing colons (:) are reformatted as 'speaker: utterance' pairs to enrich speaker tagging."}, {"id": "C", "text": "They will be discarded along with their uncommon symbols (~, #, @, %, &); ensure the corpus uses only standard punctuation."}, {"id": "D", "text": "They will be split on the colon and each side ingested as a separate sentence to double the training samples."}], "correct": ["C"], "explanation": "Video Indexer discards sentences containing uncommon symbols (~, # @, %, &). Standard punctuation (.,!?:;) is fine — the colon itself is not the problem, but if any line in your corpus contains the special-symbol set, that sentence is dropped. Best practice: scrub the corpus of those characters before training.", "source": {"path": "Azure AI Video Indexer documentation", "module": "Analyze video", "unit": "Customize a language model", "url": "https://learn.microsoft.com/azure/azure-video-indexer/customize-language-model-overview"}},
