  {"id": 120, "topic": "computer-vision", "type": "sequence", "question": "To identify faces in videos using the Azure Face service, what is the correct sequence of steps to create a facial recognition model?", "items": [{"id": "S1", "text": "Create a Person Group that defines the set of individuals to identify"}, {"id": "S2", "text": "Add a Person record for each individual within the Person Group"}, {"id": "S3", "text": "Add detected face images from multiple poses to each Person record"}, {"id": "S4", "text": "Train the facial recognition model"}], "correct_order": ["S1", "S2", "S3", "S4"], "explanation": "The Verify and identify faces unit describes this exact four-step sequence: first create a Person Group, then add Person records to it, then add multiple face images (in various poses) to each person, and finally train the model. The IDs of faces added this way become persisted faces that do not expire after 24 hours.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Detect, analyze, and recognize faces", "unit": "Verify and identify faces", "url": "https://learn.microsoft.com/en-us/training/modules/detect-analyze-recognize-faces/4-compare-match-detected-faces?pivots=text"}},
  {"id": 121, "topic": "computer-vision", "type": "mc_single", "question": "When training an object detection model in Azure AI Custom Vision, what is the key difference in image labeling compared to image classification?", "options": [{"id": "A", "text": "Object detection requires at least 50 images per class; classification requires only 15"}, {"id": "B", "text": "Object detection labels include a tag and a region (bounding box) for each object; classification assigns tags to the whole image"}, {"id": "C", "text": "Object detection uses multilabel tagging only; classification uses only single-label tagging"}, {"id": "D", "text": "Object detection requires you to annotate images using JSON only; classification uses the portal UI"}], "correct": ["B"], "explanation": "The Train an object detector unit states that the most significant difference is the labeling: image classification requires one or more tags that apply to the whole image, while object detection requires each label to consist of a tag and a region defining the bounding box for each object in the image.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Detect objects in images", "unit": "Train an object detector", "url": "https://learn.microsoft.com/en-us/training/modules/detect-objects-images/3-train-object-detector?pivots=text"}},
  {"id": 122, "topic": "computer-vision", "type": "mc_single", "question": "In Azure AI Custom Vision object detection, what does a bounding box with Left: 0.1, Top: 0.5, Width: 0.5, Height: 0.25 represent?", "options": [{"id": "A", "text": "A box starting at pixel (10, 50) with pixel dimensions 50 x 25"}, {"id": "B", "text": "A box whose top-left is one-tenth from the left edge and halfway down, spanning half the image width and a quarter of the image height"}, {"id": "C", "text": "A box covering 50% of the total image area starting at the top-left corner"}, {"id": "D", "text": "A box that covers the bottom-right quadrant of the image"}], "correct": ["B"], "explanation": "The Train an object detector unit explains that bounding box values are proportional relative to source image size. Left: 0.1 means one-tenth from the left edge, Top: 0.5 means halfway down, Width: 0.5 is half the image width, and Height: 0.25 is a quarter of the image height — not absolute pixel values.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Detect objects in images", "unit": "Train an object detector", "url": "https://learn.microsoft.com/en-us/training/modules/detect-objects-images/3-train-object-detector?pivots=text"}},
  {"id": 123, "topic": "computer-vision", "type": "sequence", "question": "What is the correct order of steps to train and publish an Azure AI Custom Vision image classification model using the portal?", "items": [{"id": "S1", "text": "Create an image classification project associated with a training resource"}, {"id": "S2", "text": "Upload images and assign class label tags to them"}, {"id": "S3", "text": "Train and evaluate the classification model"}, {"id": "S4", "text": "Publish the trained model iteration to a prediction resource"}], "correct_order": ["S1", "S2", "S3", "S4"], "explanation": "The Train an image classification model unit lists the portal workflow in this order: create a project, upload and tag images, train and evaluate the model, test the model, and finally publish to a prediction resource. Publishing makes the model iteration available to client applications via the prediction endpoint.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Classify images", "unit": "Train an image classification model", "url": "https://learn.microsoft.com/en-us/training/modules/classify-images/3-understand-image-classification?pivots=text"}},
  {"id": 124, "topic": "computer-vision", "type": "mc_single", "question": "A developer builds a Custom Vision image classification client application using the Python SDK. Which class should they instantiate to submit images for classification predictions?", "options": [{"id": "A", "text": "ImageAnalysisClient"}, {"id": "B", "text": "CustomVisionTrainingClient"}, {"id": "C", "text": "CustomVisionPredictionClient"}, {"id": "D", "text": "FaceClient"}], "correct": ["C"], "explanation": "The Create an image classification client application unit shows that prediction is done using the `CustomVisionPredictionClient` class, authenticated with a Prediction-key header. The `ImageAnalysisClient` is for Azure Vision image analysis, `CustomVisionTrainingClient` is for training (not prediction), and `FaceClient` is for the Face service.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Classify images", "unit": "Create an image classification client application", "url": "https://learn.microsoft.com/en-us/training/modules/classify-images/4-use-trained-image-classifier?pivots=text"}},
  {"id": 125, "topic": "computer-vision", "type": "mc_single", "question": "When provisioning Azure Vision for image analysis, which option is recommended for development teams building solutions that combine generative AI, agents, and Azure Vision?", "options": [{"id": "A", "text": "A standalone Azure Vision resource to use the free tier"}, {"id": "B", "text": "A Microsoft Foundry project with an associated hub (Foundry Tools resource)"}, {"id": "C", "text": "A standalone Foundry Tools resource without a Foundry hub"}, {"id": "D", "text": "An Azure Cognitive Services multi-service resource in a resource group"}], "correct": ["B"], "explanation": "The Provision an Azure Vision resource unit states that Microsoft Foundry projects are recommended for development of AI solutions that combine generative AI, agents, and pre-built Foundry Tools, or involve collaborative development by a team. A Foundry hub includes a Foundry Tools resource that provides Azure Vision. Standalone resources are suitable for simpler or single-service scenarios.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Analyze images", "unit": "Provision an Azure Vision resource", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-images/2-provision-computer-vision-resource?pivots=text"}},
  {"id": 126, "topic": "computer-vision", "type": "mc_single", "question": "A developer uses the Responses API to submit a local image to a multimodal model in Microsoft Foundry. How must the local image be formatted before inclusion in the prompt?", "options": [{"id": "A", "text": "As a raw binary stream in the HTTP request body"}, {"id": "B", "text": "As a Base64-encoded data URL in the format `data:image/<format>;base64,{image_data}`"}, {"id": "C", "text": "As a file path reference using the local filesystem URI scheme"}, {"id": "D", "text": "As a multipart form-data attachment"}], "correct": ["B"], "explanation": "The Develop a vision-based chat app unit shows that for the Responses API a local image must be loaded, its data encoded in Base64 format, and submitted as a URL in the format `data:image/jpeg;base64,{image_data}` (with the format replaced as appropriate). Web-based images can use their direct URL instead.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Develop a vision-enabled generative AI application", "unit": "Develop a vision-based chat app", "url": "https://learn.microsoft.com/en-us/training/modules/develop-generative-ai-vision-apps/3-develop-visual-chat-app?pivots=text"}},
  {"id": 127, "topic": "computer-vision", "type": "mc_multi", "question": "A developer is building a vision-based chat application that submits images to a multimodal model. Which two API options does the Develop a vision-based chat app unit describe for submitting image-based prompts? (Choose two.)", "options": [{"id": "A", "text": "The Responses API using input_image content type"}, {"id": "B", "text": "The ChatCompletions API using image_url content type"}, {"id": "C", "text": "The Batch API using file attachments"}, {"id": "D", "text": "The Embeddings API using image vectors"}], "correct": ["A", "B"], "explanation": "The Develop a vision-based chat app unit shows code examples for both the Responses API (using `input_image` type in the input array) and the ChatCompletions API (using `image_url` type in the messages array). The Batch API and Embeddings API are not described for this scenario.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Develop a vision-enabled generative AI application", "unit": "Develop a vision-based chat app", "url": "https://learn.microsoft.com/en-us/training/modules/develop-generative-ai-vision-apps/3-develop-visual-chat-app?pivots=text"}},
  {"id": 128, "topic": "computer-vision", "type": "mc_single", "question": "Which statement best describes how image generation models such as those available in Microsoft Foundry produce their output?", "options": [{"id": "A", "text": "They search a curated catalog of stock images and return the closest match"}, {"id": "B", "text": "They retrieve images from licensed image databases using semantic similarity"}, {"id": "C", "text": "They are generative AI models that create original new images from natural language input based on their training data"}, {"id": "D", "text": "They apply style transfer to existing user-uploaded photographs"}], "correct": ["C"], "explanation": "The What are image-generation models? unit explicitly states that image generation models are not search systems for finding appropriate images; they are AI models that generate new original images based on the data on which they were trained. The images generated are original and not retrieved from any curated catalog.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Generate images with AI", "unit": "What are image-generation models?", "url": "https://learn.microsoft.com/en-us/training/modules/generate-images-azure-openai/2-what-is-dall-e?pivots=text"}},
  {"id": 129, "topic": "computer-vision", "type": "sequence", "question": "What is the correct sequence of steps for calling an image generation model using the Python SDK in Microsoft Foundry?", "items": [{"id": "S1", "text": "Instantiate the OpenAI client connected to the Foundry endpoint"}, {"id": "S2", "text": "Call client.images.generate() specifying model name, prompt, n, and size"}, {"id": "S3", "text": "Decode the returned Base64 b64_json image data"}, {"id": "S4", "text": "Write the decoded bytes to an output image file"}], "correct_order": ["S1", "S2", "S3", "S4"], "explanation": "The Create a client application that uses an image generation model unit shows the Python code calls `client.images.generate()` with parameters such as model, prompt, n, and size, receives Base64-encoded data in the `b64_json` field, decodes it with `base64.b64decode()`, and writes the resulting bytes to a file. The client must be instantiated before any API calls.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Generate images with AI", "unit": "Create a client application that uses an image generation model", "url": "https://learn.microsoft.com/en-us/training/modules/generate-images-azure-openai/4-dall-e-rest-api?pivots=text"}},
  {"id": 130, "topic": "computer-vision", "type": "hotspot", "question": "Complete the following statements about the Azure AI Custom Vision object detection workflow.\n\n**Blank 1**: In Azure AI Custom Vision, object detection labels differ from classification labels in that each label must include both a tag and a __________ defining the location of the object.\n\n**Blank 2**: After tagging an initial batch of images and training once, subsequent labeling can benefit from the __________ tool in the portal, which suggests both regions and object classes.", "blanks": [{"id": "B1", "prompt": "What additional element is required in each object detection label beyond the tag?", "options": [{"id": "a", "text": "Confidence score"}, {"id": "b", "text": "Region (bounding box)"}, {"id": "c", "text": "Color mask"}, {"id": "d", "text": "Polygon outline"}], "correct": "b"}, {"id": "B2", "prompt": "Portal tool that suggests regions and object classes for subsequent labeling", "options": [{"id": "a", "text": "Auto-label"}, {"id": "b", "text": "Smart labeler"}, {"id": "c", "text": "Active learning"}, {"id": "d", "text": "Annotation assistant"}], "correct": "b"}], "explanation": "The Train an object detector unit states that object detection labels must consist of a tag and a region (bounding box) for each object, unlike classification which tags the whole image. After training on an initial batch, the smart labeler tool in the Custom Vision portal can suggest both the regions and the classes of objects for new images.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Detect objects in images", "unit": "Train an object detector", "url": "https://learn.microsoft.com/en-us/training/modules/detect-objects-images/3-train-object-detector?pivots=text"}},
  {"id": 131, "topic": "plan-and-manage", "type": "mc_single", "question": "A developer is building a new AI solution on Azure that requires generative AI chat capabilities, speech-to-text, and document intelligence features. What is the recommended approach for organizing these resources in Microsoft Foundry?", "options": [{"id": "A", "text": "Create a separate Azure resource for each AI tool (Speech, Document Intelligence, etc.) and connect them individually."}, {"id": "B", "text": "Create a Microsoft Foundry resource that hosts the project, and access all Foundry Tools through the project endpoint."}, {"id": "C", "text": "Provision an Azure Machine Learning workspace and install AI toolkits as packages."}, {"id": "D", "text": "Deploy all AI capabilities inside a single Azure Container App with custom AI libraries."}], "correct": ["B"], "explanation": "Microsoft Foundry provides a single platform for AI development where Foundry Tools (including Azure Language, Speech, Document Intelligence, etc.) are hosted in a Foundry resource. Developers access all tools through the project endpoint, making it the recommended approach for new projects rather than provisioning isolated individual resources.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Plan and prepare to develop AI solutions on Azure", "unit": "Foundry Tools", "url": "https://learn.microsoft.com/en-us/training/modules/prepare-azure-ai-development/3-azure-ai-services?pivots=text"}},
  {"id": 132, "topic": "plan-and-manage", "type": "mc_single", "question": "You need to authenticate calls to an Azure Translator Foundry resource using a multi-service (Foundry) resource key. Which additional HTTP header must you include when using the Foundry resource key specifically with Azure Translator?", "options": [{"id": "A", "text": "Authorization"}, {"id": "B", "text": "Ocp-Apim-Subscription-Key"}, {"id": "C", "text": "Ocp-Apim-Subscription-Region"}, {"id": "D", "text": "x-ms-client-request-id"}], "correct": ["C"], "explanation": "When using a Foundry (multi-service) resource key with Azure Translator, you must include the Ocp-Apim-Subscription-Region header to specify the resource region. This is a Translator-specific requirement when using the multi-service key; single-service keys for Translator do not require this header.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Azure AI services documentation", "unit": "Authentication in Foundry Tools", "url": "https://learn.microsoft.com/en-us/azure/ai-services/authentication"}},
  {"id": 133, "topic": "plan-and-manage", "type": "hotspot", "question": "Complete the following sentences about Foundry Tools authentication by selecting the correct value for each blank.", "blanks": [{"id": "B1", "prompt": "To authenticate a request using a resource key for a specific Foundry Tool, the key is passed in the _____ HTTP header.", "options": [{"id": "a", "text": "Authorization"}, {"id": "b", "text": "Ocp-Apim-Subscription-Key"}, {"id": "c", "text": "x-ms-client-request-id"}, {"id": "d", "text": "Content-Type"}], "correct": "b"}, {"id": "B2", "prompt": "An authentication token obtained from the STS token exchange endpoint is valid for _____ before expiring.", "options": [{"id": "a", "text": "5 minutes"}, {"id": "b", "text": "10 minutes"}, {"id": "c", "text": "1 hour"}, {"id": "d", "text": "24 hours"}], "correct": "b"}, {"id": "B3", "prompt": "Microsoft Entra ID authentication for Foundry Tools requires the resource to use a _____ rather than a regional endpoint.", "options": [{"id": "a", "text": "custom subdomain name"}, {"id": "b", "text": "private endpoint"}, {"id": "c", "text": "managed identity"}, {"id": "d", "text": "service tag"}], "correct": "a"}], "explanation": "Foundry Tools authentication: resource keys are passed as Ocp-Apim-Subscription-Key; access tokens from the STS endpoint are valid for exactly 10 minutes and stored in JWT format; Microsoft Entra ID authentication always requires a custom subdomain name—regional endpoints do not support Entra auth.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Azure AI services documentation", "unit": "Authentication in Foundry Tools", "url": "https://learn.microsoft.com/en-us/azure/ai-services/authentication"}},
  {"id": 134, "topic": "plan-and-manage", "type": "mc_single", "question": "An Azure Function App needs to call the Azure Vision API (a Foundry Tool) without storing credentials in application settings. The organization mandates the most secure approach. What should the developer configure?", "options": [{"id": "A", "text": "Store the API key as an environment variable in the Function App's application settings."}, {"id": "B", "text": "Hard-code the API key in the function source code and redeploy when rotating keys."}, {"id": "C", "text": "Enable a managed identity on the Function App and assign the Cognitive Services User role to it on the Foundry resource."}, {"id": "D", "text": "Generate an access token by calling the STS endpoint every 10 minutes from a separate timer function."}], "correct": ["C"], "explanation": "The most secure authentication method for Azure workloads calling Foundry Tools is to use managed identity with Microsoft Entra ID. Enabling a managed identity on the Function App and assigning it the Cognitive Services User role on the Foundry resource avoids storing any credentials in the application, and is the approach recommended in the Foundry Tools authentication documentation.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Azure AI services documentation", "unit": "Authentication in Foundry Tools", "url": "https://learn.microsoft.com/en-us/azure/ai-services/authentication"}},
  {"id": 135, "topic": "plan-and-manage", "type": "hotspot", "question": "Complete the following sentences about Foundry Tools security features by selecting the correct value for each blank.", "blanks": [{"id": "B1", "prompt": "All Foundry Tools endpoints exposed over HTTP enforce a minimum TLS version of _____ to protect data in transit.", "options": [{"id": "a", "text": "TLS 1.0"}, {"id": "b", "text": "TLS 1.1"}, {"id": "c", "text": "TLS 1.2"}, {"id": "d", "text": "SSL 3.0"}], "correct": "c"}, {"id": "B2", "prompt": "The Foundry security feature that prevents a malicious insider from exfiltrating sensitive company data by submitting sensitive URLs as API inputs is called _____.", "options": [{"id": "a", "text": "Customer Lockbox"}, {"id": "b", "text": "Virtual network rules"}, {"id": "c", "text": "Data loss prevention"}, {"id": "d", "text": "Bring your own storage (BYOS)"}], "correct": "c"}, {"id": "B3", "prompt": "Each Foundry resource has _____ API keys to enable secret rotation without service disruption.", "options": [{"id": "a", "text": "one"}, {"id": "b", "text": "two"}, {"id": "c", "text": "four"}, {"id": "d", "text": "ten"}], "correct": "b"}], "explanation": "Foundry Tools security: all endpoints enforce TLS 1.2 (optionally 1.3) for data in transit. The Data loss prevention (DLP) feature prevents insiders from submitting sensitive company URLs to Azure AI services. Each Foundry resource has two API keys specifically to support zero-downtime key rotation—switching between them avoids any disruption during a rotation.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Azure AI services documentation", "unit": "Security for Foundry Tools", "url": "https://learn.microsoft.com/en-us/azure/ai-services/security-features"}},
  {"id": 136, "topic": "plan-and-manage", "type": "mc_single", "question": "Your company stores sensitive customer data in an Azure Language (Foundry Tool) resource for longer than 48 hours. The security team requires an additional encryption layer beyond the default Azure encryption, using keys that the company controls. Which Foundry Tools security feature should you configure?", "options": [{"id": "A", "text": "Transport Layer Security (TLS) 1.3 enforcement"}, {"id": "B", "text": "Data Loss Prevention (DLP) rules"}, {"id": "C", "text": "Customer-managed keys (CMK) linked to Azure Key Vault"}, {"id": "D", "text": "Customer Lockbox access policy"}], "correct": ["C"], "explanation": "Customer-managed keys (CMK) are designed for Foundry Tools services that store customer data at rest for longer than 48 hours. By linking the service to Azure Key Vault and managing the encryption keys, organizations add an extra layer of encryption on top of the default Azure server-side encryption, giving them full control over the keys.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Azure AI services documentation", "unit": "Security for Foundry Tools", "url": "https://learn.microsoft.com/en-us/azure/ai-services/security-features"}},
  {"id": 137, "topic": "plan-and-manage", "type": "mc_single", "question": "You need to restrict which network endpoints can make API calls to a Foundry Tools resource so that only resources within your corporate virtual network can reach it. Which Foundry Tools security feature addresses this requirement?", "options": [{"id": "A", "text": "Customer Lockbox"}, {"id": "B", "text": "Virtual networks (network rules) for the Foundry resource"}, {"id": "C", "text": "Data loss prevention URI filtering"}, {"id": "D", "text": "Access token authentication via the STS endpoint"}], "correct": ["B"], "explanation": "Virtual network rules for Foundry Tools allow administrators to specify which network endpoints (IP ranges or virtual network subnets) can make API calls to the resource. The Azure service will reject calls from devices outside the configured network, providing network-level isolation for AI workloads.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Azure AI services documentation", "unit": "Security for Foundry Tools", "url": "https://learn.microsoft.com/en-us/azure/ai-services/security-features"}},
  {"id": 138, "topic": "plan-and-manage", "type": "mc_single", "question": "When creating a private endpoint for a Microsoft Foundry resource in the Azure portal, what region constraint must the private endpoint satisfy?", "options": [{"id": "A", "text": "The private endpoint must be in a different region from the Foundry resource to enable geo-redundancy."}, {"id": "B", "text": "The private endpoint must be deployed in the same region as the virtual network it connects to."}, {"id": "C", "text": "The private endpoint can be in any region as long as it is in the same subscription."}, {"id": "D", "text": "The private endpoint must be in the East US or West US region regardless of the virtual network location."}], "correct": ["B"], "explanation": "According to the Microsoft Foundry private link documentation, the private endpoint must be deployed in the same region as the virtual network. This is a hard requirement when configuring inbound network isolation for a Foundry resource using a private endpoint.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Azure AI services documentation", "unit": "How to configure network isolation for Microsoft Foundry", "url": "https://learn.microsoft.com/en-us/azure/foundry/how-to/configure-private-link"}},
  {"id": 139, "topic": "plan-and-manage", "type": "mc_single", "question": "After adding a private endpoint to a Microsoft Foundry project (with public access disabled), a developer on the corporate VPN reports they still cannot connect. From inside the virtual network, running nslookup on the Foundry endpoint hostname returns the public IP. What is the most likely cause?", "options": [{"id": "A", "text": "The private endpoint connection is still in Pending state and has not been approved."}, {"id": "B", "text": "A private DNS zone for the privatelink subdomain is missing or not linked to the virtual network."}, {"id": "C", "text": "The Foundry resource TLS version is set to 1.2 instead of 1.3."}, {"id": "D", "text": "The developer's service principal does not have the Cognitive Services User role."}], "correct": ["B"], "explanation": "When nslookup from inside the virtual network resolves to the public IP instead of the private endpoint IP, it indicates a DNS configuration problem. The private DNS zone for the privatelink subdomain must exist and be linked to the virtual network. Without this, clients inside the VNet still receive the public DNS record rather than resolving to the private endpoint IP address.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Azure AI services documentation", "unit": "How to configure network isolation for Microsoft Foundry", "url": "https://learn.microsoft.com/en-us/azure/foundry/how-to/configure-private-link"}},
  {"id": 140, "topic": "plan-and-manage", "type": "mc_single", "question": "An enterprise is deploying a network-isolated Microsoft Foundry resource with virtual network injection for their AI Agent Service. Which set of BYO (Bring Your Own) resources is required to enable Standard Agent deployment with end-to-end VNet isolation?", "options": [{"id": "A", "text": "Azure Blob Storage and Azure Key Vault"}, {"id": "B", "text": "Azure Storage, Azure AI Search, and Azure Cosmos DB"}, {"id": "C", "text": "Azure Service Bus, Azure Event Hub, and Azure Monitor"}, {"id": "D", "text": "Azure Container Registry and Azure Kubernetes Service"}], "correct": ["B"], "explanation": "When setting up Foundry with virtual network injection for end-to-end network isolation, the Standard Agent setup requires you to bring your own Azure Storage, Azure AI Search, and Azure Cosmos DB resources. All data processed by the Foundry Agent Service is stored at rest in these BYO resources, helping meet compliance and enterprise security requirements.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Azure AI services documentation", "unit": "How to configure network isolation for Microsoft Foundry", "url": "https://learn.microsoft.com/en-us/azure/foundry/how-to/configure-private-link"}},
  {"id": 141, "topic": "plan-and-manage", "type": "hotspot", "question": "Complete the following sentences about Microsoft Foundry's network isolation features by selecting the correct value for each blank.", "blanks": [{"id": "B1", "prompt": "When a private endpoint is created for a Foundry resource, Azure updates the DNS CNAME record to an alias in a subdomain with the prefix _____.", "options": [{"id": "a", "text": "privatelink"}, {"id": "b", "text": "internal"}, {"id": "c", "text": "private"}, {"id": "d", "text": "vpnlink"}], "correct": "a"}, {"id": "B2", "prompt": "For virtual network injection with the Foundry Agent Service, the delegated subnet (delegated to Microsoft.App/environments) must be _____ or larger.", "options": [{"id": "a", "text": "/29"}, {"id": "b", "text": "/28"}, {"id": "c", "text": "/27"}, {"id": "d", "text": "/24"}], "correct": "c"}, {"id": "B3", "prompt": "In the Foundry private networking model with virtual network injection, the IP address range _____ must NOT be used for the virtual network as it is reserved by Docker bridge networking.", "options": [{"id": "a", "text": "10.0.0.0/8"}, {"id": "b", "text": "172.17.0.0/16"}, {"id": "c", "text": "192.168.0.0/16"}, {"id": "d", "text": "169.254.0.0/16"}], "correct": "b"}], "explanation": "Foundry network isolation key facts: when a private endpoint is created, Azure updates the CNAME to an alias in the 'privatelink' subdomain and auto-creates a private DNS zone; the Agent Service VNet injection subnet delegated to Microsoft.App/environments must be /27 or larger; and the 172.17.0.0/16 range is reserved by Docker bridge networking and must not be used for the VNet.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Azure AI services documentation", "unit": "How to configure network isolation for Microsoft Foundry", "url": "https://learn.microsoft.com/en-us/azure/foundry/how-to/configure-private-link"}},
  {"id": 142, "topic": "plan-and-manage", "type": "mc_single", "question": "A developer is building generative AI applications in Visual Studio Code and wants to browse deployed models, test agents in integrated playgrounds, and generate integration code directly from the IDE. Which tool should they install?", "options": [{"id": "A", "text": "Azure CLI extension for VS Code"}, {"id": "B", "text": "The Foundry Toolkit extension for Visual Studio Code"}, {"id": "C", "text": "The Azure Machine Learning VS Code extension"}, {"id": "D", "text": "GitHub Copilot for Azure"}], "correct": ["B"], "explanation": "The Foundry Toolkit extension for Visual Studio Code is specifically designed for Microsoft Foundry-based generative AI development. It enables browsing project resources, deploying models, testing in integrated playgrounds, configuring agents, and generating integration code—all directly within VS Code.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Plan and prepare to develop AI solutions on Azure", "unit": "Developer tools and SDKs", "url": "https://learn.microsoft.com/en-us/training/modules/prepare-azure-ai-development/5-tools-and-sdks?pivots=text"}},
  {"id": 143, "topic": "plan-and-manage", "type": "mc_single", "question": "Microsoft's Responsible AI guidelines define six core principles for AI development. A product team realizes their AI model generates loan denial recommendations that are systematically less favorable for applicants from a specific ethnic group. Which responsible AI principle is being violated?", "options": [{"id": "A", "text": "Reliability and safety"}, {"id": "B", "text": "Transparency"}, {"id": "C", "text": "Fairness"}, {"id": "D", "text": "Accountability"}], "correct": ["C"], "explanation": "The Fairness principle requires that AI systems treat all people equitably, without bias based on gender, ethnicity, or other factors that may create an unfair advantage or disadvantage for specific groups. A model that produces systematically less favorable outcomes for a specific ethnic group violates the Fairness principle.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Plan and prepare to develop AI solutions on Azure", "unit": "Responsible AI", "url": "https://learn.microsoft.com/en-us/training/modules/prepare-azure-ai-development/6-responsible-ai?pivots=text"}},
  {"id": 144, "topic": "plan-and-manage", "type": "mc_single", "question": "Your organization's AI chatbot occasionally generates factually incorrect medical information. Users are not informed that outputs may be inaccurate, nor told what data the model was trained on. Which responsible AI principle is most directly violated?", "options": [{"id": "A", "text": "Inclusiveness"}, {"id": "B", "text": "Transparency"}, {"id": "C", "text": "Privacy and security"}, {"id": "D", "text": "Accountability"}], "correct": ["B"], "explanation": "The Transparency principle requires that AI systems be understandable: users should be made fully aware of the purpose of the system, how it works, and what limitations may be expected. Not informing users about potential inaccuracies or the factors affecting predictions directly violates this principle.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Plan and prepare to develop AI solutions on Azure", "unit": "Responsible AI", "url": "https://learn.microsoft.com/en-us/training/modules/prepare-azure-ai-development/6-responsible-ai?pivots=text"}},
  {"id": 145, "topic": "plan-and-manage", "type": "mc_single", "question": "When planning a responsible generative AI solution using the Microsoft four-stage framework, what is the correct order of the stages?", "options": [{"id": "A", "text": "Measure → Map → Mitigate → Manage"}, {"id": "B", "text": "Map → Measure → Mitigate → Manage"}, {"id": "C", "text": "Mitigate → Map → Measure → Manage"}, {"id": "D", "text": "Map → Mitigate → Measure → Manage"}], "correct": ["B"], "explanation": "Microsoft's responsible generative AI framework defines four sequential stages: (1) Map potential harms, (2) Measure the presence of those harms, (3) Mitigate the harms, and (4) Manage the solution responsibly. These stages correspond closely to the functions in the NIST AI Risk Management Framework.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Implement a responsible generative AI solution in Microsoft Foundry", "unit": "Plan a responsible generative AI solution", "url": "https://learn.microsoft.com/en-us/training/modules/responsible-ai-studio/2-plan-responsible-ai?pivots=text"}},
  {"id": 146, "topic": "plan-and-manage", "type": "mc_single", "question": "During the Map stage of responsible AI planning for a generative AI cooking assistant, your team has produced a prioritized list of potential harms. What is the NEXT step within the Map stage after prioritizing harms?", "options": [{"id": "A", "text": "Implement content filters in the safety system layer."}, {"id": "B", "text": "Test and verify the prioritized harms occur and under what conditions."}, {"id": "C", "text": "Create an incident response plan for when harms are discovered post-release."}, {"id": "D", "text": "Deploy the solution to a restricted group of beta users to gather real-world data."}], "correct": ["B"], "explanation": "Within the Map stage, after identifying and prioritizing potential harms, the next step is to test and verify that the prioritized harms actually occur (and under what conditions). This may involve red team testing and can reveal previously unidentified harms to add to the list.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Implement a responsible generative AI solution in Microsoft Foundry", "unit": "Map potential harms", "url": "https://learn.microsoft.com/en-us/training/modules/responsible-ai-studio/3-identify-harms?pivots=text"}},
  {"id": 147, "topic": "plan-and-manage", "type": "mc_single", "question": "A security engineer is conducting red team testing on a generative AI application. What is the primary purpose of red teaming in the context of responsible AI for generative AI solutions?", "options": [{"id": "A", "text": "To evaluate the response latency of the model under high load conditions."}, {"id": "B", "text": "To deliberately probe the solution for weaknesses and attempt to produce harmful outputs."}, {"id": "C", "text": "To validate the accuracy of factual responses against a ground-truth dataset."}, {"id": "D", "text": "To ensure that the model meets GDPR data residency requirements."}], "correct": ["B"], "explanation": "Red teaming for generative AI solutions involves having a team of testers deliberately probe the solution for weaknesses and attempt to produce harmful results. It is used during the Map/verification step to confirm that potential harms occur under certain conditions, building on existing cybersecurity red-teaming practices extended to content safety.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Implement a responsible generative AI solution in Microsoft Foundry", "unit": "Map potential harms", "url": "https://learn.microsoft.com/en-us/training/modules/responsible-ai-studio/3-identify-harms?pivots=text"}},
  {"id": 148, "topic": "plan-and-manage", "type": "mc_single", "question": "When measuring potential harms in a generative AI solution, what is the recommended testing approach to achieve coverage at scale after initial validation?", "options": [{"id": "A", "text": "Rely entirely on user feedback submitted through the production application."}, {"id": "B", "text": "Start with manual testing of a small prompt set, then automate testing with a larger volume of test cases, including a classification model to evaluate output."}, {"id": "C", "text": "Only run automated testing pipelines without manual review to eliminate human bias."}, {"id": "D", "text": "Perform a single comprehensive manual test before launch and skip further testing after deployment."}], "correct": ["B"], "explanation": "The Measure unit recommends starting with manual testing to validate consistency and evaluation criteria, then automating testing with a larger volume of test cases—potentially using a classification model to evaluate output. Even after automation is implemented, periodic manual testing should continue to validate new scenarios.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Implement a responsible generative AI solution in Microsoft Foundry", "unit": "Measure potential harms", "url": "https://learn.microsoft.com/en-us/training/modules/responsible-ai-studio/4-measure-harms?pivots=text"}},
  {"id": 149, "topic": "plan-and-manage", "type": "mc_single", "question": "Microsoft Foundry's content filter guardrails classify content into severity levels for five categories. Which of the following is one of the five harm categories used by Foundry guardrails content filters?", "options": [{"id": "A", "text": "Financial fraud"}, {"id": "B", "text": "Self-harm"}, {"id": "C", "text": "Political disinformation"}, {"id": "D", "text": "Intellectual property violation"}], "correct": ["B"], "explanation": "Microsoft Foundry's guardrails apply content filters that classify content into four severity levels (safe, low, medium, high) across five harm categories: hate and fairness, sexual, violence, self-harm, and task-adherence. Self-harm is one of the five named categories explicitly used by the safety system layer.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Implement a responsible generative AI solution in Microsoft Foundry", "unit": "Mitigate potential harms", "url": "https://learn.microsoft.com/en-us/training/modules/responsible-ai-studio/5-mitigate-harms?pivots=text"}},
  {"id": 150, "topic": "plan-and-manage", "type": "mc_single", "question": "At which mitigation layer in the responsible generative AI framework would you apply Retrieval Augmented Generation (RAG) to reduce the risk of factually inaccurate responses?", "options": [{"id": "A", "text": "Model layer"}, {"id": "B", "text": "Safety system layer"}, {"id": "C", "text": "System message and grounding layer"}, {"id": "D", "text": "User experience layer"}], "correct": ["C"], "explanation": "The system message and grounding layer focuses on the construction of prompts submitted to the model. RAG is applied at this layer to retrieve contextual data from trusted data sources and include it in prompts, maximizing the likelihood of relevant, non-harmful, and factually grounded output.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Implement a responsible generative AI solution in Microsoft Foundry", "unit": "Mitigate potential harms", "url": "https://learn.microsoft.com/en-us/training/modules/responsible-ai-studio/5-mitigate-harms?pivots=text"}},
  {"id": 151, "topic": "plan-and-manage", "type": "mc_single", "question": "Before releasing a responsible generative AI solution, which of the following is a key operational capability that should be implemented to handle unanticipated harmful outputs discovered post-launch?", "options": [{"id": "A", "text": "The ability to immediately block harmful system responses when they are discovered."}, {"id": "B", "text": "A plan to retrain the underlying LLM model within 24 hours of any reported incident."}, {"id": "C", "text": "Mandatory weekly red team exercises with external contractors."}, {"id": "D", "text": "Automatic deletion of all conversation logs to protect user privacy."}], "correct": ["A"], "explanation": "The Manage unit specifies that a responsible deployment plan must include the capability to immediately block harmful system responses when discovered. Additional operational capabilities include blocking specific users or IP addresses in case of misuse, incident response plans, rollback plans, and user feedback mechanisms.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Implement a responsible generative AI solution in Microsoft Foundry", "unit": "Manage a responsible generative AI solution", "url": "https://learn.microsoft.com/en-us/training/modules/responsible-ai-studio/6-operate-responsibly?pivots=text"}},
  {"id": 152, "topic": "plan-and-manage", "type": "mc_multi", "question": "When planning a responsible release of a generative AI solution in Microsoft Foundry, which TWO actions are recommended before or during the public launch? (Select two.)", "options": [{"id": "A", "text": "Conduct a phased delivery plan starting with a restricted group of users to gather feedback before wider release."}, {"id": "B", "text": "Immediately grant all users access to maximize feedback volume during the first week."}, {"id": "C", "text": "Complete prerelease compliance reviews including legal, privacy, security, and accessibility teams."}, {"id": "D", "text": "Remove all telemetry collection to avoid storing user data before privacy policies are finalized."}], "correct": ["A", "C"], "explanation": "The Manage unit recommends two key practices: completing prerelease reviews (legal, privacy, security, accessibility) before release, and devising a phased delivery plan that starts with a restricted group of users to gather feedback and identify problems before wider release. Broad immediate access undermines phased delivery; telemetry is encouraged in a privacy-compliant manner.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Implement a responsible generative AI solution in Microsoft Foundry", "unit": "Manage a responsible generative AI solution", "url": "https://learn.microsoft.com/en-us/training/modules/responsible-ai-studio/6-operate-responsibly?pivots=text"}},
  {"id": 153, "topic": "plan-and-manage", "type": "mc_multi", "question": "Which TWO Foundry Tools security features can be used together to restrict access to a Foundry resource to only authorized workloads within your corporate network? (Select two.)", "options": [{"id": "A", "text": "Virtual network rules that limit which network endpoints can call the API"}, {"id": "B", "text": "Data loss prevention (DLP) URI filtering"}, {"id": "C", "text": "Private endpoints to secure communication over a private link"}, {"id": "D", "text": "Customer Lockbox to approve Microsoft engineer access requests"}], "correct": ["A", "C"], "explanation": "Virtual network rules allow you to define which network endpoints can make API calls to the Foundry resource, while private endpoints secure the communication channel by routing traffic over a private link. Both are network-isolation security features for Foundry Tools and can be combined. DLP addresses URI-based data exfiltration, and Customer Lockbox controls Microsoft engineer access—neither restricts network access.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Azure AI services documentation", "unit": "Security for Foundry Tools", "url": "https://learn.microsoft.com/en-us/azure/ai-services/security-features"}},
  {"id": 154, "topic": "plan-and-manage", "type": "sequence", "question": "Arrange the following steps in the correct order to configure inbound network isolation for a new Microsoft Foundry resource using a private endpoint in the Azure portal.", "items": [{"id": "S1", "text": "On the Networking tab, set public network access to Disabled."}, {"id": "S2", "text": "Configure the Basics tab of the new Foundry resource."}, {"id": "S3", "text": "Add a private endpoint, selecting the same region as the virtual network."}, {"id": "S4", "text": "On the Review + create tab, review settings and select Create."}, {"id": "S5", "text": "Verify DNS resolves to the private endpoint IP from inside the virtual network."}], "correct_order": ["S2", "S1", "S3", "S4", "S5"], "explanation": "The Foundry private link documentation prescribes this sequence: configure the Basics tab first, then go to the Networking tab and disable public access, add the private endpoint selecting the correct region/VNet, complete and create the resource, and finally validate DNS resolution from inside the VNet to confirm the private IP is returned.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Azure AI services documentation", "unit": "How to configure network isolation for Microsoft Foundry", "url": "https://learn.microsoft.com/en-us/azure/foundry/how-to/configure-private-link"}},
  {"id": 155, "topic": "plan-and-manage", "type": "sequence", "question": "A developer needs to authenticate a service principal to Microsoft Entra ID so it can call Foundry Tools using token-based auth. Place the following steps in the correct order.", "items": [{"id": "S1", "text": "Assign the 'Cognitive Services User' role to the service principal scoped to the Foundry resource."}, {"id": "S2", "text": "Create the Foundry resource with a custom subdomain name."}, {"id": "S3", "text": "Register a Microsoft Entra application and create a service principal."}, {"id": "S4", "text": "Obtain a bearer token using the service principal credentials from the Entra token endpoint."}, {"id": "S5", "text": "Call the Foundry Tools API using the bearer token in the Authorization header."}], "correct_order": ["S2", "S3", "S1", "S4", "S5"], "explanation": "Entra ID authentication for Foundry Tools requires: first creating the resource with a custom subdomain (required for Entra auth), then registering an Entra application and service principal, assigning the Cognitive Services User role, obtaining a bearer token, and finally making API calls with that token in the Authorization header.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Azure AI services documentation", "unit": "Authentication in Foundry Tools", "url": "https://learn.microsoft.com/en-us/azure/ai-services/authentication"}},
  {"id": 156, "topic": "plan-and-manage", "type": "sequence", "question": "You are implementing the Measure stage of the responsible generative AI process for a customer-facing AI assistant. Place the following steps in the correct order.", "items": [{"id": "S1", "text": "Apply pre-defined criteria to evaluate and categorize the generated output by harm level."}, {"id": "S2", "text": "Prepare a diverse set of input prompts likely to elicit each documented potential harm."}, {"id": "S3", "text": "Submit the prompts to the system and retrieve the generated outputs."}, {"id": "S4", "text": "Document the measurement results and share them with stakeholders."}], "correct_order": ["S2", "S3", "S1", "S4"], "explanation": "The Measure unit defines a three-step generalized process: prepare prompts likely to elicit harms, submit those prompts and retrieve outputs, then apply pre-defined criteria to categorize the output by harm level. Results should then be documented and shared with stakeholders to track the baseline.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Implement a responsible generative AI solution in Microsoft Foundry", "unit": "Measure potential harms", "url": "https://learn.microsoft.com/en-us/training/modules/responsible-ai-studio/4-measure-harms?pivots=text"}},
  {"id": 157, "topic": "plan-and-manage", "type": "sequence", "question": "Arrange the four stages of the Microsoft responsible generative AI process in their correct sequential order.", "items": [{"id": "S1", "text": "Mitigate: Apply mitigation techniques at model, safety system, grounding, and UX layers."}, {"id": "S2", "text": "Map: Identify, prioritize, test, and document potential harms."}, {"id": "S3", "text": "Manage: Define and follow a deployment and operational readiness plan."}, {"id": "S4", "text": "Measure: Create a baseline quantifying harmful outputs in given usage scenarios."}], "correct_order": ["S2", "S4", "S1", "S3"], "explanation": "Microsoft's responsible generative AI framework follows the sequence: Map potential harms first, then Measure their presence to establish a baseline, then Mitigate the identified harms across four layers, and finally Manage the solution responsibly through deployment and operational plans.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Implement a responsible generative AI solution in Microsoft Foundry", "unit": "Plan a responsible generative AI solution", "url": "https://learn.microsoft.com/en-us/training/modules/responsible-ai-studio/2-plan-responsible-ai?pivots=text"}},
  {"id": 158, "topic": "plan-and-manage", "type": "sequence", "question": "Place the following steps in correct order to implement the Map stage of responsible AI for a new generative AI solution in Microsoft Foundry.", "items": [{"id": "S1", "text": "Prioritize identified harms based on likelihood of occurrence and severity of impact."}, {"id": "S2", "text": "Identify potential harms by reviewing model documentation and transparency notes."}, {"id": "S3", "text": "Document and share the verified harms with project stakeholders."}, {"id": "S4", "text": "Test and verify that the prioritized harms occur through red team testing."}], "correct_order": ["S2", "S1", "S4", "S3"], "explanation": "The Map stage follows four sub-steps: first identify potential harms (by reviewing docs, transparency notes, impact assessment guides), then prioritize them by likelihood and impact, then test/verify through red teaming that the harms actually occur, and finally document and share the verified harms with stakeholders.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Implement a responsible generative AI solution in Microsoft Foundry", "unit": "Map potential harms", "url": "https://learn.microsoft.com/en-us/training/modules/responsible-ai-studio/3-identify-harms?pivots=text"}},
  {"id": 159, "topic": "plan-and-manage", "type": "sequence", "question": "Arrange the following actions in the correct order to perform a zero-downtime API key rotation for a Foundry Tools resource that currently uses KEY1 in all client applications.", "items": [{"id": "S1", "text": "Regenerate KEY1 in the Azure portal."}, {"id": "S2", "text": "Update all client applications to use KEY2."}, {"id": "S3", "text": "Optionally update client applications to use the newly regenerated KEY1."}, {"id": "S4", "text": "Verify all client applications are functioning correctly with KEY2."}], "correct_order": ["S2", "S4", "S1", "S3"], "explanation": "Zero-downtime key rotation uses the two-key design: first switch all clients to KEY2 (while KEY1 is still valid), verify they work, then regenerate KEY1 safely (KEY2 is still valid during regeneration), then optionally migrate clients back to the new KEY1. This avoids any period where all clients have an invalid key.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Azure AI services documentation", "unit": "Security for Foundry Tools", "url": "https://learn.microsoft.com/en-us/azure/ai-services/security-features"}},
  {"id": 160, "topic": "plan-and-manage", "type": "hotspot", "question": "A team is implementing a responsible generative AI solution in Microsoft Foundry. Match each mitigation action to the correct layer of the four-layer mitigation framework.", "blanks": [{"id": "B1", "prompt": "Fine-tuning the foundational LLM with domain-specific training data to reduce off-topic responses belongs to the _____ layer.", "options": [{"id": "a", "text": "Model"}, {"id": "b", "text": "Safety system"}, {"id": "c", "text": "System message and grounding"}, {"id": "d", "text": "User experience"}], "correct": "a"}, {"id": "B2", "prompt": "Configuring Foundry guardrail prompt shields to detect systematic abuse of the system prompt belongs to the _____ layer.", "options": [{"id": "a", "text": "Model"}, {"id": "b", "text": "Safety system"}, {"id": "c", "text": "System message and grounding"}, {"id": "d", "text": "User experience"}], "correct": "b"}, {"id": "B3", "prompt": "Designing the UI to constrain user inputs to specific topics and applying output validation belongs to the _____ layer.", "options": [{"id": "a", "text": "Model"}, {"id": "b", "text": "Safety system"}, {"id": "c", "text": "System message and grounding"}, {"id": "d", "text": "User experience"}], "correct": "d"}], "explanation": "The four-layer mitigation framework assigns: fine-tuning to the Model layer (adapting the LLM itself), prompt shields and content filters to the Safety system layer (platform-level guardrails in Foundry), and UI input/output constraints to the User experience layer. RAG and system messages belong to the System message and grounding layer.", "source": {"path": "Plan and manage an Azure AI solution", "module": "Implement a responsible generative AI solution in Microsoft Foundry", "unit": "Mitigate potential harms", "url": "https://learn.microsoft.com/en-us/training/modules/responsible-ai-studio/5-mitigate-harms?pivots=text"}},
  {"id": 161, "topic": "computer-vision", "type": "mc_single", "question": "A developer wants to integrate Azure AI Video Indexer with their company intranet so employees can search the video library and jump to the exact timestamp where a specific word or phrase was spoken or appeared on screen. Which Video Indexer feature should the developer use to implement this deep-search capability within the web UI?", "options": [{"id": "A", "text": "The Timeline tab in the Video Indexer website, which allows text search and editing of transcripts"}, {"id": "B", "text": "The Filters option in the Video Indexer website search, which can filter by OCR text across all indexed videos"}, {"id": "C", "text": "The Open in editor option to clip specific moments by line"}, {"id": "D", "text": "The Download option to export insights JSON, then search offline"}], "correct": ["B"], "explanation": "The Azure AI Video Indexer website search bar lets you enter keywords and then use Filters to narrow results by insight type, including OCR (on-screen text). Selecting a search result brings the player to that exact moment in the video. This is the deep-search capability described in the 'Search for exact moments in videos' unit.", "source": {"path": "Azure AI Vision", "module": "Azure AI Video Indexer documentation", "unit": "Search for exact moments in videos with Azure AI Video Indexer", "url": "https://learn.microsoft.com/en-us/azure/azure-video-indexer/video-indexer-search"}},
  {"id": 162, "topic": "computer-vision", "type": "sequence", "question": "A content manager needs to upload a video from a public URL to Azure AI Video Indexer and configure advanced indexing settings. Place the following steps in the correct order as described in the upload and index workflow.", "items": [{"id": "S1", "text": "Sign in to the Video Indexer website and select Upload"}, {"id": "S2", "text": "Select Enter URL, paste the source URL, and select Add"}, {"id": "S3", "text": "Configure Privacy, Streaming quality, and Video source language on the basic settings page"}, {"id": "S4", "text": "Expand Advanced settings to choose an indexing preset and optionally select a People model or Brand category"}, {"id": "S5", "text": "Select Review + upload, review the summary, then select Upload + index"}], "correct_order": ["S1", "S2", "S3", "S4", "S5"], "explanation": "The Azure AI Video Indexer upload workflow requires: (1) signing in and selecting Upload, (2) providing the source URL, (3) configuring basic settings such as privacy and language, (4) expanding Advanced settings to choose an indexing preset and custom models, and (5) reviewing and confirming the upload. YouTube URLs are explicitly not supported; only publicly accessible direct file URLs or SAS URLs work.", "source": {"path": "Azure AI Vision", "module": "Azure AI Video Indexer documentation", "unit": "Upload and index media with Azure AI Video Indexer", "url": "https://learn.microsoft.com/en-us/azure/azure-video-indexer/upload-index-media"}},
  {"id": 163, "topic": "computer-vision", "type": "mc_single", "question": "You are uploading a video from Azure Blob Storage to Azure AI Video Indexer via a URL, but the storage account is behind a firewall. What is the correct approach to allow the upload to succeed?", "options": [{"id": "A", "text": "Disable the firewall temporarily during the upload, then re-enable it after indexing completes"}, {"id": "B", "text": "Use the Upload Video API with the useManagedIdentityToDownloadVideo=true parameter"}, {"id": "C", "text": "Generate a public access URL for the blob, bypassing the firewall entirely"}, {"id": "D", "text": "Download the video locally first and upload as a file from the browser"}], "correct": ["B"], "explanation": "When the source storage account is behind a firewall, the Azure AI Video Indexer documentation specifies that you must use the Upload Video API with the useManagedIdentityToDownloadVideo=true parameter. This allows Video Indexer to authenticate via Managed Identity to access the protected storage account.", "source": {"path": "Azure AI Vision", "module": "Azure AI Video Indexer documentation", "unit": "Upload and index media with Azure AI Video Indexer", "url": "https://learn.microsoft.com/en-us/azure/azure-video-indexer/upload-index-media"}},
  {"id": 164, "topic": "computer-vision", "type": "mc_single", "question": "Azure AI Video Indexer can run on edge devices via Azure Arc. When using Video Indexer enabled by Azure Arc with uploaded video files, which indexing preset combines both key frame detection and transcription in the same indexing run?", "options": [{"id": "A", "text": "Basic video"}, {"id": "B", "text": "Basic audio"}, {"id": "C", "text": "Basic video and audio"}, {"id": "D", "text": "Advanced indexing"}], "correct": ["C"], "explanation": "According to the Azure AI Video Indexer overview, the 'Basic video and audio' preset for Arc-enabled Video Indexer includes both key frame detection (a video model) and transcription/translation (audio models). The 'Basic video' preset only covers video models such as key frame detection, object detection, and scene detection, while 'Basic audio' covers transcription and translation only.", "source": {"path": "Azure AI Vision", "module": "Azure AI Video Indexer documentation", "unit": "What is Azure AI Video Indexer?", "url": "https://learn.microsoft.com/en-us/azure/azure-video-indexer/video-indexer-overview"}},
  {"id": 165, "topic": "computer-vision", "type": "mc_multi", "question": "A media company wants to use cloud-based Azure AI Video Indexer to detect potentially inappropriate content in their uploaded videos. Which TWO insight types should they enable to cover both visual and textual content moderation?", "options": [{"id": "A", "text": "Visual content moderation — detects adult and racy visuals in the video frames"}, {"id": "B", "text": "Textual content moderation — detects explicit text in the audio transcript"}, {"id": "C", "text": "Audio effects detection — identifies alarm sounds and crowd reactions"}, {"id": "D", "text": "Sentiment analysis — identifies positive, negative, and neutral sentiments"}, {"id": "E", "text": "Black frame detection — identifies black frames in the video"}], "correct": ["A", "B"], "explanation": "Azure AI Video Indexer provides two dedicated content moderation models: Visual content moderation (a video model that detects adult and racy visuals) and Textual content moderation (an audio model that detects explicit text in the audio transcript). Together, these cover both the visual and spoken dimensions of inappropriate content.", "source": {"path": "Azure AI Vision", "module": "Azure AI Video Indexer documentation", "unit": "What is Azure AI Video Indexer?", "url": "https://learn.microsoft.com/en-us/azure/azure-video-indexer/video-indexer-overview"}},
  {"id": 166, "topic": "computer-vision", "type": "hotspot", "question": "Complete the following statements about Azure AI Video Indexer audio analysis capabilities by selecting the correct option for each blank.\n\n**Blank 1**: Azure AI Video Indexer's speaker enumeration feature can detect up to _____ speakers in a single audio file.\n\n**Blank 2**: When uploading with the default preset, Audio effects detection detects _____ as the only audio event by default; the full set of events (alarm, dog barking, crowd reactions, etc.) requires choosing Advanced Audio Analysis.", "blanks": [{"id": "B1", "prompt": "Maximum number of speakers detectable in a single audio file", "options": [{"id": "a", "text": "8"}, {"id": "b", "text": "16"}, {"id": "c", "text": "32"}, {"id": "d", "text": "50"}], "correct": "b"}, {"id": "B2", "prompt": "Audio event detected by default with the standard preset", "options": [{"id": "a", "text": "Laughter"}, {"id": "b", "text": "Gunshot or explosion"}, {"id": "c", "text": "Silence"}, {"id": "d", "text": "Crowd reactions"}], "correct": "c"}], "explanation": "According to the Azure AI Video Indexer overview, Speaker enumeration maps speakers to their words and can detect up to 16 speakers in a single audio file. For Audio effects detection, only silence is detected by default with the standard preset; the full event set (alarm/siren, dog barking, crowd reactions, gunshot/explosion, laughter, breaking glass, silence) requires selecting Advanced Audio Analysis on upload.", "source": {"path": "Azure AI Vision", "module": "Azure AI Video Indexer documentation", "unit": "What is Azure AI Video Indexer?", "url": "https://learn.microsoft.com/en-us/azure/azure-video-indexer/video-indexer-overview"}},
  {"id": 167, "topic": "computer-vision", "type": "mc_single", "question": "A developer is reviewing the Azure AI Video Indexer documentation and notices that the 'Topic inference' model uses three ontologies to extract topics from video content. Which three ontologies does the Topic inference model use?", "options": [{"id": "A", "text": "IPTC, Wikipedia, and the Video Indexer hierarchical topic ontology"}, {"id": "B", "text": "IPTC, DBpedia, and the Azure AI topic taxonomy"}, {"id": "C", "text": "Wikipedia, Wikidata, and the OpenAI topic catalog"}, {"id": "D", "text": "IPTC, Reuters taxonomy, and the Video Indexer hierarchical topic ontology"}], "correct": ["A"], "explanation": "The Azure AI Video Indexer overview specifies that the Topic inference model uses three ontologies: IPTC, Wikipedia, and the Video Indexer hierarchical topic ontology. It extracts topics based on keywords from transcription (spoken words), OCR content (visual text), and celebrities recognized by facial recognition.", "source": {"path": "Azure AI Vision", "module": "Azure AI Video Indexer documentation", "unit": "What is Azure AI Video Indexer?", "url": "https://learn.microsoft.com/en-us/azure/azure-video-indexer/video-indexer-overview"}},
  {"id": 168, "topic": "computer-vision", "type": "mc_single", "question": "A developer is using the Azure Vision Python SDK to analyze an image and wants the response to include automatically generated alt-text describing the image contents in a single sentence. Which VisualFeatures enumeration value should they include in the analyze() call?", "options": [{"id": "A", "text": "VisualFeatures.TAGS"}, {"id": "B", "text": "VisualFeatures.DENSE_CAPTIONS"}, {"id": "C", "text": "VisualFeatures.CAPTION"}, {"id": "D", "text": "VisualFeatures.OBJECTS"}], "correct": ["C"], "explanation": "The 'Analyze an image' unit lists VisualFeatures.CAPTION as the feature that generates a caption of the image in natural language (a single description). VisualFeatures.DENSE_CAPTIONS generates more detailed captions for individual detected objects. VisualFeatures.TAGS identifies keyword tags. VisualFeatures.OBJECTS returns bounding boxes for detected objects.", "source": {"path": "Azure AI Vision", "module": "Analyze images", "unit": "Analyze an image", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-images/3-analyze-image?pivots=text"}},
  {"id": 169, "topic": "computer-vision", "type": "mc_single", "question": "A solution architect needs to choose between Azure Vision and Azure Document Intelligence for an OCR scenario. The scenario involves extracting key-value pairs from structured invoice forms and integrating that data into an accounting workflow. Which service is the better fit, and why?", "options": [{"id": "A", "text": "Azure Vision, because it supports form processing and provides prebuilt models for invoices"}, {"id": "B", "text": "Azure Document Intelligence, because it is specifically designed to extract data from forms, invoices, and structured documents with prebuilt and custom models"}, {"id": "C", "text": "Azure Vision, because its Digital Asset Management capability indexes structured document data"}, {"id": "D", "text": "Azure Content Understanding, because it is the only service that supports text extraction from PDF invoices"}], "correct": ["B"], "explanation": "The 'Explore Azure AI options for reading text' unit states that Azure Document Intelligence is specifically designed to extract text, key-value pairs, tables, and structures from documents such as forms, invoices, and receipts, and provides prebuilt models for common document types. Azure Vision is better suited for unstructured scanned documents, photographs with text, and digital asset management scenarios.", "source": {"path": "Azure AI Vision", "module": "Read text in images", "unit": "Explore Azure AI options for reading text", "url": "https://learn.microsoft.com/en-us/training/modules/read-text-images-documents-with-computer-vision-service/2-options-read-text?pivots=text"}},
  {"id": 170, "topic": "computer-vision", "type": "mc_single", "question": "An organization needs to build an Azure AI Custom Vision image classification solution. They decide to use separate resources for training and prediction so they can train in one Azure region and serve predictions from multiple regions. Which resource types do they need to provision in their Azure subscription?", "options": [{"id": "A", "text": "A single Azure AI Services multi-service resource, which handles both training and prediction"}, {"id": "B", "text": "An Azure AI Custom Vision training resource and an Azure AI Custom Vision prediction resource"}, {"id": "C", "text": "An Azure Machine Learning workspace resource and a separate Azure AI Vision resource"}, {"id": "D", "text": "An Azure AI Custom Vision training resource only; the prediction endpoint is automatically created at customvision.ai"}], "correct": ["B"], "explanation": "The 'Azure AI Custom Vision' unit explains that Custom Vision requires two separate resources: a training resource (used to train models on custom images) and a prediction resource (used to generate predictions from new images). Each has its own endpoint and authentication keys. This separation allows training in one region while deploying prediction resources in other regions.", "source": {"path": "Azure AI Vision", "module": "Classify images", "unit": "Azure AI Custom Vision", "url": "https://learn.microsoft.com/en-us/training/modules/classify-images/2-provision-azure-resources-for-custom-vision?pivots=text"}},
  {"id": 171, "topic": "computer-vision", "type": "hotspot", "question": "Complete the following statements about Azure AI Custom Vision resources and the Custom Vision portal by selecting the correct option for each blank.\n\n**Blank 1**: Python developers can install the _____ PyPI package to perform both Custom Vision training and prediction tasks.\n\n**Blank 2**: To sign in to the Azure AI Custom Vision portal, you navigate to _____.", "blanks": [{"id": "B1", "prompt": "PyPI package name for Azure AI Custom Vision (Python SDK)", "options": [{"id": "a", "text": "azure-ai-vision"}, {"id": "b", "text": "azure-cognitiveservices-vision-customvision"}, {"id": "c", "text": "azure-cognitiveservices-vision-computervision"}, {"id": "d", "text": "azure-ai-customvision-training"}], "correct": "b"}, {"id": "B2", "prompt": "URL of the Azure AI Custom Vision portal", "options": [{"id": "a", "text": "https://portal.azure.com/#blade/customvision"}, {"id": "b", "text": "https://vision.azure.com/"}, {"id": "c", "text": "https://www.customvision.ai/"}, {"id": "d", "text": "https://ai.azure.com/customvision"}], "correct": "c"}], "explanation": "The 'Azure AI Custom Vision' unit states that Python developers use the azure-cognitiveservices-vision-customvision package from PyPI for both training and prediction. The Custom Vision portal is accessed at https://www.customvision.ai/ using Azure credentials. Each project in the portal has a unique project ID used by client applications.", "source": {"path": "Azure AI Vision", "module": "Classify images", "unit": "Azure AI Custom Vision", "url": "https://learn.microsoft.com/en-us/training/modules/classify-images/2-provision-azure-resources-for-custom-vision?pivots=text"}},
  {"id": 172, "topic": "computer-vision", "type": "mc_single", "question": "A developer builds an Azure AI Custom Vision object detection client application in Python. After creating a CustomVisionPredictionClient and calling detect_image(), they iterate over results.predictions. Which property of each prediction object contains the coordinates of the detected object's location in the image?", "options": [{"id": "A", "text": "prediction.region"}, {"id": "B", "text": "prediction.bounding_box"}, {"id": "C", "text": "prediction.location"}, {"id": "D", "text": "prediction.rectangle"}], "correct": ["B"], "explanation": "According to the 'Develop an object detection client application' unit, each prediction object returned by detect_image() has a bounding_box property (with .left, .top, .height, .width sub-properties) in addition to tag_name and probability. This is the standard structure shown in the Python SDK code example for Custom Vision object detection.", "source": {"path": "Azure AI Vision", "module": "Detect objects in images", "unit": "Develop an object detection client application", "url": "https://learn.microsoft.com/en-us/training/modules/detect-objects-images/4-use-trained-detector?pivots=text"}},
  {"id": 173, "topic": "computer-vision", "type": "sequence", "question": "A developer is writing a Python client application to submit a new image to a trained Azure AI Custom Vision object detection model. Place the following code steps in the correct order as shown in the SDK example.", "items": [{"id": "S1", "text": "Import ApiKeyCredentials from msrest.authentication and CustomVisionPredictionClient from azure.cognitiveservices.vision.customvision.prediction"}, {"id": "S2", "text": "Create ApiKeyCredentials using the prediction resource key, then instantiate CustomVisionPredictionClient with the prediction endpoint"}, {"id": "S3", "text": "Open the image file in binary mode and read its bytes"}, {"id": "S4", "text": "Call prediction_client.detect_image() passing the project ID, published model name, and image data"}, {"id": "S5", "text": "Iterate over results.predictions; for each where probability > 0.5, access tag_name and bounding_box properties"}], "correct_order": ["S1", "S2", "S3", "S4", "S5"], "explanation": "The 'Develop an object detection client application' unit shows the exact Python SDK pattern: import the required classes, authenticate with ApiKeyCredentials and instantiate the client, read the image bytes, call detect_image() with project ID and model name, then process each prediction by checking probability and accessing tag_name and bounding_box.", "source": {"path": "Azure AI Vision", "module": "Detect objects in images", "unit": "Develop an object detection client application", "url": "https://learn.microsoft.com/en-us/training/modules/detect-objects-images/4-use-trained-detector?pivots=text"}},
  {"id": 174, "topic": "computer-vision", "type": "mc_single", "question": "A team wants to use Azure AI Custom Vision to build an object detection project. They want to write Python code to train the model. Which pip package should they install for the training SDK?", "options": [{"id": "A", "text": "azure-cognitiveservices-vision-computervision"}, {"id": "B", "text": "azure-cognitiveservices-vision-customvision"}, {"id": "C", "text": "azure-ai-vision-imageanalysis"}, {"id": "D", "text": "azure-cognitiveservices-vision-face"}], "correct": ["B"], "explanation": "The 'Use Azure AI Custom Vision for object detection' unit shows Python developers install the azure-cognitiveservices-vision-customvision pip package. The same package contains the training submodule (azure.cognitiveservices.vision.customvision.training.CustomVisionTrainingClient) and the prediction submodule (azure.cognitiveservices.vision.customvision.prediction.CustomVisionPredictionClient). The azure-cognitiveservices-vision-computervision and azure-ai-vision-imageanalysis packages target the general Vision / Image Analysis services, not Custom Vision.", "source": {"path": "Azure AI Vision", "module": "Detect objects in images", "unit": "Use Azure AI Custom Vision for object detection", "url": "https://learn.microsoft.com/en-us/training/modules/detect-objects-images/2-understand-object-detection?pivots=text"}},
  {"id": 175, "topic": "computer-vision", "type": "mc_single", "question": "When planning a face analysis solution using the Azure Face service, a developer needs to include facial liveness detection. What is the primary purpose of the liveness detection capability?", "options": [{"id": "A", "text": "To determine whether a person is currently awake or asleep based on eye aspect ratio analysis"}, {"id": "B", "text": "To verify that the input video is a real live stream and not a fake or spoof attack against a facial recognition system"}, {"id": "C", "text": "To assess whether the detected face has sufficient quality to be stored in a Person Group for recognition"}, {"id": "D", "text": "To identify whether a face in an image belongs to a celebrity in the pre-trained model"}], "correct": ["B"], "explanation": "The 'Plan a face detection, analysis, or recognition solution' unit describes facial liveness as a capability that determines if the input video is a real stream or a fake, to prevent bad-intentioned individuals from spoofing a facial recognition system. It is a security feature for anti-spoofing, not a quality assessment or celebrity identification feature.", "source": {"path": "Azure AI Vision", "module": "Detect, analyze, and recognize faces", "unit": "Plan a face detection, analysis, or recognition solution", "url": "https://learn.microsoft.com/en-us/training/modules/detect-analyze-recognize-faces/2-understand-capabilities-of-face-service?pivots=text"}},
  {"id": 176, "topic": "computer-vision", "type": "mc_single", "question": "A developer is using the Azure Face service to detect faces and needs to analyze head orientation. Which three components make up the head pose attribute returned by the Face service?", "options": [{"id": "A", "text": "Yaw, pitch, and roll"}, {"id": "B", "text": "X-rotation, Y-rotation, and Z-rotation"}, {"id": "C", "text": "Azimuth, elevation, and tilt"}, {"id": "D", "text": "Left-right, up-down, and clockwise rotation"}], "correct": ["A"], "explanation": "The 'Plan a face detection, analysis, or recognition solution' unit lists the head pose attribute as returning pitch, roll, and yaw orientation in 3D space. These are the standard aviation/3D orientation terms used throughout the Face service API.", "source": {"path": "Azure AI Vision", "module": "Detect, analyze, and recognize faces", "unit": "Plan a face detection, analysis, or recognition solution", "url": "https://learn.microsoft.com/en-us/training/modules/detect-analyze-recognize-faces/2-understand-capabilities-of-face-service?pivots=text"}},
  {"id": 177, "topic": "computer-vision", "type": "hotspot", "question": "Complete the following statements about the Azure Face service's face attribute analysis capabilities by selecting the correct option for each blank.\n\n**Blank 1**: When the Face service detects glasses on a face, the possible values returned for the Glasses attribute are No glasses, Reading glasses, Sunglasses, and _____.\n\n**Blank 2**: The Face service attribute that rates whether a detected face is suitable for recognition returns values of low, medium, or high and is called _____.", "blanks": [{"id": "B1", "prompt": "Fourth possible value for the Glasses face attribute", "options": [{"id": "a", "text": "Safety glasses"}, {"id": "b", "text": "Swimming Goggles"}, {"id": "c", "text": "Sports eyewear"}, {"id": "d", "text": "VR headset"}], "correct": "b"}, {"id": "B2", "prompt": "Face attribute name that assesses face suitability for recognition", "options": [{"id": "a", "text": "Blur"}, {"id": "b", "text": "Noise"}, {"id": "c", "text": "QualityForRecognition"}, {"id": "d", "text": "Exposure"}], "correct": "c"}], "explanation": "The 'Plan a face detection, analysis, or recognition solution' unit lists four Glasses values: No glasses, Reading glasses, Sunglasses, and Swimming Goggles. It also lists QualityForRecognition as the attribute that rates face quality for recognition purposes with values of low, medium, or high. Blur, Noise, and Exposure are separate quality-related attributes with their own value sets.", "source": {"path": "Azure AI Vision", "module": "Detect, analyze, and recognize faces", "unit": "Plan a face detection, analysis, or recognition solution", "url": "https://learn.microsoft.com/en-us/training/modules/detect-analyze-recognize-faces/2-understand-capabilities-of-face-service?pivots=text"}},
