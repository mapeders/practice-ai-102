  {"id": 407, "topic": "knowledge-mining", "category": "test3", "type": "mc_multi", "question": "Which TWO query features are enabled by setting `queryType: full` in an Azure AI Search request? (Choose two.)", "options": [{"id": "A", "text": "Wildcard queries (e.g., `fram*`)."}, {"id": "B", "text": "Fuzzy and regex queries (e.g., `roam~`, `/[0-9]{3}/`)."}, {"id": "C", "text": "Automatic vector-only search (the index switches to vector mode)."}, {"id": "D", "text": "Built-in OData filter pushdown that bypasses authentication."}], "correct": ["A", "B"], "explanation": "`queryType: full` is Azure AI Search's Lucene parser. It adds wildcards (A), fuzzy and regex queries (B), plus proximity, term boosting, and field-scoped expressions. It does NOT change retrieval mode to vector (C) — that's a separate vector query. It does NOT alter authentication (D).", "source": {"path": "Azure AI Search documentation", "module": "Create an Azure AI Search solution", "unit": "Full Lucene query syntax", "url": "https://learn.microsoft.com/azure/search/query-lucene-syntax"}},
  {"id": 408, "topic": "knowledge-mining", "category": "test3", "type": "hotspot", "question": "For each Azure AI Search query need, pick the right `queryType`.", "blanks": [{"id": "B1", "prompt": "Plain free-text search with quoting and AND/OR/NOT (no wildcards needed):", "options": [{"id": "a", "text": "\"queryType\": \"simple\""}, {"id": "b", "text": "\"queryType\": \"full\""}, {"id": "c", "text": "\"queryType\": \"regex\""}], "correct": "a"}, {"id": "B2", "prompt": "Wildcard, fuzzy, or regex queries:", "options": [{"id": "a", "text": "\"queryType\": \"simple\""}, {"id": "b", "text": "\"queryType\": \"full\""}, {"id": "c", "text": "\"queryType\": \"semantic\""}], "correct": "b"}, {"id": "B3", "prompt": "Conversational, intent-aware re-ranking on top of keyword matches:", "options": [{"id": "a", "text": "\"queryType\": \"semantic\""}, {"id": "b", "text": "\"queryType\": \"full\""}, {"id": "c", "text": "\"queryType\": \"simple\""}], "correct": "a"}], "explanation": "`simple` for plain free text. `full` for Lucene (wildcards/fuzzy/regex/field-scoped). `semantic` for intent-aware re-ranking. There is no `regex` or `wildcard` top-level value.", "source": {"path": "Azure AI Search documentation", "module": "Create an Azure AI Search solution", "unit": "Query types", "url": "https://learn.microsoft.com/azure/search/search-lucene-query-architecture"}},
  {"id": 409, "topic": "knowledge-mining", "category": "test3", "type": "mc_single", "question": "In Azure AI Document Intelligence Studio, you need a single model that extracts KEY-VALUE PAIRS, SELECTION MARKS (checkboxes), and TABLES from a varied set of documents WITHOUT custom training. Which model should you use?", "options": [{"id": "A", "text": "The general document model (prebuilt-document)."}, {"id": "B", "text": "The layout model — returns text and tables but no key-value semantics."}, {"id": "C", "text": "The receipt model — limited to receipt-specific fields."}, {"id": "D", "text": "A custom-trained extraction model — requires labeled samples per form."}], "correct": ["A"], "explanation": "`prebuilt-document` (general document) is designed to extract key-value pairs, selection marks, tables, and other common entities across varied document types — no training. `prebuilt-layout` (B) returns text, tables, and selection marks but NOT key-value semantics. `prebuilt-receipt` (C) is receipt-specific. Custom models (D) require labelled training data.", "source": {"path": "Azure AI Document Intelligence documentation", "module": "Use Azure AI Document Intelligence", "unit": "Prebuilt general document model", "url": "https://learn.microsoft.com/en-us/training/modules/work-form-recognizer/9-form-recognizer-studio"}},
  {"id": 410, "topic": "knowledge-mining", "category": "test3", "type": "mc_multi", "question": "Which TWO statements correctly distinguish the Document Intelligence LAYOUT model from the GENERAL DOCUMENT (prebuilt-document) model? (Choose two.)", "options": [{"id": "A", "text": "Layout returns text, tables, and selection marks but does NOT extract semantic key-value pairs."}, {"id": "B", "text": "General document extracts key-value pairs, selection marks, AND tables across varied document types."}, {"id": "C", "text": "Layout is the only model that supports tables; general document cannot return table structure."}, {"id": "D", "text": "General document is for receipts and invoices only; layout handles everything else."}], "correct": ["A", "B"], "explanation": "Layout = structural extraction (text, tables, selection marks) without semantic K/V pairs (A). General document = layout + key-value semantics across varied document types (B). General document does return tables (C is wrong) and is NOT restricted to receipts/invoices (D is wrong — those are separate prebuilt models).", "source": {"path": "Azure AI Document Intelligence documentation", "module": "Use Azure AI Document Intelligence", "unit": "Prebuilt models comparison", "url": "https://learn.microsoft.com/en-us/training/modules/ai-information-extraction/5-document-intelligence"}},
  {"id": 411, "topic": "knowledge-mining", "category": "test3", "type": "hotspot", "question": "Pick the right Document Intelligence model for each requirement.", "blanks": [{"id": "B1", "prompt": "Extract key-value pairs, selection marks, and tables from a varied mix of forms with NO custom training:", "options": [{"id": "a", "text": "prebuilt-document (general document)"}, {"id": "b", "text": "prebuilt-layout"}, {"id": "c", "text": "prebuilt-receipt"}], "correct": "a"}, {"id": "B2", "prompt": "Return ONLY page text, tables, and selection marks (no semantic K/V pairs):", "options": [{"id": "a", "text": "prebuilt-document"}, {"id": "b", "text": "prebuilt-layout"}, {"id": "c", "text": "Custom extraction model"}], "correct": "b"}, {"id": "B3", "prompt": "Extract a fixed schema (e.g., 'PolicyNumber', 'EffectiveDate') from a company-specific form not covered by prebuilt models:", "options": [{"id": "a", "text": "prebuilt-document"}, {"id": "b", "text": "prebuilt-layout"}, {"id": "c", "text": "Custom extraction model trained on labeled samples"}], "correct": "c"}], "explanation": "General document for varied K/V extraction without training. Layout for structural-only extraction. Custom for organisation-specific fixed schemas that prebuilt models do not cover.", "source": {"path": "Azure AI Document Intelligence documentation", "module": "Use Azure AI Document Intelligence", "unit": "Choose a model", "url": "https://learn.microsoft.com/en-us/training/modules/work-form-recognizer/9-form-recognizer-studio"}},
  {"id": 412, "topic": "knowledge-mining", "category": "test3", "type": "mc_single", "question": "A team is processing a varied set of corporate forms (NDAs, sales orders, contracts) where each form type is unique. They tried `prebuilt-document` and noticed that some specific fields are extracted inconsistently. Which next step is most appropriate?", "options": [{"id": "A", "text": "Train a CUSTOM extraction model with labeled samples per form template — prebuilt-document is for generic K/V extraction; custom is for org-specific fixed schemas."}, {"id": "B", "text": "Switch to `prebuilt-layout` — it returns key-value pairs more accurately."}, {"id": "C", "text": "Switch to `prebuilt-receipt` — it generalises across all corporate forms."}, {"id": "D", "text": "Re-encode the PDFs as images first; the prebuilt-document model only works on image input."}], "correct": ["A"], "explanation": "`prebuilt-document` is good for generic, unstructured K/V extraction. When you need RELIABLE, FIXED-SCHEMA extraction on specific form templates, train a CUSTOM extraction model with labeled samples. Layout (B) returns NO K/V semantics. Receipt (C) is receipt-only. Document Intelligence accepts PDFs and images natively (D).", "source": {"path": "Azure AI Document Intelligence documentation", "module": "Use Azure AI Document Intelligence", "unit": "Custom vs prebuilt", "url": "https://learn.microsoft.com/en-us/training/modules/ai-information-extraction/5-document-intelligence"}},
  {"id": 413, "topic": "knowledge-mining", "category": "test3", "type": "sequence", "question": "Place the steps to issue an Azure AI Search query that returns wildcard matches in the correct order.", "items": [{"id": "S1", "text": "Confirm the target field is searchable in the index schema (wildcards work only on searchable text fields)."}, {"id": "S2", "text": "Construct the search query string with a wildcard pattern (e.g., 'fram*')."}, {"id": "S3", "text": "In the REST request body, set `queryType` to `full` so the Lucene parser is used."}, {"id": "S4", "text": "POST the request to /indexes/{indexName}/docs/search?api-version=... and inspect the results."}, {"id": "S5", "text": "If recall is too narrow, broaden the wildcard pattern or add fuzzy operators (`~`)."}], "correct_order": ["S1", "S2", "S3", "S4", "S5"], "explanation": "Confirm the field is searchable → write the wildcard pattern → enable the Lucene parser via `queryType: full` → POST → tune. Forgetting `queryType: full` is the most common cause of 'wildcards return nothing' — the simple parser silently ignores wildcard syntax.", "source": {"path": "Azure AI Search documentation", "module": "Create an Azure AI Search solution", "unit": "Full Lucene query syntax", "url": "https://learn.microsoft.com/azure/search/query-lucene-syntax"}},
  {"id": 414, "topic": "knowledge-mining", "category": "test3", "type": "mc_single", "question": "The Azure AI Search 'simple' and 'full' Lucene query parsers differ in which fundamental way?", "options": [{"id": "A", "text": "`full` supports the complete Lucene syntax (wildcards, fuzzy, regex, proximity, field-scoped, term boosting); `simple` supports only basic AND/OR/NOT and quoted phrases."}, {"id": "B", "text": "`full` requires a paid Search tier; `simple` is free-tier only."}, {"id": "C", "text": "`full` returns results in chronological order; `simple` returns them by relevance."}, {"id": "D", "text": "`full` only works against vector fields; `simple` only works against text fields."}], "correct": ["A"], "explanation": "`simple` = a minimal parser (AND/OR/NOT, quoted phrases). `full` = the complete Lucene parser (wildcards, fuzzy, regex, proximity, field-scoped, boosting). Choice is independent of tier (B), unrelated to result ordering (C), and unrelated to vector retrieval (D).", "source": {"path": "Azure AI Search documentation", "module": "Create an Azure AI Search solution", "unit": "Lucene query architecture", "url": "https://learn.microsoft.com/azure/search/search-lucene-query-architecture"}},
  {"id": 415, "topic": "agentic", "category": "test3", "type": "mc_single", "question": "You are creating an agent with the Microsoft Foundry Agent Service. The agent must ground prompts with contextual data and document the sources. Which THREE elements are REQUIRED in the agent configuration?", "options": [{"id": "A", "text": "name, model deployment, and instructions."}, {"id": "B", "text": "name, tools, and a YAML manifest file."}, {"id": "C", "text": "model deployment, tools, and conversation thread ID."}, {"id": "D", "text": "instructions, tools, and an Azure AI Search index name."}], "correct": ["A"], "explanation": "The required agent config elements are: NAME (identity), MODEL DEPLOYMENT (foundation model the agent uses), and INSTRUCTIONS (how the agent behaves and how it grounds + cites). TOOLS are OPTIONAL and only needed when the agent must call external capabilities. A YAML manifest is one possible authoring format, not a config element. A thread ID exists per conversation and is not part of agent creation.", "source": {"path": "Develop AI agents on Azure", "module": "Develop AI agents with Microsoft Foundry Agent Service", "unit": "How to use Foundry Agent Service", "url": "https://learn.microsoft.com/en-us/training/modules/develop-ai-agent-azure/3-how-use-agent-service"}},
  {"id": 416, "topic": "agentic", "category": "test3", "type": "mc_multi", "question": "Which TWO statements about Microsoft Foundry Agent Service configuration are TRUE? (Choose two.)", "options": [{"id": "A", "text": "An agent's REQUIRED configuration is name + model deployment + instructions."}, {"id": "B", "text": "Tools are OPTIONAL — attach them only when the agent must call external capabilities or knowledge sources."}, {"id": "C", "text": "A YAML file is itself a required configuration element of an agent."}, {"id": "D", "text": "Conversation threads must be defined at agent creation time and cannot be created later."}], "correct": ["A", "B"], "explanation": "Required: name + model deployment + instructions (A). Tools are optional knowledge/action attachments (B). A YAML file is a FORMAT for authoring agents, not a required config element (C). Threads are created on-demand per conversation, not at agent creation (D).", "source": {"path": "Develop AI agents on Azure", "module": "Develop AI agents with Microsoft Foundry Agent Service", "unit": "How to use Foundry Agent Service", "url": "https://learn.microsoft.com/en-us/training/modules/develop-ai-agent-azure/3-how-use-agent-service"}},
  {"id": 417, "topic": "agentic", "category": "test3", "type": "hotspot", "question": "For each Microsoft Foundry Agent Service config element, decide whether it is REQUIRED or OPTIONAL at agent creation.", "blanks": [{"id": "B1", "prompt": "name", "options": [{"id": "a", "text": "REQUIRED"}, {"id": "b", "text": "OPTIONAL"}], "correct": "a"}, {"id": "B2", "prompt": "model deployment", "options": [{"id": "a", "text": "REQUIRED"}, {"id": "b", "text": "OPTIONAL"}], "correct": "a"}, {"id": "B3", "prompt": "instructions", "options": [{"id": "a", "text": "REQUIRED"}, {"id": "b", "text": "OPTIONAL"}], "correct": "a"}, {"id": "B4", "prompt": "tools (e.g., Azure AI Search, OpenAPI/function tools)", "options": [{"id": "a", "text": "REQUIRED"}, {"id": "b", "text": "OPTIONAL"}], "correct": "b"}], "explanation": "REQUIRED: name, model deployment, instructions. OPTIONAL: tools (and YAML file is just an authoring format, not a config element).", "source": {"path": "Develop AI agents on Azure", "module": "Develop AI agents with Microsoft Foundry Agent Service", "unit": "How to use Foundry Agent Service", "url": "https://learn.microsoft.com/en-us/training/modules/develop-ai-agent-azure/3-how-use-agent-service"}},
  {"id": 418, "topic": "agentic", "category": "test3", "type": "sequence", "question": "Order the steps to create a grounded Foundry agent that cites its sources.", "items": [{"id": "S1", "text": "Decide on the agent's NAME and choose its MODEL DEPLOYMENT."}, {"id": "S2", "text": "Write the INSTRUCTIONS, including the persona, the grounding policy, and the citation format."}, {"id": "S3", "text": "Attach knowledge tools (e.g., Azure AI Search index) so the agent can ground answers."}, {"id": "S4", "text": "Optionally attach action tools (OpenAPI / function tools) for any external calls."}, {"id": "S5", "text": "Test against representative prompts and verify the agent's responses include citations."}], "correct_order": ["S1", "S2", "S3", "S4", "S5"], "explanation": "Required first (name, model, instructions), then optional tools (knowledge before actions, since grounded retrieval is the question's goal), then validate. Tools added before instructions makes the policy harder to author.", "source": {"path": "Develop AI agents on Azure", "module": "Develop AI agents with Microsoft Foundry Agent Service", "unit": "Introduction", "url": "https://learn.microsoft.com/en-us/training/modules/develop-ai-agent-azure/1-introduction"}},
  {"id": 419, "topic": "natural-language", "category": "test3", "type": "mc_single", "question": "You are training a Conversational Language Understanding (CLU) model in Azure AI Language. Which training methods are AVAILABLE in CLU?", "options": [{"id": "A", "text": "Standard and Advanced only."}, {"id": "B", "text": "Standard, Advanced, and Deterministic."}, {"id": "C", "text": "Standard and Deterministic only."}, {"id": "D", "text": "Advanced and Deterministic only."}], "correct": ["A"], "explanation": "CLU offers TWO training methods: STANDARD (fast / cheaper) and ADVANCED (slower but typically higher accuracy). DETERMINISTIC was a method on the older Language Understanding (LUIS) service — it is NOT part of CLU.", "source": {"path": "Azure AI Language documentation", "module": "Build a conversational language understanding model", "unit": "Train and evaluate models in CLU", "url": "https://learn.microsoft.com/training/modules/build-language-understanding-model/"}},
  {"id": 420, "topic": "natural-language", "category": "test3", "type": "mc_multi", "question": "Which TWO statements correctly describe training methods for Conversational Language Understanding (CLU)? (Choose two.)", "options": [{"id": "A", "text": "CLU's training methods are Standard and Advanced; Advanced typically yields higher accuracy at the cost of longer training time."}, {"id": "B", "text": "'Deterministic' is a training method of the older Language Understanding (LUIS) service and is NOT available in CLU."}, {"id": "C", "text": "CLU exposes a 'Deterministic' training method that disables generalization."}, {"id": "D", "text": "Standard and Advanced are aliases for the same underlying CLU training pipeline."}], "correct": ["A", "B"], "explanation": "Standard = quicker, lower cost; Advanced = slower, higher accuracy (A). Deterministic was a LUIS feature and does NOT exist in CLU (B). C and D contradict the documented design.", "source": {"path": "Azure AI Language documentation", "module": "Build a conversational language understanding model", "unit": "Train and evaluate models in CLU", "url": "https://learn.microsoft.com/training/modules/build-language-understanding-model/"}},
  {"id": 421, "topic": "natural-language", "category": "python-rest", "type": "mc_single", "question": "You are writing Python that uses the Azure AI Language SDK to detect the language of a batch of strings. Which method does the Learn unit call on the client?", "options": [{"id": "A", "text": "`client.detect_language(documents=documents)`"}, {"id": "B", "text": "`client.analyze_text(kind='LanguageDetection', documents=documents)`"}, {"id": "C", "text": "`client.recognize_language(text=documents)`"}, {"id": "D", "text": "`client.languages.detect(input=documents)`"}], "correct": ["A"], "explanation": "The Detect language unit invokes `client.detect_language(documents=documents)` on the TextAnalyticsClient, then iterates the response printing `doc.primary_language.name`, `iso6391_name`, and `confidence_score`. The other method names are plausible-looking distractors but do not exist on the Python client.", "source": {"path": "Analyze text with Azure Language in Foundry Tools", "module": "Analyze text with Azure Language in Foundry Tools", "unit": "Detect language", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-text-ai-language/3-detect-language"}},
  {"id": 422, "topic": "natural-language", "category": "python-rest", "type": "mc_multi", "question": "You are using the Azure AI Language Python SDK to extract PII from customer feedback. Which TWO statements about the call shown in the Extract PII unit are true? (Choose two.)", "options": [{"id": "A", "text": "The method is `client.recognize_pii_entities(documents=documents, language=\"en\")`."}, {"id": "B", "text": "The redacted text for each document is available on `doc.redacted_text` after the same call."}, {"id": "C", "text": "PII redaction requires a second call to `client.redact_pii(documents=documents)`."}, {"id": "D", "text": "The Python SDK returns a `pii_results` array; you must index `pii_results[0].entities` to read entities."}], "correct": ["A", "B"], "explanation": "The PII unit shows `client.recognize_pii_entities(documents=documents, language=\"en\")` and then reads `doc.redacted_text` from the same response object — no second call is needed. The other options invent method and property names.", "source": {"path": "Analyze text with Azure Language in Foundry Tools", "module": "Analyze text with Azure Language in Foundry Tools", "unit": "Extract personally identifiable information (PII)", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-text-ai-language/7-extract-personal-information"}},
  {"id": 423, "topic": "natural-language", "category": "python-rest", "type": "hotspot", "question": "Complete the Python snippet from the Extract entities unit:\n\n```python\nresponse = client.[BLANK_1](documents=documents)\nfor doc in response:\n    for entity in doc.[BLANK_2]:\n        print(f\" - {entity.text} ({entity.category})\")\n```", "blanks": [{"id": "B1", "prompt": "Method name on the client", "options": [{"id": "a", "text": "`recognize_entities`"}, {"id": "b", "text": "`extract_entities`"}, {"id": "c", "text": "`analyze_entities`"}, {"id": "d", "text": "`detect_entities`"}], "correct": "a"}, {"id": "B2", "prompt": "Iterable property on each result document", "options": [{"id": "a", "text": "`entities`"}, {"id": "b", "text": "`named_entities`"}, {"id": "c", "text": "`results`"}, {"id": "d", "text": "`recognized`"}], "correct": "a"}], "explanation": "The Extract entities unit calls `client.recognize_entities(documents=documents)` and then iterates `doc.entities`, printing `entity.text` and `entity.category` (Person, Location, DateTime, Organization, etc.).", "source": {"path": "Analyze text with Azure Language in Foundry Tools", "module": "Analyze text with Azure Language in Foundry Tools", "unit": "Extract entities", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-text-ai-language/6-extract-entities"}},
  {"id": 424, "topic": "natural-language", "category": "python-rest", "type": "mc_single", "question": "Per the Azure AI Language documentation, what is the per-document character limit for the language-detection API?", "options": [{"id": "A", "text": "5,120 characters per document, and each collection is restricted to 1,000 items."}, {"id": "B", "text": "10,240 characters per document, and each collection is restricted to 25 items."}, {"id": "C", "text": "125,000 characters per document, with no per-collection limit."}, {"id": "D", "text": "There is no limit; the service auto-chunks input."}], "correct": ["A"], "explanation": "The Detect language unit explicitly states: \"the document size must be under 5,120 characters. The size limit is per document and each collection is restricted to 1,000 items (IDs).\" Knowing this limit prevents 400-class errors when batching.", "source": {"path": "Analyze text with Azure Language in Foundry Tools", "module": "Analyze text with Azure Language in Foundry Tools", "unit": "Detect language", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-text-ai-language/3-detect-language"}},
  {"id": 425, "topic": "natural-language", "category": "python-rest", "type": "mc_single", "question": "You are calling the Azure AI Speech speech-to-text REST API for short audio. Which host pattern does the Learn reference use in the request URL?", "options": [{"id": "A", "text": "`https://<region>.stt.speech.microsoft.com/speech/recognition/conversation/cognitiveservices/v1` (e.g. `eastus.stt.speech.microsoft.com`)"}, {"id": "B", "text": "`https://<resource>.cognitiveservices.azure.com/speech/recognition/v1`"}, {"id": "C", "text": "`https://speech.microsoft.com/<region>/recognition`"}, {"id": "D", "text": "`https://<region>.speech.azure.com/v1/recognition`"}], "correct": ["A"], "explanation": "The Speech to text REST API for short audio reference shows the URL as `https://<region>.stt.speech.microsoft.com/speech/recognition/conversation/cognitiveservices/v1`. Speech routes by region (`eastus`, `westeurope`, etc.) rather than via a single unified endpoint, so the `<region>.stt.speech.microsoft.com` host is mandatory.", "source": {"path": "Azure AI Speech documentation", "module": "Speech to text REST API", "unit": "Speech to text REST API for short audio", "url": "https://learn.microsoft.com/en-us/azure/ai-services/speech-service/rest-speech-to-text-short"}},
  {"id": 426, "topic": "natural-language", "category": "python-rest", "type": "mc_multi", "question": "Per the Azure AI Speech Python quickstarts, which TWO kwargs are passed to `speechsdk.SpeechConfig(...)`? (Choose two.)", "options": [{"id": "A", "text": "`subscription=<key>`"}, {"id": "B", "text": "`endpoint=<endpoint URL>`"}, {"id": "C", "text": "`api_version=\"2024-11-01\"`"}, {"id": "D", "text": "`credential=AzureKeyCredential(key)`"}], "correct": ["A", "B"], "explanation": "Both the speech-to-text and text-to-speech quickstarts construct the config with `speechsdk.SpeechConfig(subscription=os.environ.get('SPEECH_KEY'), endpoint=os.environ.get('ENDPOINT'))`. The Speech SDK does not take an `api_version` kwarg here, and it uses key+endpoint (or key+region), not `AzureKeyCredential`.", "source": {"path": "Azure AI Speech documentation", "module": "Speech quickstarts", "unit": "Get started with speech-to-text (Python)", "url": "https://learn.microsoft.com/en-us/azure/ai-services/speech-service/get-started-speech-to-text?pivots=programming-language-python"}},
  {"id": 427, "topic": "natural-language", "category": "python-rest", "type": "hotspot", "question": "Complete this REST request for the Speech-to-text REST API for short audio, as shown in the Learn reference:\n\n```http\nPOST /speech/recognition/conversation/cognitiveservices/v1?language=[BLANK_1] HTTP/1.1\n[BLANK_2]: YOUR_RESOURCE_KEY\nContent-Type: audio/wav; codecs=audio/pcm; samplerate=16000\nHost: YourResourceName.cognitiveservices.azure.com\n```", "blanks": [{"id": "B1", "prompt": "Required query parameter value (en-US example)", "options": [{"id": "a", "text": "`en-US`"}, {"id": "b", "text": "`English`"}, {"id": "c", "text": "`en_US`"}, {"id": "d", "text": "`en`"}], "correct": "a"}, {"id": "B2", "prompt": "Header used to pass the resource key", "options": [{"id": "a", "text": "`Ocp-Apim-Subscription-Key`"}, {"id": "b", "text": "`x-ms-speech-key`"}, {"id": "c", "text": "`api-key`"}, {"id": "d", "text": "`Authorization`"}], "correct": "a"}], "explanation": "The Speech to text REST API for short audio reference shows the URL `...?language=en-US` (BCP-47 tag) and uses the `Ocp-Apim-Subscription-Key` header to pass the resource key. The doc warns: \"You must append the language parameter to the URL to avoid receiving a 4xx HTTP error.\"", "source": {"path": "Azure AI Speech documentation", "module": "Speech to text REST API", "unit": "Speech to text REST API for short audio", "url": "https://learn.microsoft.com/en-us/azure/ai-services/speech-service/rest-speech-to-text-short"}},
  {"id": 428, "topic": "natural-language", "category": "python-rest", "type": "mc_single", "question": "Per the Speech to text REST API for short audio reference, what value of the `format` query parameter must you set to receive per-word timestamps and confidence scores in the JSON response?", "options": [{"id": "A", "text": "`format=detailed`"}, {"id": "B", "text": "`format=verbose`"}, {"id": "C", "text": "`format=extended`"}, {"id": "D", "text": "`format=full`"}], "correct": ["A"], "explanation": "The `format` query parameter accepts `simple` (default — just the recognized text and overall confidence) or `detailed` (per-word offset, duration, confidence, plus N-best alternatives). Set `format=detailed` together with an audio `Content-Type` such as `audio/wav; codecs=audio/pcm; samplerate=16000` to get the rich response shape.", "source": {"path": "Azure AI Speech documentation", "module": "Speech to text REST API", "unit": "Speech to text REST API for short audio", "url": "https://learn.microsoft.com/en-us/azure/ai-services/speech-service/rest-speech-to-text-short"}},
  {"id": 429, "topic": "computer-vision", "category": "python-rest", "type": "mc_single", "question": "Which URL template does the Azure AI Vision Image Analysis 4.0 REST reference use for analyzing an image?", "options": [{"id": "A", "text": "`POST <endpoint>/computervision/imageanalysis:analyze?api-version=2024-02-01`"}, {"id": "B", "text": "`POST <endpoint>/computervision/v3.2/analyze`"}, {"id": "C", "text": "`POST <endpoint>/vision/v4.0/imageanalysis/analyze`"}, {"id": "D", "text": "`POST <endpoint>/imageanalysis/v1/analyze`"}], "correct": ["A"], "explanation": "Image Analysis 4.0 uses the colon-action URL `<endpoint>/computervision/imageanalysis:analyze?api-version=2024-02-01`. `2024-02-01` is the GA api-version for the 4.0 surface; the older `/computervision/v3.2/analyze` is the deprecated v3 path and does not return the new features (denseCaptions, smartCrops, people).", "source": {"path": "Azure AI Vision documentation", "module": "Image Analysis 4.0 how-to", "unit": "Call the Image Analysis 4.0 analyze API", "url": "https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/how-to/call-analyze-image-40"}},
  {"id": 430, "topic": "computer-vision", "category": "python-rest", "type": "mc_multi", "question": "Per the Analyze an image unit, which TWO kwargs does the `client.analyze(...)` call take in the Python example? (Choose two.)", "options": [{"id": "A", "text": "`image_data=<bytes>`"}, {"id": "B", "text": "`visual_features=[VisualFeatures.CAPTION, VisualFeatures.TAGS]`"}, {"id": "C", "text": "`image_url=<url>`"}, {"id": "D", "text": "`features=\"caption,tags\"`"}], "correct": ["A", "B"], "explanation": "The verbatim Python example uses `client.analyze(image_data=<IMAGE_DATA_BYTES>, visual_features=[VisualFeatures.CAPTION, VisualFeatures.TAGS], gender_neutral_caption=True)`. For URLs you use the separate `analyze_from_url` method, not an `image_url` kwarg, and features is a list of enum members, not a comma-separated string.", "source": {"path": "Analyze images", "module": "Analyze images", "unit": "Analyze an image", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-images/3-analyze-image"}},
  {"id": 431, "topic": "computer-vision", "category": "python-rest", "type": "mc_single", "question": "You are calling Image Analysis 4.0 over REST and want the response to include captions, tags, and read (OCR) results. Which value of the `features` query parameter should you use?", "options": [{"id": "A", "text": "`features=caption,tags,read`"}, {"id": "B", "text": "`features=Caption|Tags|Read`"}, {"id": "C", "text": "`features=CAPTION,TAGS,READ`"}, {"id": "D", "text": "`features=[\"caption\",\"tags\",\"read\"]`"}], "correct": ["A"], "explanation": "Image Analysis 4.0 REST accepts a comma-separated lowercase list in the `features` query parameter. The valid tokens are `tags`, `objects`, `caption`, `denseCaptions`, `read`, `smartCrops`, and `people` (note `denseCaptions` and `smartCrops` are camelCase). Uppercase, pipe-separated, and JSON-array forms all return 400.", "source": {"path": "Azure AI Vision documentation", "module": "Image Analysis 4.0 how-to", "unit": "Call the Image Analysis 4.0 analyze API", "url": "https://learn.microsoft.com/en-us/azure/ai-services/computer-vision/how-to/call-analyze-image-40"}},
  {"id": 432, "topic": "computer-vision", "category": "python-rest", "type": "sequence", "question": "Order the steps in the Image Analysis 4.0 Python example shown in the Analyze an image unit.", "items": [{"id": "S1", "text": "Import `ImageAnalysisClient`, `VisualFeatures`, and `AzureKeyCredential`."}, {"id": "S2", "text": "Construct the client with `endpoint=...` and `credential=AzureKeyCredential(...)`."}, {"id": "S3", "text": "Call `client.analyze(image_data=..., visual_features=[...], gender_neutral_caption=True)`."}, {"id": "S4", "text": "Inspect the returned result for the requested features (e.g., captions, tags)."}], "correct_order": ["S1", "S2", "S3", "S4"], "explanation": "The Learn snippet flows: imports, then client construction with endpoint + AzureKeyCredential, then a single `client.analyze(...)` call, then result inspection. The response is synchronous; there is no separate `begin_*` / `.result()` for the image-analysis call.", "source": {"path": "Analyze images", "module": "Analyze images", "unit": "Analyze an image", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-images/3-analyze-image"}},
  {"id": 433, "topic": "knowledge-mining", "category": "python-rest", "type": "mc_single", "question": "You are calling Document Intelligence v4.0 from Python. Which import and pip package does the Learn reference for the Python client library use?", "options": [{"id": "A", "text": "`pip install azure-ai-documentintelligence` and `from azure.ai.documentintelligence import DocumentIntelligenceClient`"}, {"id": "B", "text": "`pip install azure-ai-formrecognizer` and `from azure.ai.formrecognizer import DocumentAnalysisClient`"}, {"id": "C", "text": "`pip install azure-cognitiveservices-formrecognizer` and `from azure.cognitiveservices.formrecognizer import FormRecognizerClient`"}, {"id": "D", "text": "`pip install azure-ai-documents` and `from azure.ai.documents import DocumentClient`"}], "correct": ["A"], "explanation": "The Azure AI Document Intelligence client library for Python README shows `from azure.ai.documentintelligence import DocumentIntelligenceClient` paired with the `azure-ai-documentintelligence` package. Option B is the pre-rename Form Recognizer v3.x SDK and is no longer the v4.0 surface.", "source": {"path": "Azure AI Document Intelligence documentation", "module": "Document Intelligence Python client library", "unit": "Azure AI Document Intelligence client library for Python", "url": "https://learn.microsoft.com/en-us/python/api/overview/azure/ai-documentintelligence-readme"}},
  {"id": 434, "topic": "knowledge-mining", "category": "python-rest", "type": "mc_multi", "question": "Per the Document Intelligence v4.0 Python README, which TWO statements about `begin_analyze_document` are TRUE? (Choose two.)", "options": [{"id": "A", "text": "It takes `model_id` (e.g., `\"prebuilt-layout\"`) as the first positional argument."}, {"id": "B", "text": "It returns a poller; you call `poller.result()` to get the `AnalyzeResult`."}, {"id": "C", "text": "It returns the `AnalyzeResult` synchronously and immediately."}, {"id": "D", "text": "The file bytes are passed via a `file=` kwarg."}], "correct": ["A", "B"], "explanation": "The README shows `poller = document_intelligence_client.begin_analyze_document(\"prebuilt-layout\", body=f)` followed by `result: AnalyzeResult = poller.result()`. Document analysis is a long-running operation, so `begin_*` returns an `LROPoller`. The bytes go through the `body=` kwarg, not `file=`.", "source": {"path": "Azure AI Document Intelligence documentation", "module": "Document Intelligence Python client library", "unit": "Azure AI Document Intelligence client library for Python", "url": "https://learn.microsoft.com/en-us/python/api/overview/azure/ai-documentintelligence-readme"}},
  {"id": 435, "topic": "knowledge-mining", "category": "python-rest", "type": "hotspot", "question": "Complete the Document Intelligence v4.0 REST request:\n\n```http\nPOST https://{endpoint}/documentintelligence/documentModels/[BLANK_1]:analyze?api-version=[BLANK_2]\nOcp-Apim-Subscription-Key: {key}\nContent-Type: application/json\n\n{ \"urlSource\": \"https://...\" }\n```", "blanks": [{"id": "B1", "prompt": "Path segment for the prebuilt layout model", "options": [{"id": "a", "text": "`prebuilt-layout`"}, {"id": "b", "text": "`prebuilt_layout`"}, {"id": "c", "text": "`layout`"}, {"id": "d", "text": "`Microsoft.DocumentIntelligence.Layout`"}], "correct": "a"}, {"id": "B2", "prompt": "Document Intelligence v4.0 GA api-version value", "options": [{"id": "a", "text": "`2024-11-30`"}, {"id": "b", "text": "`2023-07-31`"}, {"id": "c", "text": "`v4.0`"}, {"id": "d", "text": "`2022-08-31`"}], "correct": "a"}], "explanation": "The Document Intelligence v4.0 reference uses `/documentintelligence/documentModels/{modelId}:analyze?api-version=2024-11-30`, with `prebuilt-layout` (hyphen, lowercase) as the model ID. The older `2023-07-31` and `2022-08-31` are pre-v4 api-versions for Form Recognizer.", "source": {"path": "Azure AI Document Intelligence documentation", "module": "Use the Document Intelligence SDK or REST API", "unit": "Use the SDK or REST API (v4.0)", "url": "https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/how-to-guides/use-sdk-rest-api?view=doc-intel-4.0.0"}},

    const STORAGE_KEY = "ai102-practice-v2";
    let memoryState = null;

    // -------- Validator --------
    function validateQuestions(arr) {
      const valid = [], invalid = [];
      const seenIds = new Set();
      for (const q of arr) {
        if (!q || typeof q !== 'object') { invalid.push({ id: null, errs: ['not an object'] }); continue; }
        const errs = [];
        if (typeof q.id !== 'number') errs.push('missing id');
        else if (seenIds.has(q.id)) errs.push('duplicate id ' + q.id);
        if (!['agentic','genai-foundry','computer-vision','plan-and-manage','knowledge-mining','natural-language'].includes(q.topic)) errs.push('bad topic');
        if (!['mc_single','mc_multi','sequence','hotspot'].includes(q.type)) errs.push('bad type');
        if (typeof q.question !== 'string' || !q.question) errs.push('missing question');
        if (typeof q.explanation !== 'string') errs.push('missing explanation');
        if (!q.source || !q.source.url || !q.source.path || !q.source.module || !q.source.unit) errs.push('missing source');

        if (q.type === 'mc_single' || q.type === 'mc_multi') {
          if (!Array.isArray(q.options) || q.options.length < 2) errs.push('options must be array of 2+');
          if (!Array.isArray(q.correct) || q.correct.length === 0) errs.push('correct must be non-empty array');
          if (q.type === 'mc_single' && q.correct && q.correct.length !== 1) errs.push('mc_single must have exactly 1 correct');
          if (q.type === 'mc_multi'  && q.correct && q.correct.length < 2)   errs.push('mc_multi must have 2+ correct');
          const optIds = new Set((q.options || []).map(o => o && o.id));
          for (const c of (q.correct || [])) if (!optIds.has(c)) errs.push('correct id not in options: ' + c);
        } else if (q.type === 'sequence') {
          if (!Array.isArray(q.items) || q.items.length < 3) errs.push('items must be array of 3+');
          if (!Array.isArray(q.correct_order)) errs.push('correct_order missing');
          else if (q.items && q.items.length !== q.correct_order.length) errs.push('items/correct_order length mismatch');
          const itemIds = new Set((q.items || []).map(i => i && i.id));
          for (const c of (q.correct_order || [])) if (!itemIds.has(c)) errs.push('correct_order id not in items: ' + c);
        } else if (q.type === 'hotspot') {
          if (!Array.isArray(q.blanks) || q.blanks.length < 2) errs.push('blanks must be array of 2+');
          for (const b of (q.blanks || [])) {
            if (!b || !b.id || !b.prompt || !Array.isArray(b.options) || b.options.length < 2 || b.correct == null) {
              errs.push('blank malformed');
              break;
            }
            const blankIds = new Set(b.options.map(o => o && o.id));
            if (!blankIds.has(b.correct)) { errs.push('blank correct not in options: ' + b.correct); break; }
          }
        }

        if (errs.length === 0) { valid.push(q); seenIds.add(q.id); }
        else { invalid.push({ id: q && q.id, errs }); }
      }
      return { valid, invalid };
    }

    const _vRes = validateQuestions(RAW_QUESTIONS);
    const QUESTIONS = _vRes.valid;
    if (_vRes.invalid.length) {
      console.warn('Rejected', _vRes.invalid.length, 'invalid questions:', _vRes.invalid);
    }

    // -------- State --------
    function loadState() {
      let s;
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        s = raw ? JSON.parse(raw) : { results: {}, currentTopic: null, wrongQueue: [] };
      } catch (e) {
        if (memoryState) return memoryState;
        memoryState = { results: {}, currentTopic: null, wrongQueue: [] };
        return memoryState;
      }
      // Drop wrongQueue entries that no longer exist in QUESTIONS
      const validIds = new Set(QUESTIONS.map(q => q.id));
      if (Array.isArray(s.wrongQueue)) {
        s.wrongQueue = s.wrongQueue.filter(id => validIds.has(id));
      } else {
        s.wrongQueue = [];
      }
      if (!s.results || typeof s.results !== 'object') s.results = {};
      return s;
    }
    function saveState(s) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }
      catch (e) { memoryState = s; }
    }
    function questionsForTopic(topicId) {
      // Topic drills and Mixed mode exclude test-pack questions (e.g., category "test1").
      return QUESTIONS.filter(q => q.topic === topicId && !q.category);
    }
    function questionsForCategory(catId) { return QUESTIONS.filter(q => q.category === catId); }
    function topicStats(topicId, state) {
      const qs = questionsForTopic(topicId);
      let answered = 0, correct = 0;
      for (const q of qs) {
        const r = state.results[q.id];
        if (r) { answered++; if (r.correct) correct++; }
      }
      const pct = answered === 0 ? 0 : Math.round((correct / answered) * 100);
      return { total: qs.length, answered, correct, pct };
    }
    function categoryStats(catId, state) {
      const qs = questionsForCategory(catId);
      let answered = 0, correct = 0;
      for (const q of qs) {
        const r = state.results[q.id];
        if (r) { answered++; if (r.correct) correct++; }
      }
      const pct = answered === 0 ? 0 : Math.round((correct / answered) * 100);
      return { total: qs.length, answered, correct, pct };
    }

    // -------- Helpers --------
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c]));
    }
    function sameSet(a, b) {
      if (a.length !== b.length) return false;
      const sa = new Set(a), sb = new Set(b);
      for (const x of sa) if (!sb.has(x)) return false;
      return true;
    }
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // -------- Views --------
    function showView(name) {
      document.querySelectorAll('[data-view]').forEach(s => s.classList.toggle('active', s.dataset.view === name));
      window.scrollTo(0, 0);
    }

    function renderHome() {
      const state = loadState();
      const root = document.getElementById('view-home');
      const cards = TOPICS.map(t => {
        const s = topicStats(t.id, state);
        const disabled = s.total === 0;
        return `
          <button class="topic-card w-full text-left bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-4 mb-3 ${disabled ? 'opacity-50 cursor-not-allowed' : 'hover:border-msblue active:bg-gray-100 dark:active:bg-gray-700'}"
                  data-topic="${t.id}" ${disabled ? 'disabled' : ''}>
            <div class="flex justify-between items-start gap-2">
              <div class="font-semibold">${t.title}</div>
              <div class="text-sm text-gray-500 whitespace-nowrap">${t.weight}</div>
            </div>
            ${t.subtitle ? `<div class="mt-1 text-xs text-gray-500 dark:text-gray-400">${t.subtitle}</div>` : ''}
            <div class="mt-2 text-sm text-gray-600 dark:text-gray-400">
              ${disabled ? 'no questions yet' : `${s.answered} / ${s.total} answered · ${s.pct}% correct`}
            </div>
            ${disabled ? '' : `<div class="mt-2 h-1.5 bg-gray-200 dark:bg-gray-700 rounded overflow-hidden"><div class="h-full bg-msblue" style="width:${s.total ? Math.round((s.answered/s.total)*100) : 0}%"></div></div>`}
          </button>`;
      }).join('');

      const queueLen = state.wrongQueue.length;
      const queueCard = queueLen > 0 ? `
        <button class="w-full text-left bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded-lg p-4 mb-3" data-mode="wrong-queue">
          <div class="font-semibold text-red-700 dark:text-red-300">Wrong-answer queue (${queueLen})</div>
          <div class="text-sm text-red-600 dark:text-red-400 mt-1">Drill questions you got wrong</div>
        </button>` : '';

      const mixedCard = QUESTIONS.length > 0 ? `
        <button class="w-full text-left bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-4 mb-3 hover:border-msblue" data-mode="mixed">
          <div class="font-semibold">Mixed — random across all topics</div>
          <div class="text-sm text-gray-600 dark:text-gray-400 mt-1">20 questions weighted by exam %</div>
        </button>` : '';

      const t1 = categoryStats('test1', state);
      const test1Card = t1.total > 0 ? `
        <button class="w-full text-left bg-amber-50 dark:bg-amber-900/20 border border-amber-300 dark:border-amber-700 rounded-lg p-4 mb-3 hover:border-amber-500" data-mode="test1">
          <div class="flex justify-between items-start gap-2">
            <div class="font-semibold text-amber-800 dark:text-amber-200">Test 1 — Retake focus</div>
            <div class="text-sm text-amber-700 dark:text-amber-300 whitespace-nowrap">${t1.total} Q</div>
          </div>
          <div class="mt-1 text-xs text-amber-700 dark:text-amber-300">Targeted drill on the areas you missed (NLP, agentic, KM, plan-and-manage)</div>
          <div class="mt-2 text-sm text-amber-800 dark:text-amber-200">
            ${t1.answered === 0 ? 'not started' : `${t1.answered} / ${t1.total} answered · ${t1.pct}% correct`}
          </div>
          ${t1.answered === 0 ? '' : `<div class="mt-2 h-1.5 bg-amber-200 dark:bg-amber-800 rounded overflow-hidden"><div class="h-full bg-amber-600" style="width:${Math.round((t1.answered/t1.total)*100)}%"></div></div>`}
        </button>` : '';

      const t2 = categoryStats('test2', state);
      const test2Card = t2.total > 0 ? `
        <button class="w-full text-left bg-violet-50 dark:bg-violet-900/20 border border-violet-300 dark:border-violet-700 rounded-lg p-4 mb-3 hover:border-violet-500" data-mode="test2">
          <div class="flex justify-between items-start gap-2">
            <div class="font-semibold text-violet-800 dark:text-violet-200">Test 2 — Retake focus</div>
            <div class="text-sm text-violet-700 dark:text-violet-300 whitespace-nowrap">${t2.total} Q</div>
          </div>
          <div class="mt-1 text-xs text-violet-700 dark:text-violet-300">Heavy on computer vision (firewall, Image Analysis, Spatial Analysis, Video Indexer); plus managed identity, RAG strictness, DALL-E response shape</div>
          <div class="mt-2 text-sm text-violet-800 dark:text-violet-200">
            ${t2.answered === 0 ? 'not started' : `${t2.answered} / ${t2.total} answered · ${t2.pct}% correct`}
          </div>
          ${t2.answered === 0 ? '' : `<div class="mt-2 h-1.5 bg-violet-200 dark:bg-violet-800 rounded overflow-hidden"><div class="h-full bg-violet-600" style="width:${Math.round((t2.answered/t2.total)*100)}%"></div></div>`}
        </button>` : '';

      const t3 = categoryStats('test3', state);
      const test3Card = t3.total > 0 ? `
        <button class="w-full text-left bg-rose-50 dark:bg-rose-900/20 border border-rose-300 dark:border-rose-700 rounded-lg p-4 mb-3 hover:border-rose-500" data-mode="test3">
          <div class="flex justify-between items-start gap-2">
            <div class="font-semibold text-rose-800 dark:text-rose-200">Test 3 — Retake focus</div>
            <div class="text-sm text-rose-700 dark:text-rose-300 whitespace-nowrap">${t3.total} Q</div>
          </div>
          <div class="mt-1 text-xs text-rose-700 dark:text-rose-300">Heavy on generative AI Foundry (Content Safety severity, RAG strictness, DALL-E REST polling), computer vision (Custom Vision domains, Video Indexer multi-language, Content Understanding), and knowledge mining (queryType=full, general document model)</div>
          <div class="mt-2 text-sm text-rose-800 dark:text-rose-200">
            ${t3.answered === 0 ? 'not started' : `${t3.answered} / ${t3.total} answered · ${t3.pct}% correct`}
          </div>
          ${t3.answered === 0 ? '' : `<div class="mt-2 h-1.5 bg-rose-200 dark:bg-rose-800 rounded overflow-hidden"><div class="h-full bg-rose-600" style="width:${Math.round((t3.answered/t3.total)*100)}%"></div></div>`}
        </button>` : '';

      root.innerHTML = cards + test1Card + test2Card + test3Card + mixedCard + queueCard;

      root.querySelectorAll('.topic-card').forEach(el => {
        el.addEventListener('click', () => startTopic(el.dataset.topic));
      });
      root.querySelector('[data-mode="mixed"]')?.addEventListener('click', startMixed);
      root.querySelector('[data-mode="test1"]')?.addEventListener('click', startTest1);
      root.querySelector('[data-mode="test2"]')?.addEventListener('click', startTest2);
      root.querySelector('[data-mode="test3"]')?.addEventListener('click', startTest3);
      root.querySelector('[data-mode="wrong-queue"]')?.addEventListener('click', startWrongQueue);
    }

    // -------- Session --------
    let session = null;

    function startTopic(topicId) {
      const qs = questionsForTopic(topicId);
      if (qs.length === 0) return;
      session = { mode: 'topic', topicId, queue: shuffle(qs.map(q => q.id)), cursor: 0, score: { right: 0, wrong: 0 } };
      const state = loadState(); state.currentTopic = topicId; saveState(state);
      showView('practice'); renderPractice();
    }

    function startMixed() {
      const topicIds = Object.keys(TOPIC_WEIGHTS);
      const totalWeight = topicIds.reduce((s, t) => s + TOPIC_WEIGHTS[t], 0);
      const picked = []; const seen = new Set(); let attempts = 0;
      while (picked.length < 20 && attempts < 200) {
        attempts++;
        const r = Math.random() * totalWeight;
        let acc = 0, chosenTopic = topicIds[0];
        for (const t of topicIds) { acc += TOPIC_WEIGHTS[t]; if (r <= acc) { chosenTopic = t; break; } }
        const pool = questionsForTopic(chosenTopic);
        if (pool.length === 0) continue;
        const q = pool[Math.floor(Math.random() * pool.length)];
        if (seen.has(q.id)) continue;
        seen.add(q.id); picked.push(q.id);
      }
      if (picked.length === 0) return;
      session = { mode: 'mixed', topicId: null, queue: picked, cursor: 0, score: { right: 0, wrong: 0 } };
      showView('practice'); renderPractice();
    }

    function startWrongQueue() {
      const state = loadState();
      if (state.wrongQueue.length === 0) return;
      session = { mode: 'wrong-queue', topicId: null, queue: shuffle(state.wrongQueue), cursor: 0, score: { right: 0, wrong: 0 } };
      showView('practice'); renderPractice();
    }

    function startTest1() {
      const qs = questionsForCategory('test1');
      if (qs.length === 0) return;
      session = { mode: 'test1', topicId: null, queue: shuffle(qs.map(q => q.id)), cursor: 0, score: { right: 0, wrong: 0 } };
      showView('practice'); renderPractice();
    }

    function startTest2() {
      const qs = questionsForCategory('test2');
      if (qs.length === 0) return;
      session = { mode: 'test2', topicId: null, queue: shuffle(qs.map(q => q.id)), cursor: 0, score: { right: 0, wrong: 0 } };
      showView('practice'); renderPractice();
    }

    function startTest3() {
      const qs = questionsForCategory('test3');
      if (qs.length === 0) return;
      session = { mode: 'test3', topicId: null, queue: shuffle(qs.map(q => q.id)), cursor: 0, score: { right: 0, wrong: 0 } };
      showView('practice'); renderPractice();
    }

    function commonHeader(q) {
      const typeLabel = q.type.replace('_', ' ');
      return `
        <div class="flex items-center justify-between text-sm text-gray-500 mb-2">
          <button id="btn-back" class="text-msblue">← Back</button>
          <div>Question ${session.cursor + 1} / ${session.queue.length} <span class="ml-2 px-2 py-0.5 bg-gray-200 dark:bg-gray-700 rounded">Q #${q.id}</span></div>
        </div>
        <div class="mb-2"><span class="text-xs px-2 py-0.5 rounded bg-gray-100 dark:bg-gray-700">${typeLabel}</span></div>`;
    }

    // -------- Practice dispatcher --------
    function renderPractice() {
      const root = document.getElementById('view-practice');
      const qid = session.queue[session.cursor];
      const q = QUESTIONS.find(x => x.id === qid);
      if (!q) { finishSession(); return; }
      try {
        if (q.type === 'mc_single' || q.type === 'mc_multi') renderMC(q, root);
        else if (q.type === 'sequence') renderSequence(q, root);
        else if (q.type === 'hotspot')  renderHotspot(q, root);
        else throw new Error('Unknown type ' + q.type);
      } catch (e) {
        console.error('Failed to render Q#' + q.id, e);
        root.innerHTML = `
          ${commonHeader(q)}
          <div class="bg-red-50 dark:bg-red-900/30 rounded-lg p-4 border border-red-300 dark:border-red-800">
            <div class="font-semibold text-red-700 dark:text-red-300 mb-2">This question failed to render</div>
            <pre class="text-xs">${escapeHtml(e.message)}</pre>
            <button id="btn-skip" class="w-full mt-3 px-4 py-3 bg-msblue text-white rounded font-semibold">Skip →</button>
          </div>`;
        document.getElementById('btn-skip').addEventListener('click', advance);
      }
    }

    // -------- MC renderer / grader --------
    function renderMC(q, root) {
      const isMulti = q.type === 'mc_multi';
      const optsHtml = q.options.map(opt => `
        <button class="opt-btn w-full text-left p-3 mb-2 rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 hover:border-msblue active:bg-gray-100 dark:active:bg-gray-700"
                data-opt="${opt.id}">
          <span class="font-semibold mr-2">${opt.id}.</span>${escapeHtml(opt.text)}
        </button>`).join('');
      const submitBtn = isMulti ? `<button id="btn-submit" class="w-full mt-3 px-4 py-3 bg-msblue text-white rounded font-semibold disabled:opacity-50" disabled>Submit</button>` : '';

      root.innerHTML = `
        ${commonHeader(q)}
        <div class="bg-white dark:bg-gray-800 rounded-lg p-4 border border-gray-200 dark:border-gray-700">
          <pre class="mb-4 text-sm">${escapeHtml(q.question)}</pre>
          ${isMulti ? `<div class="text-sm text-gray-500 mb-2">Select all that apply (${q.correct.length} correct).</div>` : ''}
          <div id="opts">${optsHtml}</div>
          ${submitBtn}
          <div id="feedback" class="mt-4"></div>
        </div>`;

      const selected = new Set();
      root.querySelectorAll('[data-opt]').forEach(btn => {
        btn.addEventListener('click', () => {
          if (isMulti) {
            const id = btn.dataset.opt;
            if (selected.has(id)) { selected.delete(id); btn.classList.remove('bg-blue-100','dark:bg-blue-900/40'); }
            else { selected.add(id); btn.classList.add('bg-blue-100','dark:bg-blue-900/40'); }
            document.getElementById('btn-submit').disabled = selected.size === 0;
          } else {
            const picked = [btn.dataset.opt];
            const correct = gradeMC(q, picked);
            submitAnswer(q, picked, correct, () => markMCOpts(q, picked));
          }
        });
      });
      if (isMulti) {
        document.getElementById('btn-submit').addEventListener('click', () => {
          const picked = [...selected];
          const correct = gradeMC(q, picked);
          submitAnswer(q, picked, correct, () => markMCOpts(q, picked));
        });
      }
      document.getElementById('btn-back').addEventListener('click', () => { showView('home'); renderHome(); });
    }
    function markMCOpts(q, picked) {
      document.querySelectorAll('[data-opt]').forEach(el => {
        const id = el.dataset.opt;
        el.disabled = true;
        el.classList.remove('bg-blue-100','dark:bg-blue-900/40','hover:border-msblue','active:bg-gray-100','dark:active:bg-gray-700');
        if (q.correct.includes(id)) {
          el.classList.add('bg-green-100','dark:bg-green-900/40','border-green-400','dark:border-green-600');
          el.insertAdjacentHTML('beforeend', ' <span class="text-green-700 dark:text-green-300">✓</span>');
        } else if (picked.includes(id)) {
          el.classList.add('bg-red-100','dark:bg-red-900/40','border-red-400','dark:border-red-600');
          el.insertAdjacentHTML('beforeend', ' <span class="text-red-700 dark:text-red-300">✗</span>');
        }
      });
      const submitBtn = document.getElementById('btn-submit');
      if (submitBtn) submitBtn.style.display = 'none';
    }
    function gradeMC(q, picked) { return sameSet(picked, q.correct); }

    // -------- Sequence renderer / grader --------
    function renderSequence(q, root) {
      let order = shuffle(q.items.map(i => i.id));
      function paintList() {
        return order.map((id, idx) => {
          const item = q.items.find(i => i.id === id);
          return `
            <div class="seq-row flex items-center gap-2 p-2 mb-2 rounded border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800" data-id="${id}">
              <div class="text-xs text-gray-500 w-6">${idx + 1}.</div>
              <div class="seq-text flex-1 text-sm">${escapeHtml(item.text)}</div>
              <button class="seq-up text-base px-3 py-2 rounded bg-gray-200 dark:bg-gray-700 min-w-[44px] min-h-[44px] ${idx === 0 ? 'opacity-30' : ''}" data-idx="${idx}" ${idx === 0 ? 'disabled' : ''} aria-label="Move up">↑</button>
              <button class="seq-down text-base px-3 py-2 rounded bg-gray-200 dark:bg-gray-700 min-w-[44px] min-h-[44px] ${idx === order.length - 1 ? 'opacity-30' : ''}" data-idx="${idx}" ${idx === order.length - 1 ? 'disabled' : ''} aria-label="Move down">↓</button>
            </div>`;
        }).join('');
      }
      root.innerHTML = `
        ${commonHeader(q)}
        <div class="bg-white dark:bg-gray-800 rounded-lg p-4 border border-gray-200 dark:border-gray-700">
          <pre class="mb-2 text-sm">${escapeHtml(q.question)}</pre>
          <div class="text-sm text-gray-500 mb-2">Order the steps from first to last.</div>
          <div id="seq-list">${paintList()}</div>
          <button id="btn-submit" class="w-full mt-3 px-4 py-3 bg-msblue text-white rounded font-semibold">Submit</button>
          <div id="feedback" class="mt-4"></div>
        </div>`;
      function rerender() { document.getElementById('seq-list').innerHTML = paintList(); wireBtns(); }
      function wireBtns() {
        document.querySelectorAll('.seq-up').forEach(b => b.addEventListener('click', () => {
          const idx = +b.dataset.idx;
          if (idx > 0) { [order[idx - 1], order[idx]] = [order[idx], order[idx - 1]]; rerender(); }
        }));
        document.querySelectorAll('.seq-down').forEach(b => b.addEventListener('click', () => {
          const idx = +b.dataset.idx;
          if (idx < order.length - 1) { [order[idx + 1], order[idx]] = [order[idx], order[idx + 1]]; rerender(); }
        }));
      }
      wireBtns();
      document.getElementById('btn-submit').addEventListener('click', () => {
        const correct = gradeSequence(q, order);
        submitAnswer(q, order, correct, () => {
          document.querySelectorAll('.seq-row').forEach((row, idx) => {
            const id = row.dataset.id;
            const correctIdx = q.correct_order.indexOf(id);
            if (correctIdx === idx) {
              row.classList.add('bg-green-100','dark:bg-green-900/40','border-green-400');
            } else {
              row.classList.add('bg-red-100','dark:bg-red-900/40','border-red-400');
              row.querySelector('.seq-text').insertAdjacentHTML('beforeend',
                ` <span class="text-xs text-red-700 dark:text-red-300">(should be ${correctIdx + 1})</span>`);
            }
            const up = row.querySelector('.seq-up'); if (up) up.disabled = true;
            const down = row.querySelector('.seq-down'); if (down) down.disabled = true;
          });
          document.getElementById('btn-submit').style.display = 'none';
        });
      });
      document.getElementById('btn-back').addEventListener('click', () => { showView('home'); renderHome(); });
    }
    function gradeSequence(q, order) {
      if (order.length !== q.correct_order.length) return false;
      return order.every((id, idx) => id === q.correct_order[idx]);
    }

    // -------- Hotspot renderer / grader --------
    function renderHotspot(q, root) {
      const picks = {};
      const blanksHtml = q.blanks.map(b => `
        <div class="hot-row mb-2 p-2 rounded border border-gray-300 dark:border-gray-600" data-blank="${b.id}">
          <label class="block text-sm font-medium mb-1">${escapeHtml(b.prompt)}</label>
          <select class="hot-select w-full p-2 rounded bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600" data-blank="${b.id}">
            <option value="">— select —</option>
            ${b.options.map(o => `<option value="${o.id}">${escapeHtml(o.text)}</option>`).join('')}
          </select>
        </div>`).join('');
      root.innerHTML = `
        ${commonHeader(q)}
        <div class="bg-white dark:bg-gray-800 rounded-lg p-4 border border-gray-200 dark:border-gray-700">
          <pre class="mb-2 text-sm">${escapeHtml(q.question)}</pre>
          <div class="text-sm text-gray-500 mb-2">Choose the correct option for each.</div>
          <div id="hot-list">${blanksHtml}</div>
          <button id="btn-submit" class="w-full mt-3 px-4 py-3 bg-msblue text-white rounded font-semibold disabled:opacity-50" disabled>Submit</button>
          <div id="feedback" class="mt-4"></div>
        </div>`;
      document.querySelectorAll('.hot-select').forEach(sel => {
        sel.addEventListener('change', () => {
          picks[sel.dataset.blank] = sel.value;
          const allChosen = q.blanks.every(b => picks[b.id]);
          document.getElementById('btn-submit').disabled = !allChosen;
        });
      });
      document.getElementById('btn-submit').addEventListener('click', () => {
        const correct = gradeHotspot(q, picks);
        submitAnswer(q, picks, correct, () => {
          document.querySelectorAll('.hot-row').forEach(row => {
            const blankId = row.dataset.blank;
            const blank = q.blanks.find(b => b.id === blankId);
            const select = row.querySelector('.hot-select');
            select.disabled = true;
            const isCorrect = picks[blankId] === blank.correct;
            if (isCorrect) {
              row.classList.add('bg-green-100','dark:bg-green-900/40','border-green-400');
            } else {
              row.classList.add('bg-red-100','dark:bg-red-900/40','border-red-400');
              const correctOpt = blank.options.find(o => o.id === blank.correct);
              const correctText = correctOpt ? correctOpt.text : '(missing)';
              row.insertAdjacentHTML('beforeend',
                `<div class="text-xs text-red-700 dark:text-red-300 mt-1">Correct: ${escapeHtml(correctText)}</div>`);
            }
          });
          document.getElementById('btn-submit').style.display = 'none';
        });
      });
      document.getElementById('btn-back').addEventListener('click', () => { showView('home'); renderHome(); });
    }
    function gradeHotspot(q, picks) {
      return q.blanks.every(b => picks[b.id] === b.correct);
    }

    // -------- Shared submission --------
    function submitAnswer(q, picked, correct, onMarked) {
      const state = loadState();
      const prev = state.results[q.id] || { attempts: 0 };
      state.results[q.id] = {
        lastAnswer: picked,
        correct,
        attempts: (prev.attempts || 0) + 1,
        ts: Date.now(),
      };
      const idx = state.wrongQueue.indexOf(q.id);
      if (correct && idx !== -1) state.wrongQueue.splice(idx, 1);
      if (!correct && idx === -1) state.wrongQueue.push(q.id);
      saveState(state);
      session.score[correct ? 'right' : 'wrong']++;

      onMarked();

      const safeUrl = q.source && /^https?:\/\//.test(q.source.url) ? q.source.url : '';
      const sourceLink = q.source ? `
        <div class="mt-2 text-xs text-gray-600 dark:text-gray-400">
          📚 <span class="font-medium">${escapeHtml(q.source.path)}</span> → ${escapeHtml(q.source.module)} → ${escapeHtml(q.source.unit)}
          ${safeUrl ? `<a href="${escapeHtml(safeUrl)}" target="_blank" rel="noopener noreferrer" class="text-msblue underline ml-1">Open in Microsoft Learn ↗</a>` : ''}
        </div>` : '';
      document.getElementById('feedback').innerHTML = `
        <div class="rounded-lg p-3 ${correct ? 'bg-green-50 dark:bg-green-900/30 text-green-900 dark:text-green-100' : 'bg-red-50 dark:bg-red-900/30 text-red-900 dark:text-red-100'}">
          <div class="font-semibold mb-2">${correct ? 'Correct' : 'Wrong'}</div>
          <pre class="text-sm">${escapeHtml(q.explanation || '')}</pre>
          ${sourceLink}
        </div>
        <button id="btn-next" class="w-full mt-3 px-4 py-3 bg-msblue text-white rounded font-semibold">Next →</button>`;
      document.getElementById('btn-next').addEventListener('click', advance);
    }

    function advance() {
      session.cursor++;
      if (session.cursor >= session.queue.length) finishSession();
      else { renderPractice(); window.scrollTo(0, 0); }
    }

    function finishSession() { showView('results'); renderResults(); }

    function renderResults() {
      const root = document.getElementById('view-results');
      const total = session.score.right + session.score.wrong;
      const pct = total === 0 ? 0 : Math.round((session.score.right / total) * 100);
      const state = loadState();
      const sessionWrongIds = session.queue.filter(qid => {
        const r = state.results[qid]; return r && !r.correct;
      });
      const wrongBtn = sessionWrongIds.length > 0
        ? `<button id="btn-redo-wrong" class="w-full mt-2 px-4 py-3 bg-red-600 text-white rounded font-semibold">Practice wrong answers (${sessionWrongIds.length})</button>`
        : '';
      const heading = session.mode === 'topic'
        ? `Topic complete — ${TOPICS.find(t => t.id === session.topicId)?.title || ''}`
        : session.mode === 'mixed' ? 'Mixed session complete'
        : session.mode === 'test1' ? 'Test 1 — Retake focus complete'
        : session.mode === 'test2' ? 'Test 2 — Retake focus complete'
        : session.mode === 'test3' ? 'Test 3 — Retake focus complete'
        : 'Wrong-queue session complete';
      root.innerHTML = `
        <div class="bg-white dark:bg-gray-800 rounded-lg p-6 border border-gray-200 dark:border-gray-700 text-center">
          <h2 class="text-xl font-bold mb-2">${heading}</h2>
          <p class="text-3xl font-bold text-msblue my-3">${session.score.right} / ${total}</p>
          <p class="text-gray-600 dark:text-gray-400 mb-4">${pct}% correct</p>
          ${wrongBtn}
          <button id="btn-home-from-results" class="w-full mt-2 px-4 py-3 bg-gray-200 dark:bg-gray-700 rounded font-semibold">Back to topics</button>
        </div>`;
      document.getElementById('btn-home-from-results').addEventListener('click', () => { showView('home'); renderHome(); });
      const redo = document.getElementById('btn-redo-wrong');
      if (redo) redo.addEventListener('click', () => {
        session = { mode: session.mode, topicId: session.topicId, queue: shuffle(sessionWrongIds), cursor: 0, score: { right: 0, wrong: 0 } };
        showView('practice'); renderPractice();
      });
    }

    // -------- Reset --------
    document.getElementById('btn-reset').addEventListener('click', () => {
      if (confirm('Wipe all progress?')) {
        try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
        memoryState = null;
        renderHome();
      }
    });

    renderHome();
  </script>
</body></html>
