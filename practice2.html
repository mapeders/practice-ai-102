  {"id": 178, "topic": "computer-vision", "type": "mc_single", "question": "A developer wants to use a vision-capable generative AI model in Microsoft Foundry to build a chat application that can answer questions about images. Which of the following is listed as a multimodal model available in Microsoft Foundry for this purpose?", "options": [{"id": "A", "text": "OpenAI gpt-4o-vision"}, {"id": "B", "text": "Microsoft Phi-4-multimodal-instruct"}, {"id": "C", "text": "Azure AI Vision GPT-V"}, {"id": "D", "text": "OpenAI gpt-3.5-turbo-vision"}], "correct": ["B"], "explanation": "The 'Use a vision-capable model in the Microsoft Foundry portal' unit explicitly lists Microsoft Phi-4-multimodal-instruct, OpenAI gpt-4.1, and OpenAI gpt-4.1-mini as multimodal models available in Microsoft Foundry. Options A, C, and D are not listed in that unit.", "source": {"path": "Azure AI Vision", "module": "Develop a vision-enabled generative AI application", "unit": "Use a vision-capable model in the Microsoft Foundry portal", "url": "https://learn.microsoft.com/en-us/training/modules/develop-generative-ai-vision-apps/2-deploy-multimodal-model?pivots=text"}},
  {"id": 179, "topic": "computer-vision", "type": "mc_single", "question": "A developer uses the OpenAI Python SDK to call an image generation model deployed in Microsoft Foundry. They call client.images.generate() and receive a response. According to the client application unit, how is the generated image data returned in the response object?", "options": [{"id": "A", "text": "As a URL string pointing to the generated image hosted on Azure CDN"}, {"id": "B", "text": "As a Base64-encoded string in img_results.data[0].b64_json"}, {"id": "C", "text": "As a binary stream returned directly in img_results.image_bytes"}, {"id": "D", "text": "As a SAS URL in img_results.data[0].url that expires after 24 hours"}], "correct": ["B"], "explanation": "The 'Create a client application that uses an image generation model' unit shows Python code where the generated image is returned in img_results.data[0].b64_json as a Base64-encoded string, which is then decoded using base64.b64decode() and written to a PNG file.", "source": {"path": "Azure AI Vision", "module": "Generate images with AI", "unit": "Create a client application that uses an image generation model", "url": "https://learn.microsoft.com/en-us/training/modules/generate-images-azure-openai/4-dall-e-rest-api?pivots=text"}},
  {"id": 180, "topic": "computer-vision", "type": "mc_single", "question": "A developer submits a valid JPEG image for Azure Vision image analysis. The image is 2 MB in size and 100 x 100 pixels. They want the response to include the bounding box for each area of interest when cropping the image to a specific aspect ratio for a thumbnail. Which VisualFeatures value should they request?", "options": [{"id": "A", "text": "VisualFeatures.DENSE_CAPTIONS"}, {"id": "B", "text": "VisualFeatures.SMART_CROPS"}, {"id": "C", "text": "VisualFeatures.OBJECTS"}, {"id": "D", "text": "VisualFeatures.PEOPLE"}], "correct": ["B"], "explanation": "The 'Analyze an image' unit lists VisualFeatures.SMART_CROPS as the feature that 'Returns the bounding box of the specified aspect ratio for the area of interest', which is precisely the smart thumbnail cropping capability. VisualFeatures.OBJECTS returns bounding boxes for detected objects generally, VisualFeatures.PEOPLE returns bounding boxes for detected people, and VisualFeatures.DENSE_CAPTIONS generates detailed captions for detected objects rather than crop coordinates.", "source": {"path": "Azure AI Vision", "module": "Analyze images", "unit": "Analyze an image", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-images/3-analyze-image?pivots=text"}},
  {"id": 181, "topic": "plan-and-manage", "type": "mc_single", "question": "A company needs to deploy Azure OpenAI models in Microsoft Foundry and must ensure that all inference traffic stays within European Union countries. Which deployment type should they select?", "options": [{"id": "A", "text": "Global Standard"}, {"id": "B", "text": "Standard"}, {"id": "C", "text": "DataZone Standard"}, {"id": "D", "text": "Global Provisioned"}], "correct": ["C"], "explanation": "DataZone Standard (SKU code: DataZoneStandard) processes prompts and responses only within the Microsoft-specified data zone. For EU compliance, selecting DataZone Standard in an EU region ensures all inference traffic is routed exclusively to datacenters within EU member nations. Global Standard may route to any Azure region worldwide, Standard is a single-region deployment that does not guarantee EU data zone routing, and Global Provisioned uses global infrastructure with no data-zone restriction.", "source": {"path": "Microsoft Foundry documentation", "module": "Microsoft Foundry documentation", "unit": "Understanding deployment types in Microsoft Foundry Models", "url": "https://learn.microsoft.com/en-us/azure/foundry/foundry-models/concepts/deployment-types"}},
  {"id": 182, "topic": "plan-and-manage", "type": "mc_single", "question": "Your team needs to process millions of document summarization requests asynchronously over a 24-hour window at minimum cost. Which Azure OpenAI deployment type in Microsoft Foundry is most appropriate?", "options": [{"id": "A", "text": "Global Standard, because it provides the highest default quota"}, {"id": "B", "text": "Global Batch, because it offers 50% cost savings with a 24-hour target turnaround"}, {"id": "C", "text": "Provisioned Throughput (PTU), because it guarantees dedicated capacity"}, {"id": "D", "text": "DataZone Standard, because it routes traffic within a single geography"}], "correct": ["B"], "explanation": "Global Batch (SKU: GlobalBatch) is designed for large-scale asynchronous workloads. It offers a 50% cost discount compared to Global Standard and targets completion within 24 hours. Batch requests use a separate enqueued token quota that does not disrupt online workloads. PTU is for predictable high-throughput real-time scenarios (and is more expensive), Global Standard is pay-per-token with no batch discount, and DataZone Standard is for EU/US data residency requirements, not batch cost optimization.", "source": {"path": "Microsoft Foundry documentation", "module": "Microsoft Foundry documentation", "unit": "Understanding deployment types in Microsoft Foundry Models", "url": "https://learn.microsoft.com/en-us/azure/foundry/foundry-models/concepts/deployment-types"}},
  {"id": 183, "topic": "plan-and-manage", "type": "mc_single", "question": "A fine-tuned Azure OpenAI model is deployed and rarely receives requests. An architect notices unexpectedly high monthly costs. What is the most likely cause?", "options": [{"id": "A", "text": "Fine-tuned models are billed per API call plus a per-token premium over base models"}, {"id": "B", "text": "Fine-tuned model deployments incur hourly hosting charges even when unused"}, {"id": "C", "text": "Fine-tuned models require a commitment tier plan, which has a non-refundable monthly fee"}, {"id": "D", "text": "Fine-tuned model training tokens continue to be billed post-deployment"}], "correct": ["B"], "explanation": "Azure OpenAI fine-tuned models are charged in three ways: training (per token or per hour), hosting (hourly cost per deployed model regardless of usage), and inference (per 1,000 tokens when called). The hosting charge applies even during low usage periods. The documentation explicitly warns: 'Remove or scale down deployments that you don't need.' This hosting cost is the most likely cause of unexpected charges for a rarely-used fine-tuned deployment.", "source": {"path": "Microsoft Foundry documentation", "module": "Microsoft Foundry documentation", "unit": "Plan and manage costs for Microsoft Foundry", "url": "https://learn.microsoft.com/en-us/azure/foundry/concepts/manage-costs"}},
  {"id": 184, "topic": "plan-and-manage", "type": "mc_single", "question": "An operations engineer wants to view Azure OpenAI usage costs scoped to a specific model series across multiple deployments in Azure Cost Management. When filtering by service, the engineer cannot find 'Azure OpenAI' in the service list. What filter should be used instead?", "options": [{"id": "A", "text": "Service: Microsoft.CognitiveServices"}, {"id": "B", "text": "Service tier: Azure OpenAI"}, {"id": "C", "text": "Resource type: OpenAI"}, {"id": "D", "text": "Meter: azure-openai-inference"}], "correct": ["B"], "explanation": "In Azure Cost Management, Azure OpenAI usage appears under the broader 'Cognitive Services' service classification rather than as a standalone 'Azure OpenAI' entry. To isolate Azure OpenAI costs at the subscription level, the correct approach is to use the 'Service tier: Azure OpenAI' filter. The raw service name 'Azure OpenAI' will not appear in the service dropdown.", "source": {"path": "Microsoft Foundry documentation", "module": "Microsoft Foundry documentation", "unit": "Plan and manage costs for Microsoft Foundry", "url": "https://learn.microsoft.com/en-us/azure/foundry/concepts/manage-costs"}},
  {"id": 185, "topic": "plan-and-manage", "type": "sequence", "question": "You need to purchase a commitment tier plan for a dedicated Azure AI Speech resource. Arrange the following steps in the correct order as described in the Azure AI services commitment tier documentation.", "items": [{"id": "S1", "text": "Sign in to the Azure portal and create a new resource using the standard pricing tier for the applicable single-service (for example, Speech)"}, {"id": "S2", "text": "After the resource is created, navigate to the resource and select 'Commitment tier pricing'"}, {"id": "S3", "text": "Select 'Change' to view available commitment plans and choose a plan for web or connected container usage"}, {"id": "S4", "text": "Select a commitment tier and an auto-renewal option, then select 'Purchase'"}], "correct_order": ["S1", "S2", "S3", "S4"], "explanation": "The commitment tier documentation outlines this exact sequence: first create a single-service resource using the standard pricing tier (note: commitment tier is NOT available on multi-service resources), then navigate to the resource's 'Commitment tier pricing' blade, select Change to view plans, pick a plan (web or connected container), choose a tier and auto-renewal preference, then purchase. Once purchased, the plan is non-refundable and takes effect immediately, pro-rated for the remainder of the current month.", "source": {"path": "Azure AI services documentation", "module": "Azure AI services documentation", "unit": "Use Foundry Tools with commitment tier pricing", "url": "https://learn.microsoft.com/en-us/azure/ai-services/commitment-tier"}},
  {"id": 186, "topic": "plan-and-manage", "type": "mc_single", "question": "An organization purchases a commitment tier plan for Azure AI Language on the 15th of March. How is the first month's charge calculated?", "options": [{"id": "A", "text": "The full monthly commitment fee is charged immediately on the purchase date"}, {"id": "B", "text": "No charge is incurred until the first day of April, when the next billing cycle starts"}, {"id": "C", "text": "A pro-rated charge based on the number of days remaining in March is charged at purchase"}, {"id": "D", "text": "A half-month charge is applied, regardless of the purchase date within the month"}], "correct": ["C"], "explanation": "According to the commitment tier documentation: 'Commitment plans are charged monthly, except the first month upon purchase which is pro-rated (cost and quota) based on the number of days remaining in that month.' For a March 15th purchase, the charge is pro-rated for the 16 remaining days. Subsequent months are charged in full on the first day of each month.", "source": {"path": "Azure AI services documentation", "module": "Azure AI services documentation", "unit": "Use Foundry Tools with commitment tier pricing", "url": "https://learn.microsoft.com/en-us/azure/ai-services/commitment-tier"}},
  {"id": 187, "topic": "plan-and-manage", "type": "mc_single", "question": "An organization has purchased a monthly commitment tier plan for Azure AI Text Translation and now wants to switch to a higher commitment tier for the current month. What does the commitment tier documentation state about this?", "options": [{"id": "A", "text": "You can upgrade to a higher tier at any time; the difference is billed pro-rated"}, {"id": "B", "text": "You cannot change the commitment plan for the current month; you can only choose a different plan for the next calendar month"}, {"id": "C", "text": "You must cancel the current plan and repurchase a new one, with a one-week gap in service"}, {"id": "D", "text": "You can change tiers twice per calendar month through the Azure portal"}], "correct": ["B"], "explanation": "The commitment tier documentation states: 'During the commitment period, you can't change the commitment plan for the current month. However, you can choose a different commitment plan for the next calendar month. The billing for the next month would happen on the first day of the next month.' Organizations must plan tier changes in advance before the month ends.", "source": {"path": "Azure AI services documentation", "module": "Azure AI services documentation", "unit": "Use Foundry Tools with commitment tier pricing", "url": "https://learn.microsoft.com/en-us/azure/ai-services/commitment-tier"}},
  {"id": 188, "topic": "plan-and-manage", "type": "mc_single", "question": "Azure OpenAI quota limits for TPM (tokens per minute) are scoped at which level in Microsoft Foundry?", "options": [{"id": "A", "text": "Tenant level — shared across all subscriptions in the organization"}, {"id": "B", "text": "Subscription level — each subscription has its own quota pool per region per model"}, {"id": "C", "text": "Resource level — each Azure OpenAI resource has its own independent quota"}, {"id": "D", "text": "Deployment level — quota is divided equally among all deployments"}], "correct": ["B"], "explanation": "The Azure OpenAI quotas documentation states: 'Quotas and limits aren't enforced at the tenant level. Instead, the highest level of quota restrictions is scoped at the Azure subscription level.' TPM and RPM limits are defined per region, per subscription, and per model or deployment type. A subscription can use more total quota by spreading resources across multiple regions.", "source": {"path": "Azure OpenAI documentation", "module": "Azure OpenAI documentation", "unit": "Azure OpenAI quotas and limits", "url": "https://learn.microsoft.com/en-us/azure/ai-services/openai/quotas-limits"}},
  {"id": 189, "topic": "plan-and-manage", "type": "mc_single", "question": "A developer reports receiving HTTP 429 (Too Many Requests) errors even though their Azure portal usage metrics show token consumption well below the assigned quota. Which of the following best explains this behavior?", "options": [{"id": "A", "text": "The quota dashboard refreshes every 24 hours, so the portal metrics lag behind actual usage"}, {"id": "B", "text": "429 errors can occur due to distributed rate-limiting enforcement, requests evaluated on potential token usage (max_tokens), or requests rejected for context length limits"}, {"id": "C", "text": "The model has been deprecated and all requests are being rejected automatically"}, {"id": "D", "text": "Token consumption metrics only count successful responses; failed requests are not counted but still consume quota"}], "correct": ["B"], "explanation": "The Azure OpenAI quotas documentation explicitly notes that 429 errors can occur even when usage metrics appear below quota due to: (1) distributed rate-limiting behavior where enforcement may not be precisely reflected in aggregated metrics, (2) requests evaluated based on potential token usage (max_tokens) even if no tokens are ultimately generated, and (3) requests rejected for input or context length limits (HTTP 400) that may still count toward rate limiting. The documentation recommends implementing retry logic and gradually increasing workload.", "source": {"path": "Azure OpenAI documentation", "module": "Azure OpenAI documentation", "unit": "Azure OpenAI quotas and limits", "url": "https://learn.microsoft.com/en-us/azure/ai-services/openai/quotas-limits"}},
  {"id": 190, "topic": "plan-and-manage", "type": "mc_single", "question": "You need to enable diagnostic logging for an Azure AI Speech resource to capture request/response data for troubleshooting. After enabling the diagnostic setting, how long should you expect to wait before log data is queryable in Log Analytics?", "options": [{"id": "A", "text": "Logs are available instantly in real time"}, {"id": "B", "text": "Up to two hours before logging data is available to query and analyze"}, {"id": "C", "text": "Up to 24 hours, as logs are batched and ingested daily"}, {"id": "D", "text": "Up to 15 minutes, matching the Azure Monitor standard SLA"}], "correct": ["B"], "explanation": "The Azure AI services diagnostic logging documentation states: 'It can take up to two hours before logging data is available to query and analyze.' This ingestion latency applies after enabling a diagnostic setting that routes logs to Log Analytics or Azure Storage. The documentation notes users should not be concerned if nothing appears immediately after configuration.", "source": {"path": "Azure AI services documentation", "module": "Azure AI services documentation", "unit": "Enable diagnostic logging for Azure AI services", "url": "https://learn.microsoft.com/en-us/azure/ai-services/diagnostic-logging"}},
  {"id": 191, "topic": "plan-and-manage", "type": "mc_single", "question": "Which Kusto query correctly retrieves all diagnostic logs from Azure AI services (Foundry Tools) resources in a Log Analytics workspace?", "options": [{"id": "A", "text": "AzureDiagnostics | where ResourceProvider == \"MICROSOFT.COGNITIVESERVICES\""}, {"id": "B", "text": "AzureActivity | where ResourceProvider == \"MICROSOFT.OPENAI\""}, {"id": "C", "text": "AzureDiagnostics | where ServiceName == \"CognitiveServices\""}, {"id": "D", "text": "AzureMetrics | where Namespace == \"MICROSOFT.COGNITIVESERVICES\""}], "correct": ["A"], "explanation": "The Azure AI services diagnostic logging documentation provides this exact sample Kusto query: `AzureDiagnostics | where ResourceProvider == \"MICROSOFT.COGNITIVESERVICES\"`. This query filters the AzureDiagnostics table by the Cognitive Services resource provider, which is how AI services log data is categorized. AzureActivity contains control-plane events (not service diagnostics), and AzureMetrics is a different table for numeric metrics rather than diagnostic log records.", "source": {"path": "Azure AI services documentation", "module": "Azure AI services documentation", "unit": "Enable diagnostic logging for Azure AI services", "url": "https://learn.microsoft.com/en-us/azure/ai-services/diagnostic-logging"}},
  {"id": 192, "topic": "plan-and-manage", "type": "hotspot", "question": "Complete the following statements about Microsoft Foundry built-in RBAC roles by selecting the correct value for each blank.", "blanks": [{"id": "B1", "prompt": "A developer who only needs to build and develop within an existing Foundry project (data actions) with reader access should be assigned the _____ role.", "options": [{"id": "a", "text": "Azure AI User"}, {"id": "b", "text": "Azure AI Project Manager"}, {"id": "c", "text": "Azure AI Account Owner"}, {"id": "d", "text": "Cognitive Services Contributor"}], "correct": "a"}, {"id": "B2", "prompt": "An IT administrator who needs to create new Foundry accounts, deploy/manage models, and assign the Azure AI User role to others should be assigned the _____ role.", "options": [{"id": "a", "text": "Azure AI User"}, {"id": "b", "text": "Azure AI Project Manager"}, {"id": "c", "text": "Azure AI Account Owner"}, {"id": "d", "text": "Azure AI Owner"}], "correct": "c"}, {"id": "B3", "prompt": "To publish agents in Microsoft Foundry, the minimum required Foundry-specific built-in role is _____.", "options": [{"id": "a", "text": "Azure AI User"}, {"id": "b", "text": "Azure AI Project Manager"}, {"id": "c", "text": "Reader"}, {"id": "d", "text": "Contributor"}], "correct": "b"}], "explanation": "According to the Foundry RBAC documentation: (B1) Azure AI User is the least-privilege Foundry role, granting reader access and data actions (build/develop) within a project — but no model management or account creation. (B2) Azure AI Account Owner grants create Foundry accounts, create projects, manage models, and the ability to assign the Azure AI User role — ideal for IT managers. (B3) The documentation states: 'To publish agents, you need the Azure AI Project Manager role (minimum) on the Foundry resource scope.' Note: the documentation also warns not to use roles starting with 'Cognitive Services' for Foundry scenarios.", "source": {"path": "Microsoft Foundry documentation", "module": "Microsoft Foundry documentation", "unit": "Role-based access control for Microsoft Foundry", "url": "https://learn.microsoft.com/en-us/azure/foundry/concepts/rbac-foundry"}},
  {"id": 193, "topic": "plan-and-manage", "type": "mc_single", "question": "A developer needs to fine-tune an Azure OpenAI model in Microsoft Foundry. This requires both data plane permissions (building in a project) AND control plane permissions (deploying the fine-tuned model). Which single built-in Foundry role satisfies both requirements?", "options": [{"id": "A", "text": "Azure AI Account Owner"}, {"id": "B", "text": "Azure AI Project Manager"}, {"id": "C", "text": "Azure AI Owner"}, {"id": "D", "text": "Contributor"}], "correct": ["C"], "explanation": "The RBAC Foundry documentation states: 'To fine-tune a model in Foundry, you need both data plane and control plane permissions. Deploying a fine-tuned model is a control plane permission. Therefore, the only built-in role with both data plane and control plane permissions is the Azure AI Owner role.' The Azure AI Account Owner has control plane (manage models) but lacks data actions. The Azure AI Project Manager has data actions but cannot manage models. The standard Contributor role has control plane permissions but not data plane actions.", "source": {"path": "Microsoft Foundry documentation", "module": "Microsoft Foundry documentation", "unit": "Role-based access control for Microsoft Foundry", "url": "https://learn.microsoft.com/en-us/azure/foundry/concepts/rbac-foundry"}},
  {"id": 194, "topic": "plan-and-manage", "type": "mc_multi", "question": "An organization wants to grant a team lead the ability to: (1) create projects in Microsoft Foundry, (2) publish AI agents, and (3) assign the Azure AI User role to team members. Which TWO built-in roles together cover all three requirements with least privilege?", "options": [{"id": "A", "text": "Azure AI Owner — assigned at Foundry resource scope"}, {"id": "B", "text": "Azure AI Project Manager — assigned at Foundry resource scope"}, {"id": "C", "text": "Azure AI Account Owner — assigned at Foundry resource scope"}, {"id": "D", "text": "Azure AI User — assigned at Foundry project scope"}], "correct": ["B", "D"], "explanation": "The Azure AI Project Manager role enables creating projects, publishing agents, and assigning the Azure AI User role (conditional assignment). However, to also build and develop within the project (data actions), the team lead also needs the Azure AI User role at the project scope. The RBAC documentation notes: 'Azure AI Project Manager: Lets you perform management actions on Foundry projects, build and develop with projects, and conditionally assign the Azure AI User role.' The Azure AI Owner is highly privileged beyond what is needed. Azure AI Account Owner does not have the build/develop data actions. Assigning Azure AI User at project scope adds the data plane permissions.", "source": {"path": "Microsoft Foundry documentation", "module": "Microsoft Foundry documentation", "unit": "Role-based access control for Microsoft Foundry", "url": "https://learn.microsoft.com/en-us/azure/foundry/concepts/rbac-foundry"}},
  {"id": 195, "topic": "plan-and-manage", "type": "mc_single", "question": "Azure AI Content Safety's Analyze Text API returns severity scores for detected harm categories. What is the full severity scale range used for text content analysis?", "options": [{"id": "A", "text": "0 to 3 (four levels: safe, low, medium, high)"}, {"id": "B", "text": "0 to 5 (six discrete levels)"}, {"id": "C", "text": "0 to 7 (eight levels, covering the full scale)"}, {"id": "D", "text": "1 to 10 (ten levels)"}], "correct": ["C"], "explanation": "The Azure AI Content Safety harm categories documentation states: 'The current version of the text model supports the full 0-7 severity scale.' This gives eight severity levels (0 through 7 inclusive). For convenience, the API can also return a trimmed scale of 0, 2, 4, and 6 where adjacent levels are mapped (0-1 → 0, 2-3 → 2, 4-5 → 4, 6-7 → 6). Images use only the trimmed 0/2/4/6 scale.", "source": {"path": "Azure AI Content Safety documentation", "module": "Azure AI Content Safety documentation", "unit": "Harm categories in Azure AI Content Safety", "url": "https://learn.microsoft.com/en-us/azure/ai-services/content-safety/concepts/harm-categories"}},
  {"id": 196, "topic": "plan-and-manage", "type": "mc_single", "question": "You are building a generative AI application and need to detect when a user's prompt attempts to manipulate the LLM into ignoring its safety instructions (a jailbreak attack). Which Azure AI Content Safety feature should you use?", "options": [{"id": "A", "text": "Analyze Text API with the Violence category filter"}, {"id": "B", "text": "Groundedness Detection API"}, {"id": "C", "text": "Prompt Shields"}, {"id": "D", "text": "Protected Material Text Detection"}], "correct": ["C"], "explanation": "The Azure AI Content Safety overview documentation describes Prompt Shields as the feature that 'scans text for the risk of a User input attack on a Large Language Model.' Jailbreak attacks are user input attacks designed to circumvent LLM safety guardrails, making Prompt Shields the correct feature. Groundedness Detection checks whether LLM responses are grounded in source material. Protected Material Detection identifies known copyrighted text in AI output. The Analyze Text API identifies harm categories (hate, sexual, violence, self-harm) but is not designed for jailbreak detection.", "source": {"path": "Azure AI Content Safety documentation", "module": "Azure AI Content Safety documentation", "unit": "What is Azure AI Content Safety?", "url": "https://learn.microsoft.com/en-us/azure/ai-services/content-safety/overview"}},
  {"id": 197, "topic": "plan-and-manage", "type": "mc_single", "question": "An AI application requires moderation of both text and images. The development team wants to test the Azure AI Content Safety APIs interactively, explore sample code, and configure custom blocklists before integrating into their app. Which tool should they use?", "options": [{"id": "A", "text": "Microsoft Foundry portal Playground"}, {"id": "B", "text": "Azure AI Content Safety Studio (contentsafety.cognitive.azure.com)"}, {"id": "C", "text": "Azure Machine Learning Designer"}, {"id": "D", "text": "Azure OpenAI Studio content filter configuration page"}], "correct": ["B"], "explanation": "The Azure AI Content Safety overview describes Content Safety Studio as 'an online tool designed to handle potentially offensive, risky, or undesirable content' that 'provides templates and customized workflows, enabling users to choose and build their own content moderation system.' It allows uploading content, testing with samples, viewing code examples, and configuring blocklists. It is accessible at contentsafety.cognitive.azure.com. The Foundry portal and Azure OpenAI Studio have content filter settings but are not the dedicated multi-modal content safety exploration tool described in the documentation.", "source": {"path": "Azure AI Content Safety documentation", "module": "Azure AI Content Safety documentation", "unit": "What is Azure AI Content Safety?", "url": "https://learn.microsoft.com/en-us/azure/ai-services/content-safety/overview"}},
  {"id": 198, "topic": "plan-and-manage", "type": "sequence", "question": "You need to enable diagnostic logging for an Azure AI services resource and route logs to both a Log Analytics workspace and Azure Storage. Arrange the following steps in the correct order.", "items": [{"id": "S1", "text": "In the Azure portal, navigate to the Foundry resource and select 'Diagnostic settings' under Monitoring in the left menu"}, {"id": "S2", "text": "Select '+ Add diagnostic setting'"}, {"id": "S3", "text": "Select the 'Audit', 'RequestResponse', and 'AllMetrics' log categories and set the retention period"}, {"id": "S4", "text": "Enter a name for the setting, then select 'Archive to a storage account' and 'Send to Log Analytics', and configure the target storage account and OMS workspace"}, {"id": "S5", "text": "Select Save"}], "correct_order": ["S1", "S2", "S4", "S3", "S5"], "explanation": "The Azure AI services diagnostic logging documentation describes this sequence: (1) Navigate to the Foundry resource and select Diagnostic settings under Monitoring; (2) Select '+ Add diagnostic setting' (unless editing an existing one); (3) Enter a name and configure the destinations (Archive to storage and Send to Log Analytics) with the target accounts; (4) Select the log categories (Audit, RequestResponse, AllMetrics) and set retention period; (5) Select Save. Note: entering the name and configuring destinations (step 4 in the document) precedes selecting log categories (step 6 in the document).", "source": {"path": "Azure AI services documentation", "module": "Azure AI services documentation", "unit": "Enable diagnostic logging for Azure AI services", "url": "https://learn.microsoft.com/en-us/azure/ai-services/diagnostic-logging"}},
  {"id": 199, "topic": "plan-and-manage", "type": "sequence", "question": "An organization needs to set up automated cost alerts for their Microsoft Foundry AI workload to prevent budget overruns. Arrange the following steps in the correct order.", "items": [{"id": "S1", "text": "Search for 'Cost Management' in the Azure portal to navigate to the full Cost Management service"}, {"id": "S2", "text": "Ensure the scope is set to the resource group or subscription containing the Foundry resource"}, {"id": "S3", "text": "Create a budget with appropriate filters (for example, by resource or deployment tags) and set the spending threshold"}, {"id": "S4", "text": "Configure alert conditions and notification recipients (action groups) to be notified when costs approach or exceed thresholds"}, {"id": "S5", "text": "Validate alert thresholds after observing at least one full billing cycle trend before recalibrating"}], "correct_order": ["S1", "S2", "S3", "S4", "S5"], "explanation": "The Foundry cost management documentation describes this best-practice sequence for setting up budget alerts: navigate to Cost Management, scope it correctly to the relevant resource group or subscription, create a budget with appropriate filters, configure the alert conditions and action groups for notifications, then validate and calibrate thresholds after observing normal usage. The documentation also notes: 'Azure OpenAI doesn't currently provide a hard limit functionality; you can start automation from action groups as part of budget notifications' for more advanced cost control.", "source": {"path": "Microsoft Foundry documentation", "module": "Microsoft Foundry documentation", "unit": "Plan and manage costs for Microsoft Foundry", "url": "https://learn.microsoft.com/en-us/azure/foundry/concepts/manage-costs"}},
  {"id": 200, "topic": "plan-and-manage", "type": "hotspot", "question": "Complete the following sentences about Azure AI Content Safety by selecting the correct value for each blank.", "blanks": [{"id": "B1", "prompt": "Azure AI Content Safety recognizes _____ distinct categories of objectionable content for both text and images.", "options": [{"id": "a", "text": "three (Hate, Sexual, Violence)"}, {"id": "b", "text": "four (Hate and Fairness, Sexual, Violence, Self-Harm)"}, {"id": "c", "text": "five (Hate, Sexual, Violence, Self-Harm, Misinformation)"}, {"id": "d", "text": "six (Hate, Sexual, Violence, Self-Harm, Spam, Phishing)"}], "correct": "b"}, {"id": "B2", "prompt": "The Azure AI Content Safety Analyze Image API returns severity scores using the _____ severity scale.", "options": [{"id": "a", "text": "full 0-7 scale"}, {"id": "b", "text": "trimmed 0, 2, 4, 6 scale only"}, {"id": "c", "text": "binary 0 or 1 scale"}, {"id": "d", "text": "1-5 scale"}], "correct": "b"}, {"id": "B3", "prompt": "The maximum text input length for the Azure AI Content Safety Analyze Text API is _____ characters by default.", "options": [{"id": "a", "text": "1,000"}, {"id": "b", "text": "5,000"}, {"id": "c", "text": "10,000"}, {"id": "d", "text": "55,000"}], "correct": "c"}], "explanation": "According to the Azure AI Content Safety documentation: (B1) The service recognizes exactly four harm categories: Hate and Fairness (API term: Hate), Sexual, Violence, and Self-Harm. (B2) The image model returns severity using the trimmed scale of 0, 2, 4, and 6 only — not the full 0-7 range used by the text model. (B3) The default maximum input length for the Analyze Text API is 10,000 characters; longer texts must be split before submission.", "source": {"path": "Azure AI Content Safety documentation", "module": "Azure AI Content Safety documentation", "unit": "Harm categories in Azure AI Content Safety", "url": "https://learn.microsoft.com/en-us/azure/ai-services/content-safety/concepts/harm-categories"}},
  {"id": 201, "topic": "knowledge-mining", "type": "mc_single", "question": "Which Azure AI Search index field attribute controls whether a field can be used to narrow results using user-interface facet panels?", "options": [{"id": "A", "text": "filterable"}, {"id": "B", "text": "sortable"}, {"id": "C", "text": "facetable"}, {"id": "D", "text": "searchable"}], "correct": ["C"], "explanation": "The 'facetable' attribute marks fields that can be used to determine values for facets — user-interface elements used to filter results based on a list of known field values. 'filterable' allows fields in OData filter expressions but does not build facet lists by itself.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Create an Azure AI Search solution", "unit": "Understand search components", "url": "https://learn.microsoft.com/en-us/training/modules/create-azure-cognitive-search-solution/3-search-components?pivots=text"}},
  {"id": 202, "topic": "knowledge-mining", "type": "mc_single", "question": "By default, which field attribute is applied to ALL fields in an Azure AI Search index unless explicitly removed?", "options": [{"id": "A", "text": "searchable"}, {"id": "B", "text": "filterable"}, {"id": "C", "text": "facetable"}, {"id": "D", "text": "retrievable"}], "correct": ["D"], "explanation": "According to the unit, all fields are retrievable by default — they will be included in search results — unless the retrievable attribute is explicitly removed. The other attributes (searchable, filterable, facetable) must be explicitly set.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Create an Azure AI Search solution", "unit": "Understand search components", "url": "https://learn.microsoft.com/en-us/training/modules/create-azure-cognitive-search-solution/3-search-components?pivots=text"}},
  {"id": 203, "topic": "knowledge-mining", "type": "sequence", "question": "Arrange the four stages of query processing in Azure AI Search in the correct order.", "items": [{"id": "S1", "text": "Query parsing"}, {"id": "S2", "text": "Lexical analysis"}, {"id": "S3", "text": "Document retrieval"}, {"id": "S4", "text": "Scoring"}], "correct_order": ["S1", "S2", "S3", "S4"], "explanation": "Query processing follows four sequential stages: (1) Query parsing — the search expression is reconstructed as a tree of subqueries; (2) Lexical analysis — terms are normalised (lowercased, stopwords removed, stemming applied); (3) Document retrieval — matched documents are identified; (4) Scoring — a TF/IDF relevance score is assigned to each result.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Create an Azure AI Search solution", "unit": "Search an index", "url": "https://learn.microsoft.com/en-us/training/modules/create-azure-cognitive-search-solution/5-search-index?pivots=text"}},
  {"id": 204, "topic": "knowledge-mining", "type": "mc_single", "question": "A developer wants search results that contain BOTH words 'comfortable' and 'hotel'. Which searchMode parameter value should be used?", "options": [{"id": "A", "text": "Any"}, {"id": "B", "text": "All"}, {"id": "C", "text": "And"}, {"id": "D", "text": "Full"}], "correct": ["B"], "explanation": "The searchMode parameter controls multi-term matching. 'Any' returns documents that contain at least one of the terms; 'All' requires every term to be present. Setting searchMode=All ensures documents contain both 'comfortable' and 'hotel'.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Create an Azure AI Search solution", "unit": "Search an index", "url": "https://learn.microsoft.com/en-us/training/modules/create-azure-cognitive-search-solution/5-search-index?pivots=text"}},
  {"id": 205, "topic": "knowledge-mining", "type": "mc_single", "question": "During the Azure AI Search indexing process, which step is responsible for extracting images from PDF files and placing them in the normalized_images collection?", "options": [{"id": "A", "text": "Skillset execution"}, {"id": "B", "text": "Output field mapping"}, {"id": "C", "text": "Document cracking"}, {"id": "D", "text": "Lexical analysis"}], "correct": ["C"], "explanation": "Document cracking is the first stage of indexing. When the indexer is configured with imageAction, it opens files (such as PDFs) and extracts both text and image data. Images are placed in the normalized_images collection at this stage, before skillset execution.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Create an Azure AI Search solution", "unit": "Understand the indexing process", "url": "https://learn.microsoft.com/en-us/training/modules/create-azure-cognitive-search-solution/4-indexing-process?pivots=text"}},
  {"id": 206, "topic": "knowledge-mining", "type": "mc_single", "question": "In an Azure AI Search enrichment pipeline, how are the output fields produced by skills mapped into the final search index?", "options": [{"id": "A", "text": "Implicit field mappings automatically match skill output names to index fields with the same name"}, {"id": "B", "text": "Output field mappings must be explicitly defined to map hierarchical skill outputs to target index fields"}, {"id": "C", "text": "Skills write directly into index fields without any mapping configuration"}, {"id": "D", "text": "A Shaper skill is required to flatten all skill outputs before they can be indexed"}], "correct": ["B"], "explanation": "Output fields from skills in the skillset are explicitly mapped from their hierarchical location in the enriched document tree to the target field in the index. Unlike direct source fields which can use implicit mappings, skill outputs always require explicit output field mappings.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Create an Azure AI Search solution", "unit": "Understand the indexing process", "url": "https://learn.microsoft.com/en-us/training/modules/create-azure-cognitive-search-solution/4-indexing-process?pivots=text"}},
  {"id": 207, "topic": "knowledge-mining", "type": "hotspot", "question": "A developer is defining a knowledge store in a skillset JSON. For each blank, select the correct value.", "blanks": [{"id": "B1", "prompt": "The top-level JSON property added to a skillset definition to configure a knowledge store is:", "options": [{"id": "a", "text": "knowledgeStore"}, {"id": "b", "text": "projectionStore"}, {"id": "c", "text": "enrichmentStore"}, {"id": "d", "text": "outputStore"}], "correct": "a"}, {"id": "B2", "prompt": "Object and file projections store their data in Azure Storage as:", "options": [{"id": "a", "text": "Azure SQL tables"}, {"id": "b", "text": "Blob containers"}, {"id": "c", "text": "Cosmos DB documents"}, {"id": "d", "text": "Azure Queue messages"}], "correct": "b"}, {"id": "B3", "prompt": "When defining multiple projection types (object, table, file), each type must be defined in a:", "options": [{"id": "a", "text": "Separate projection entry in the projections array"}, {"id": "b", "text": "Single combined projection entry"}, {"id": "c", "text": "Separate skillset definition"}, {"id": "d", "text": "Separate knowledge store definition"}], "correct": "a"}], "explanation": "A knowledge store is defined by adding a 'knowledgeStore' object to the skillset, containing a storageConnectionString and a projections array. Object and file projections store data in Azure Blob containers; table projections use Azure Table Storage. Projection types are mutually exclusive per projection entry — if you create all three kinds, you must include a separate projection for each type.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Create a knowledge store with Azure AI Search", "unit": "Define a knowledge store", "url": "https://learn.microsoft.com/en-us/training/modules/create-knowledge-store-azure-cognitive-search/3-define-knowledge-store?pivots=text"}},
  {"id": 208, "topic": "knowledge-mining", "type": "mc_single", "question": "A developer wants to use the Shaper skill in an Azure AI Search knowledge store pipeline. What is the PRIMARY purpose of the Shaper skill?", "options": [{"id": "A", "text": "To detect the language of each document"}, {"id": "B", "text": "To create a new, simplified field structure from complex enriched document fields for easier projection mapping"}, {"id": "C", "text": "To extract key phrases from merged content fields"}, {"id": "D", "text": "To split large documents into smaller chunks for vector embedding"}], "correct": ["B"], "explanation": "The Shaper skill (#Microsoft.Skills.Util.ShaperSkill) is used to create a new field with a simpler, well-formed JSON structure from the complex, iteratively-built enrichment document. This simplifies mapping enriched fields to knowledge store projections that would otherwise be difficult to express from the raw enrichment hierarchy.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Create a knowledge store with Azure AI Search", "unit": "Define projections", "url": "https://learn.microsoft.com/en-us/training/modules/create-knowledge-store-azure-cognitive-search/2-define-projection-json?pivots=text"}},
  {"id": 209, "topic": "knowledge-mining", "type": "mc_single", "question": "What is the correct @odata.type value for adding a custom skill to an Azure AI Search skillset?", "options": [{"id": "A", "text": "#Microsoft.Skills.Custom.RestApiSkill"}, {"id": "B", "text": "#Microsoft.Skills.Custom.WebApiSkill"}, {"id": "C", "text": "#Microsoft.Skills.External.FunctionSkill"}, {"id": "D", "text": "#Microsoft.Skills.Util.CustomSkill"}], "correct": ["B"], "explanation": "To integrate a custom skill into a skillset, you use the '@odata.type' value '#Microsoft.Skills.Custom.WebApiSkill'. This skill type specifies a URI to the custom web API endpoint, along with context, inputs, and outputs.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Create a custom skill for Azure AI Search", "unit": "Add a custom skill", "url": "https://learn.microsoft.com/en-us/training/modules/create-azure-ai-custom-skill/3-add-custom-skill?pivots=text"}},
  {"id": 210, "topic": "knowledge-mining", "type": "mc_single", "question": "In the custom skill input/output schema for Azure AI Search, what property uniquely identifies each document record in both the request and the response?", "options": [{"id": "A", "text": "documentId"}, {"id": "B", "text": "recordId"}, {"id": "C", "text": "sourceId"}, {"id": "D", "text": "itemKey"}], "correct": ["B"], "explanation": "Each document in the custom skill's values array has a 'recordId' property — a unique identifier that must be preserved in the response. The custom skill response should include a record for each input record, matching on 'recordId', along with the output data, errors, and warnings.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Create a custom skill for Azure AI Search", "unit": "Define the custom skill schema", "url": "https://learn.microsoft.com/en-us/training/modules/create-azure-ai-custom-skill/2-define-custom-skill-schema?pivots=text"}},
  {"id": 211, "topic": "knowledge-mining", "type": "sequence", "question": "Place the following steps to configure integrated vectorization with indexer-based indexing in Azure AI Search in the correct order.", "items": [{"id": "S1", "text": "Create a data source connection to a supported Azure data source"}, {"id": "S2", "text": "Create a skillset with Text Split and an embedding skill (e.g., AzureOpenAIEmbedding)"}, {"id": "S3", "text": "Create a search index with a vectorizer assigned to vector fields"}, {"id": "S4", "text": "Create and run (or schedule) an indexer to drive the entire pipeline"}], "correct_order": ["S1", "S2", "S3", "S4"], "explanation": "The integrated vectorization workflow for indexer-based indexing requires: (1) a data source connection, (2) a skillset with a chunking skill and an embedding skill, (3) a search index schema with a vectorizer configured for query time on vector fields, and (4) an indexer to orchestrate data retrieval, skillset execution, and indexing.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Azure AI Search documentation", "unit": "Integrated vectorization in Azure AI Search", "url": "https://learn.microsoft.com/en-us/azure/search/vector-search-integrated-vectorization"}},
  {"id": 212, "topic": "knowledge-mining", "type": "mc_single", "question": "In Azure AI Search integrated vectorization, which component is configured in the index schema and is responsible for automatically converting text query strings to vectors at query time?", "options": [{"id": "A", "text": "AzureOpenAIEmbeddingSkill"}, {"id": "B", "text": "Text Split skill"}, {"id": "C", "text": "Vectorizer"}, {"id": "D", "text": "Semantic configuration"}], "correct": ["C"], "explanation": "A vectorizer is defined in the index schema and assigned to a vector field. It automatically converts a text query string into a vector at query time using the same embedding model that was used during indexing. The AzureOpenAIEmbeddingSkill is used during indexing in the skillset, not at query time.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Azure AI Search documentation", "unit": "Integrated vectorization in Azure AI Search", "url": "https://learn.microsoft.com/en-us/azure/search/vector-search-integrated-vectorization"}},
  {"id": 213, "topic": "knowledge-mining", "type": "mc_single", "question": "Semantic ranking in Azure AI Search processes the top results from BM25. What is the maximum number of BM25 results that semantic ranking considers?", "options": [{"id": "A", "text": "10"}, {"id": "B", "text": "25"}, {"id": "C", "text": "50"}, {"id": "D", "text": "100"}], "correct": ["C"], "explanation": "Semantic ranking takes the top 50 results from the BM25 ranking results. The fields are converted into text strings trimmed to 256 unique tokens each and passed to machine reading comprehension models. If more than 50 results exist, only the top 50 are semantically re-ranked.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Perform search reranking with semantic ranking in Azure AI Search", "unit": "What is semantic ranking?", "url": "https://learn.microsoft.com/en-us/training/modules/use-semantic-search/2-what-is-semantic-search?pivots=text"}},
  {"id": 214, "topic": "knowledge-mining", "type": "mc_multi", "question": "Which TWO outputs can the Azure AI Search semantic ranker add to query results beyond simple re-ranked document scores? (Choose 2)", "options": [{"id": "A", "text": "Semantic captions — highlighted summary sentences extracted verbatim from documents"}, {"id": "B", "text": "Semantic answers — text that appears to answer a question-style query"}, {"id": "C", "text": "Semantic embeddings — vector representation of each result"}, {"id": "D", "text": "Semantic facets — facet counts computed using language models"}], "correct": ["A", "B"], "explanation": "In addition to re-ranking, semantic ranking can return semantic captions (verbatim summary sentences with highlighted relevant text) and semantic answers (when the query appears to be a question and a relevant answer is found in the results). Vector embeddings and language-model-based facets are not outputs of semantic ranking.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Perform search reranking with semantic ranking in Azure AI Search", "unit": "What is semantic ranking?", "url": "https://learn.microsoft.com/en-us/training/modules/use-semantic-search/2-what-is-semantic-search?pivots=text"}},
  {"id": 215, "topic": "knowledge-mining", "type": "hotspot", "question": "A developer is configuring a semantic configuration in the Azure portal. For each blank, select the correct field category.", "blanks": [{"id": "B1", "prompt": "The field that describes what the document is about (e.g., a title or heading field) should be placed in:", "options": [{"id": "a", "text": "Title field"}, {"id": "b", "text": "Content fields"}, {"id": "c", "text": "Keyword fields"}, {"id": "d", "text": "Filter fields"}], "correct": "a"}, {"id": "B2", "prompt": "Fields containing key phrases extracted during indexing should be placed in:", "options": [{"id": "a", "text": "Title field"}, {"id": "b", "text": "Content fields"}, {"id": "c", "text": "Keyword fields"}, {"id": "d", "text": "Filter fields"}], "correct": "c"}], "explanation": "A semantic configuration has three field categories: Title field (describes the document), Content fields (main body content used for captions and answers), and Keyword fields (fields with key phrases). Correct classification helps the semantic ranker prioritise the most relevant text during machine reading comprehension.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Perform search reranking with semantic ranking in Azure AI Search", "unit": "Set up semantic ranking", "url": "https://learn.microsoft.com/en-us/training/modules/use-semantic-search/3-set-up-semantic-search?pivots=text"}},
  {"id": 216, "topic": "knowledge-mining", "type": "mc_single", "question": "An Azure AI Search developer uses the Lucene full query syntax to write: `Description:luxury OR Category:luxury^3`. What does the `^3` accomplish?", "options": [{"id": "A", "text": "Limits results to only three documents"}, {"id": "B", "text": "Applies a boost multiplier of 3 to documents where 'luxury' appears in the Category field, increasing their relevance score"}, {"id": "C", "text": "Requires the term 'luxury' to appear exactly 3 times in the Category field"}, {"id": "D", "text": "Sets the scoring profile weight for the Category field to 3"}], "correct": ["B"], "explanation": "In Lucene full query syntax, the caret (^) followed by a number is the term boosting operator. `Category:luxury^3` multiplies the relevance score contribution of matching the Category field with 'luxury' by 3, promoting Category matches higher in results compared to Description matches.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Implement advanced search features in Azure AI Search", "unit": "Improve the ranking of a document with term boosting", "url": "https://learn.microsoft.com/en-us/training/modules/implement-advanced-search-features-azure-cognitive-search/02-improve-ranking-of-document-term-boosting?pivots=text"}},
  {"id": 217, "topic": "knowledge-mining", "type": "mc_single", "question": "Which scoring profile function should be used in Azure AI Search to automatically boost newer documents over older ones based on a date field?", "options": [{"id": "A", "text": "Magnitude"}, {"id": "B", "text": "Distance"}, {"id": "C", "text": "Freshness"}, {"id": "D", "text": "Tag"}], "correct": ["C"], "explanation": "The Freshness function alters document scores based on how recent the document is, using a DateTimeOffset field. Magnitude uses a numeric range, Distance uses a GeographyPoint field, and Tag uses common tag values between the document and the query.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Implement advanced search features in Azure AI Search", "unit": "Improve the relevance of results by adding scoring profiles", "url": "https://learn.microsoft.com/en-us/training/modules/implement-advanced-search-features-azure-cognitive-search/03-improve-relevance-of-results-add-score-profiles?pivots=text"}},
  {"id": 218, "topic": "knowledge-mining", "type": "mc_single", "question": "How do you apply a specific scoring profile to a single query at query time in Azure AI Search, rather than relying on the default profile?", "options": [{"id": "A", "text": "Add &queryType=full to the query string"}, {"id": "B", "text": "Add &scoringProfile=PROFILE_NAME to the query string"}, {"id": "C", "text": "Add a weight parameter to the search expression"}, {"id": "D", "text": "Set the default profile flag on the desired profile in the index definition"}], "correct": ["B"], "explanation": "To apply a specific scoring profile to a query, append the '&scoringProfile=PROFILE_NAME' parameter to the query string. If no profile is specified, the default profile (if one is set) is applied. You can have up to 100 scoring profiles on a search index.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Implement advanced search features in Azure AI Search", "unit": "Improve the relevance of results by adding scoring profiles", "url": "https://learn.microsoft.com/en-us/training/modules/implement-advanced-search-features-azure-cognitive-search/03-improve-relevance-of-results-add-score-profiles?pivots=text"}},
  {"id": 219, "topic": "knowledge-mining", "type": "sequence", "question": "Arrange the four stages of an Azure AI Search indexer pipeline in the correct execution order.", "items": [{"id": "S1", "text": "Document cracking — extract text and images from source files"}, {"id": "S2", "text": "Field mappings — map source fields to index or knowledge store destination fields"}, {"id": "S3", "text": "Skillset execution — apply AI enrichment skills"}, {"id": "S4", "text": "Output field mappings — map enriched document tree paths to index fields"}], "correct_order": ["S1", "S2", "S3", "S4"], "explanation": "The indexer pipeline proceeds: (1) Document cracking opens files and extracts content; (2) Field mappings send source field values to destination fields as-is; (3) Skillset execution applies AI transformations (OCR, NLP, embeddings, custom skills); (4) Output field mappings route enriched skill outputs from the enriched document tree into index fields.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Azure AI Search documentation", "unit": "Indexers in Azure AI Search", "url": "https://learn.microsoft.com/en-us/azure/search/search-indexer-overview"}},
  {"id": 220, "topic": "knowledge-mining", "type": "mc_single", "question": "An Azure AI Search indexer is configured to index Azure Blob Storage. Which statement about change detection for subsequent indexer runs is correct?", "options": [{"id": "A", "text": "Change detection is not supported for any data source; the indexer always does a full reindex"}, {"id": "B", "text": "For blob data, change detection is automatic; for Azure SQL and Cosmos DB, it must be enabled explicitly"}, {"id": "C", "text": "Change detection works automatically for Azure SQL and Cosmos DB but must be enabled for blob storage"}, {"id": "D", "text": "Change detection requires a custom skill to compare document hashes"}], "correct": ["B"], "explanation": "For blob data, change detection is automatic — the indexer detects new and modified blobs without configuration. For other data sources such as Azure SQL or Azure Cosmos DB, change detection must be explicitly enabled via change detection policies.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Azure AI Search documentation", "unit": "Indexers in Azure AI Search", "url": "https://learn.microsoft.com/en-us/azure/search/search-indexer-overview"}},
  {"id": 221, "topic": "knowledge-mining", "type": "mc_single", "question": "In Azure AI Search, what is an embedding and why must the same embedding model be used for both indexing and querying?", "options": [{"id": "A", "text": "An embedding is a compressed binary representation of a document; models differ only in compression ratio"}, {"id": "B", "text": "An embedding is an array of numbers representing the semantic meaning of text; similar items are close together in the embedding space, which only holds when the same model is used"}, {"id": "C", "text": "An embedding is a hash of document tokens; the model just determines the hash function"}, {"id": "D", "text": "An embedding is a sparse vector produced by BM25 scoring; any model can query it"}], "correct": ["B"], "explanation": "An embedding is a numerical array (vector) that represents the semantic meaning of text. In embedding space, semantically similar items are located close together. For similarity search to work correctly, query vectors must live in the same embedding space as the indexed document vectors, which requires using the same model for both indexing and querying.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Perform vector search and retrieval in Azure AI Search", "unit": "Understand embedding", "url": "https://learn.microsoft.com/en-us/training/modules/improve-search-results-vector-search/4-understand-embedding?pivots=text"}},
  {"id": 222, "topic": "knowledge-mining", "type": "mc_single", "question": "Hybrid search in Azure AI Search runs full-text and vector searches in parallel. Which algorithm is used to merge their separate result sets into a single ranked response?", "options": [{"id": "A", "text": "BM25 (Best Match 25)"}, {"id": "B", "text": "HNSW (Hierarchical Navigable Small World)"}, {"id": "C", "text": "RRF (Reciprocal Rank Fusion)"}, {"id": "D", "text": "TF-IDF (Term Frequency–Inverse Document Frequency)"}], "correct": ["C"], "explanation": "Hybrid search uses Reciprocal Rank Fusion (RRF) to merge the ranked result sets from full-text search (which uses BM25) and vector search (which uses HNSW or exhaustive KNN). RRF produces a single unified result set with a combined relevance score.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Azure AI Search documentation", "unit": "Hybrid search in Azure AI Search", "url": "https://learn.microsoft.com/en-us/azure/search/hybrid-search-overview"}},
  {"id": 223, "topic": "knowledge-mining", "type": "hotspot", "question": "A team is building a hybrid search solution. For each scenario, select whether keyword (full-text) search or vector search is the better primary choice.", "blanks": [{"id": "B1", "prompt": "Finding documents conceptually similar to a user query even when no exact keyword match exists in the index:", "options": [{"id": "a", "text": "Keyword (full-text) search"}, {"id": "b", "text": "Vector search"}], "correct": "b"}, {"id": "B2", "prompt": "Searching for an exact product code like 'SKU-2024-XZ99':", "options": [{"id": "a", "text": "Keyword (full-text) search"}, {"id": "b", "text": "Vector search"}], "correct": "a"}], "explanation": "Vector search finds conceptually or semantically similar content even without keyword matches, making it suited for natural-language queries. Keyword search excels at exact matches for product codes, highly specialised jargon, dates, and proper names, where precision matters over semantic similarity.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Azure AI Search documentation", "unit": "Hybrid search in Azure AI Search", "url": "https://learn.microsoft.com/en-us/azure/search/hybrid-search-overview"}},
  {"id": 224, "topic": "knowledge-mining", "type": "mc_multi", "question": "An organisation wants to secure its Azure AI Search solution. Which TWO mechanisms allow restricting document-level access so that different users see different search results? (Choose 2)", "options": [{"id": "A", "text": "Add a filterable security field to each document containing allowed user or group IDs, then apply a search.in filter on every query"}, {"id": "B", "text": "Create a separate search index per user group and route queries accordingly"}, {"id": "C", "text": "Use Azure AD (Microsoft Entra ID) group memberships together with the security field filter to dynamically trim results"}, {"id": "D", "text": "Set the 'retrievable' attribute to false on sensitive fields to prevent them from appearing in results"}], "correct": ["A", "C"], "explanation": "Document-level security in Azure AI Search is implemented by adding a filterable security field to each document with the allowed user/group IDs, then appending a search.in filter to every query. If the application uses Microsoft Entra ID, group memberships can be used as filter values dynamically, eliminating the need to hard-code them. Setting 'retrievable=false' prevents a field from being returned but does not restrict which documents are matched.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Maintain an Azure AI Search solution", "unit": "Manage security of an Azure AI Search solution", "url": "https://learn.microsoft.com/en-us/training/modules/maintain-azure-cognitive-search-solution/02-manage-security-of-azure-cognitive-search-solution?pivots=text"}},
  {"id": 225, "topic": "knowledge-mining", "type": "sequence", "question": "Arrange the following AI enrichment pipeline steps in the correct order as described in the Azure AI Search AI enrichment documentation.", "items": [{"id": "S1", "text": "Indexer connects to a data source and pulls content (Import)"}, {"id": "S2", "text": "Indexer cracks documents to extract text and images"}, {"id": "S3", "text": "Skillset execution enriches the extracted content"}, {"id": "S4", "text": "Enriched content is indexed into a search index (and optionally a knowledge store)"}], "correct_order": ["S1", "S2", "S3", "S4"], "explanation": "The AI enrichment pipeline follows an Import → Enrich → Index progression: (1) The indexer connects to a data source and pulls documents; (2) Document cracking extracts text and images; (3) Skills in the skillset execute in sequence, building an enriched document tree; (4) Enriched content is ingested into the search index, and optionally into a knowledge store via projections.", "source": {"path": "Implement knowledge mining with Azure AI Search", "module": "Azure AI Search documentation", "unit": "AI enrichment in Azure AI Search", "url": "https://learn.microsoft.com/en-us/azure/search/cognitive-search-concept-intro"}},
  {"id": 226, "topic": "knowledge-mining", "type": "mc_single", "question": "Azure Document Intelligence uses which underlying technology to capture document structure by creating bounding boxes around detected objects in an image?", "options": [{"id": "A", "text": "Natural Language Processing (NLP)"}, {"id": "B", "text": "Optical Character Recognition (OCR)"}, {"id": "C", "text": "Computer Vision object detection"}, {"id": "D", "text": "Named Entity Recognition (NER)"}], "correct": ["B"], "explanation": "Azure Document Intelligence uses Optical Character Recognition (OCR) capabilities combined with deep learning models to extract text, key-value pairs, selection marks, and tables from documents. OCR captures document structure by creating bounding boxes around detected objects in an image, and their locations are recorded as coordinates in relation to the rest of the page.", "source": {"path": "Extract data from forms with Azure Document Intelligence", "module": "Extract data from forms with Azure Document Intelligence", "unit": "What is Azure Document Intelligence?", "url": "https://learn.microsoft.com/en-us/training/modules/work-form-recognizer/2-what-form-recognizer?pivots=text"}},
  {"id": 227, "topic": "knowledge-mining", "type": "mc_single", "question": "Which of the following document input formats is NOT supported by Azure Document Intelligence for analysis?", "options": [{"id": "A", "text": "PDF"}, {"id": "B", "text": "TIFF"}, {"id": "C", "text": "PNG"}, {"id": "D", "text": "MP4"}], "correct": ["D"], "explanation": "Azure Document Intelligence supports JPEG, PNG, BMP, PDF (text or scanned), and TIFF file formats as input. MP4 (video) is not a supported input format. The file size must be less than 500 MB for the paid (S0) tier and 4 MB for the free (F0) tier.", "source": {"path": "Extract data from forms with Azure Document Intelligence", "module": "Extract data from forms with Azure Document Intelligence", "unit": "Get started with Azure Document Intelligence", "url": "https://learn.microsoft.com/en-us/training/modules/work-form-recognizer/3-get-started?pivots=text"}},
  {"id": 228, "topic": "knowledge-mining", "type": "mc_single", "question": "When training a custom Document Intelligence model using the REST API, which three files must be stored in the Azure Blob container alongside the sample forms?", "options": [{"id": "A", "text": "ocr.json, fields.json, and labels.json"}, {"id": "B", "text": "training.json, schema.json, and annotations.json"}, {"id": "C", "text": "model.json, dataset.json, and config.json"}, {"id": "D", "text": "layout.json, extraction.json, and output.json"}], "correct": ["A"], "explanation": "To train a custom model via the REST API, you must store sample forms in an Azure Blob container along with JSON files. You generate an ocr.json file for each sample form using the Analyze document function; you need a single fields.json file describing the fields to extract; and a labels.json file for each sample form mapping the fields to their location in that form.", "source": {"path": "Extract data from forms with Azure Document Intelligence", "module": "Extract data from forms with Azure Document Intelligence", "unit": "Train custom models", "url": "https://learn.microsoft.com/en-us/training/modules/work-form-recognizer/6-train-custom-models?pivots=text"}},
  {"id": 229, "topic": "knowledge-mining", "type": "mc_single", "question": "In Azure Document Intelligence, what does the analyzeResult JSON response contain in the 'pages' array?", "options": [{"id": "A", "text": "Only the raw extracted text without formatting"}, {"id": "B", "text": "Information about the document content including words, lines, and page dimensions"}, {"id": "C", "text": "The trained model ID and version metadata"}, {"id": "D", "text": "Key-value pairs and selection marks from the document"}], "correct": ["B"], "explanation": "A successful analyzeResult JSON response contains 'analyzeResult' with extracted content and an array of pages containing information about the document content. Each page includes details such as page number, angle, width, height, unit, words, and lines. Key-value pairs and document-specific values are found in the documentResults node.", "source": {"path": "Extract data from forms with Azure Document Intelligence", "module": "Extract data from forms with Azure Document Intelligence", "unit": "Use Azure Document Intelligence models", "url": "https://learn.microsoft.com/en-us/training/modules/work-form-recognizer/7-use-models?pivots=text"}},
  {"id": 230, "topic": "knowledge-mining", "type": "mc_single", "question": "Which prebuilt Document Intelligence model is the ONLY one that supports entity extraction (people, organizations, dates)?", "options": [{"id": "A", "text": "Layout model"}, {"id": "B", "text": "Read model"}, {"id": "C", "text": "General document model"}, {"id": "D", "text": "Invoice model"}], "correct": ["C"], "explanation": "The General document model extends the Read model by adding detection of key-value pairs, entities, selection marks, and tables. It is the only prebuilt model to support entity extraction, recognizing entities such as people, organizations, and dates. The Layout model extracts text and structure but not named entities.", "source": {"path": "Use prebuilt Document Intelligence models", "module": "Use prebuilt Document Intelligence models", "unit": "Use the General Document, Read, and Layout models", "url": "https://learn.microsoft.com/en-us/training/modules/use-prebuilt-form-recognizer-models/3-use-general-document-read-layout-models?pivots=text"}},
  {"id": 231, "topic": "knowledge-mining", "type": "mc_single", "question": "What advantage does the Layout model provide over the Read model for digitized documents?", "options": [{"id": "A", "text": "It can detect the language of text lines"}, {"id": "B", "text": "It extracts text, selection marks, and tables including complex structures with merged cells"}, {"id": "C", "text": "It identifies named entities such as people and organizations"}, {"id": "D", "text": "It extracts key-value pairs from unstructured documents"}], "correct": ["B"], "explanation": "The Layout model extracts text AND returns selection marks and tables from the input image or PDF file. It can handle tables with complicated structures including those with or without headers, cells that span columns or rows, and incomplete columns or rows. Each table cell is extracted with its content, bounding box, header indicators, and row/column position indexes.", "source": {"path": "Use prebuilt Document Intelligence models", "module": "Use prebuilt Document Intelligence models", "unit": "Use the General Document, Read, and Layout models", "url": "https://learn.microsoft.com/en-us/training/modules/use-prebuilt-form-recognizer-models/3-use-general-document-read-layout-models?pivots=text"}},
  {"id": 232, "topic": "knowledge-mining", "type": "mc_multi", "question": "Which TWO of the following prebuilt model types are specifically trained on structured form types (rather than general document analysis) in Azure Document Intelligence? (Select all that apply.)", "options": [{"id": "A", "text": "Invoice model"}, {"id": "B", "text": "Read model"}, {"id": "C", "text": "Business card model"}, {"id": "D", "text": "General document model"}], "correct": ["A", "C"], "explanation": "The Invoice model and Business card model are trained on specific form types and extract fixed sets of fields (e.g., CustomerName and InvoiceTotal for invoices; first/last names, postal addresses, email for business cards). The Read and General document models are designed for documents with less specific or unpredictable structures.", "source": {"path": "Use prebuilt Document Intelligence models", "module": "Use prebuilt Document Intelligence models", "unit": "Understand prebuilt models", "url": "https://learn.microsoft.com/en-us/training/modules/use-prebuilt-form-recognizer-models/2-understand-prebuilt-models?pivots=text"}},
  {"id": 233, "topic": "knowledge-mining", "type": "mc_single", "question": "The prebuilt invoice model in Azure Document Intelligence (v3.0 and later) can also process which types of documents beyond standard invoices?", "options": [{"id": "A", "text": "Medical prescriptions and hospital bills"}, {"id": "B", "text": "Utility bills, sales orders, and purchase orders"}, {"id": "C", "text": "Bank statements and mortgage documents"}, {"id": "D", "text": "Driver licenses and passports"}], "correct": ["B"], "explanation": "The Document Intelligence invoice model supports invoices, utility bills, sales orders, and purchase orders. The model uses OCR capabilities to analyze and extract key fields such as customer name, billing address, due date, and amount due, returning structured JSON data.", "source": {"path": "Azure AI Document Intelligence documentation", "module": "Azure AI Document Intelligence documentation", "unit": "Invoice data extraction", "url": "https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/prebuilt/invoice"}},
  {"id": 234, "topic": "knowledge-mining", "type": "mc_single", "question": "What is the model ID string that must be used when calling the Document Intelligence invoice prebuilt model via the REST API?", "options": [{"id": "A", "text": "document-intelligence-invoice"}, {"id": "B", "text": "prebuilt-invoice"}, {"id": "C", "text": "form-recognizer-invoice"}, {"id": "D", "text": "ai-invoice-extraction"}], "correct": ["B"], "explanation": "The model ID for the Document Intelligence invoice prebuilt model is 'prebuilt-invoice'. This model ID is passed when calling the Analyze operation via the REST API or SDKs (Python, Java, JavaScript) to extract invoice data.", "source": {"path": "Azure AI Document Intelligence documentation", "module": "Azure AI Document Intelligence documentation", "unit": "Invoice data extraction", "url": "https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/prebuilt/invoice"}},
  {"id": 235, "topic": "knowledge-mining", "type": "mc_single", "question": "In Document Intelligence v3.0 and later, the receipt model includes special support for which additional document type beyond standard retail receipts?", "options": [{"id": "A", "text": "Restaurant receipts with tip fields"}, {"id": "B", "text": "Single-page hotel receipts with arrival and departure dates"}, {"id": "C", "text": "Airline boarding passes with flight details"}, {"id": "D", "text": "Pharmacy receipts with prescription details"}], "correct": ["B"], "explanation": "In Azure Document Intelligence v3.0 and later, the receipt model supports single-page hotel receipt processing. If a receipt is classified as a hotel receipt, the model extracts extra relevant fields such as arrival and departure dates in addition to standard receipt fields.", "source": {"path": "Azure AI Document Intelligence documentation", "module": "Azure AI Document Intelligence documentation", "unit": "Receipt data extraction", "url": "https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/prebuilt/receipt"}},
  {"id": 236, "topic": "knowledge-mining", "type": "mc_single", "question": "The ID document prebuilt model in Document Intelligence v4.0 supports which of the following identity document categories?", "options": [{"id": "A", "text": "Only US driver licenses and international passports"}, {"id": "B", "text": "Passport books, passport cards, and driver licenses from worldwide regions including US, India, Australia, and others"}, {"id": "C", "text": "Only government-issued IDs from European Union countries"}, {"id": "D", "text": "US Social Security cards and Medicare cards only"}], "correct": ["B"], "explanation": "The Document Intelligence v4.0 ID document model supports identification documents from all regions worldwide. It covers passport books and passport cards worldwide, plus driver licenses, ID cards, residency permits, Social Security cards, and military IDs for the US; driver licenses, PAN cards, and Aadhaar cards for India; driver licenses and photo cards for Australia; and driver licenses and ID cards for other regions.", "source": {"path": "Azure AI Document Intelligence documentation", "module": "Azure AI Document Intelligence documentation", "unit": "Identity document (ID) processing", "url": "https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/prebuilt/id-document"}},
  {"id": 237, "topic": "knowledge-mining", "type": "mc_single", "question": "Which field extracted by the Document Intelligence ID document model contains two lines of 44 characters each from an international passport?", "options": [{"id": "A", "text": "DocumentNumber"}, {"id": "B", "text": "MachineReadableZone"}, {"id": "C", "text": "Nationality"}, {"id": "D", "text": "Region"}], "correct": ["B"], "explanation": "The MachineReadableZone (MRZ) field is extracted from passports and contains two lines of 44 characters each. For example: 'P<USABROOKS<<JENNIFER<<<...'. The Region field is only extracted from driver's licenses, not passports.", "source": {"path": "Azure AI Document Intelligence documentation", "module": "Azure AI Document Intelligence documentation", "unit": "Identity document (ID) processing", "url": "https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/prebuilt/id-document"}},
  {"id": 238, "topic": "knowledge-mining", "type": "mc_single", "question": "Which custom model type in Azure Document Intelligence is best suited for structured or templated forms with a consistent visual layout?", "options": [{"id": "A", "text": "Custom neural model"}, {"id": "B", "text": "Custom classification model"}, {"id": "C", "text": "Custom template model"}, {"id": "D", "text": "Prebuilt general document model"}], "correct": ["C"], "explanation": "Custom template models (formerly custom form) use layout cues to extract values and are suitable for highly structured documents with defined visual templates. They accurately extract labeled key-value pairs, selection marks, tables, regions, and signatures. Custom neural models, in contrast, are better suited for semi-structured or unstructured documents.", "source": {"path": "Azure AI Document Intelligence documentation", "module": "Azure AI Document Intelligence documentation", "unit": "Custom template document model", "url": "https://learn.microsoft.com/en-us/azure/ai-services/document-intelligence/train/custom-template"}},
