  {"id": 61, "topic": "agentic", "type": "mc_single", "question": "In the Model Context Protocol (MCP), what decorator is used on a Python function to expose it as a tool that an MCP server can serve to clients?", "options": [{"id": "A", "text": "@mcp.resource"}, {"id": "B", "text": "@mcp.tool"}, {"id": "C", "text": "@mcp.function"}, {"id": "D", "text": "@mcp.handler"}], "correct": ["B"], "explanation": "The MCP unit on tool discovery states that an MCP server hosts a set of functions that are exposed as tools using the `@mcp.tool` decorator. Tools are a primitive type in MCP that enables servers to expose executable functionality to clients. The other decorators listed are not part of the MCP primitive set described in the unit.", "source": {"path": "Develop AI Agents on Azure", "module": "Integrate MCP Tools with Azure AI Agents", "unit": "Understand MCP tool discovery", "url": "https://learn.microsoft.com/en-us/training/modules/connect-agent-to-mcp-tools/2-understand-mcp-tool-discovery?pivots=text"}},
  {"id": 62, "topic": "agentic", "type": "mc_single", "question": "When an MCP client connects to an MCP server, what method does it call to retrieve the list of available tools before registering them with the Azure AI Agent?", "options": [{"id": "A", "text": "session.get_tools()"}, {"id": "B", "text": "session.fetch_catalog()"}, {"id": "C", "text": "session.list_tools()"}, {"id": "D", "text": "session.discover_tools()"}], "correct": ["C"], "explanation": "According to the MCP client-server setup unit, the MCP client initializes an MCP client session and then discovers available tools from the MCP server using `session.list_tools()`. The client then generates Python function stubs that wrap the tools and registers those functions with the agent. The other method names are not described in this unit.", "source": {"path": "Develop AI Agents on Azure", "module": "Integrate MCP Tools with Azure AI Agents", "unit": "Integrate agent tools using an MCP server and client", "url": "https://learn.microsoft.com/en-us/training/modules/connect-agent-to-mcp-tools/3-mcp-client-server-setup?pivots=text"}},
  {"id": 63, "topic": "agentic", "type": "mc_single", "question": "When using the Azure AI Agent Service's built-in `MCPTool` class to connect an agent to a remote MCP server, which `require_approval` parameter value causes the agent to pause and wait for developer approval before invoking **any** tool call?", "options": [{"id": "A", "text": "\"never\""}, {"id": "B", "text": "\"on_demand\""}, {"id": "C", "text": "\"always\""}, {"id": "D", "text": "\"selective\""}], "correct": ["C"], "explanation": "The unit on using Azure AI agents with MCP servers states that when `require_approval` is set to `\"always\"`, a developer must provide approval for every call; if no value is provided, `\"always\"` is the default. Setting it to `\"never\"` means no approval is required. The values `\"on_demand\"` and `\"selective\"` are not supported values described in the unit.", "source": {"path": "Develop AI Agents on Azure", "module": "Integrate MCP Tools with Azure AI Agents", "unit": "Use Azure AI agents with MCP servers", "url": "https://learn.microsoft.com/en-us/training/modules/connect-agent-to-mcp-tools/4-use-azure-ai-agents-with-mcp?pivots=text"}},
  {"id": 64, "topic": "agentic", "type": "mc_single", "question": "Foundry IQ is described as a managed knowledge platform for AI agents. Which underlying Azure service does Foundry IQ build on to provide its retrieval capabilities?", "options": [{"id": "A", "text": "Azure Cosmos DB"}, {"id": "B", "text": "Azure SQL Database"}, {"id": "C", "text": "Azure AI Search"}, {"id": "D", "text": "Azure Blob Storage"}], "correct": ["C"], "explanation": "The Explore Foundry IQ unit explicitly states that Foundry IQ is a managed knowledge platform for AI agents built on Azure AI Search. It provides retrieval-augmented generation capabilities as a shared service that multiple agents can use, eliminating the need to build custom RAG infrastructure for every agent. Azure Blob Storage is a data source that Foundry IQ can connect to, not its underlying platform.", "source": {"path": "Develop AI Agents on Azure", "module": "Build knowledge-enhanced AI agents with Foundry IQ", "unit": "Explore Foundry IQ", "url": "https://learn.microsoft.com/en-us/training/modules/introduction-foundry-iq/3-foundry-iq?pivots=text"}},
  {"id": 65, "topic": "agentic", "type": "mc_multi", "question": "A developer needs to add a Foundry IQ knowledge base data source for SharePoint content. Which **two** SharePoint access types does Foundry IQ support, each suited to different retrieval needs?", "options": [{"id": "A", "text": "SharePoint Remote — real-time queries that always respect SharePoint permissions and require no index maintenance"}, {"id": "B", "text": "SharePoint Indexed — content preprocessed into Azure AI Search for faster retrieval and custom pipelines"}, {"id": "C", "text": "SharePoint Cached — periodic snapshots stored in Azure Blob Storage for offline access"}, {"id": "D", "text": "SharePoint Stream — live streaming of SharePoint document updates via Azure Event Hubs"}], "correct": ["A", "B"], "explanation": "The Configure data sources unit details two SharePoint options. SharePoint Remote provides real-time queries that automatically respect existing SharePoint permissions with no index maintenance required. SharePoint Indexed preprocesses SharePoint content into an Azure AI Search index, enabling faster response times, custom analyzers, and advanced search pipelines. The 'SharePoint Cached' and 'SharePoint Stream' options are not described in this unit.", "source": {"path": "Develop AI Agents on Azure", "module": "Build knowledge-enhanced AI agents with Foundry IQ", "unit": "Configure data sources for knowledge bases", "url": "https://learn.microsoft.com/en-us/training/modules/introduction-foundry-iq/4-data-requirements?pivots=text"}},
  {"id": 66, "topic": "agentic", "type": "mc_single", "question": "When configuring Foundry IQ retrieval, an agent's instructions are described as the primary mechanism for controlling retrieval behavior. Which three behaviors must effective retrieval instructions specify?", "options": [{"id": "A", "text": "The model temperature, the maximum token limit, and the retry count"}, {"id": "B", "text": "When to retrieve, how to cite sources, and what to do when information is not found"}, {"id": "C", "text": "The vector dimension size, the chunk overlap percentage, and the embedding model name"}, {"id": "D", "text": "The data source type, the indexing schedule, and the semantic ranking threshold"}], "correct": ["B"], "explanation": "The Configure retrieval with Foundry IQ unit states that effective instructions must specify three critical behaviors: (1) when to retrieve — telling the agent to always use the knowledge base and never rely on training data; (2) how to cite — specifying the exact format for source attribution; and (3) what to do when the knowledge base doesn't contain the answer — defining fallback behavior. The other answer choices describe infrastructure or model settings, not the instruction-level controls described in the unit.", "source": {"path": "Develop AI Agents on Azure", "module": "Build knowledge-enhanced AI agents with Foundry IQ", "unit": "Configure retrieval with Foundry IQ", "url": "https://learn.microsoft.com/en-us/training/modules/introduction-foundry-iq/5-configure-retrieval?pivots=text"}},
  {"id": 67, "topic": "agentic", "type": "sequence", "question": "When using the Microsoft Agent Framework SDK to implement **concurrent orchestration**, place the following implementation steps in the correct order.", "items": [{"id": "S1", "text": "Create a chat client (e.g., AzureOpenAIChatClient) with credentials"}, {"id": "S2", "text": "Define agent instances using create_agent with specific instructions and names"}, {"id": "S3", "text": "Use ConcurrentBuilder to build a workflow and add agents via participants()"}, {"id": "S4", "text": "Call the workflow's run method with the task input"}, {"id": "S5", "text": "Extract outputs from workflow events using get_outputs()"}], "correct_order": ["S1", "S2", "S3", "S4", "S5"], "explanation": "The Use concurrent orchestration unit provides the following step-by-step implementation order: (1) set up a chat client with credentials; (2) define agent instances via create_agent; (3) use ConcurrentBuilder to build the workflow with agents as participants; (4) call the workflow's run method; (5) process results by extracting outputs with get_outputs(). This sequence reflects the build-then-run pattern described in the unit.", "source": {"path": "Develop AI Agents on Azure", "module": "Orchestrate a multi-agent solution using the Microsoft Agent Framework", "unit": "Use concurrent orchestration", "url": "https://learn.microsoft.com/en-us/training/modules/orchestrate-semantic-kernel-multi-agent-solution/4-use-concurrent-orchestration?pivots=text"}},
  {"id": 68, "topic": "agentic", "type": "mc_single", "question": "In the Microsoft Agent Framework's **group chat orchestration**, a custom group chat manager is created by extending the base `GroupChatManager` class. During each conversation round, in which order does the manager call its methods?", "options": [{"id": "A", "text": "select_next_agent → should_terminate → filter_results → should_request_user_input"}, {"id": "B", "text": "should_request_user_input → should_terminate → filter_results → select_next_agent"}, {"id": "C", "text": "should_terminate → filter_results → should_request_user_input → select_next_agent"}, {"id": "D", "text": "filter_results → should_request_user_input → select_next_agent → should_terminate"}], "correct": ["B"], "explanation": "The Use group chat orchestration unit specifies that during each round the chat manager calls methods in this exact order: (1) should_request_user_input — checks if human input is needed; (2) should_terminate — determines if the conversation should end; (3) filter_results — if ending, summarizes or processes the final conversation; (4) select_next_agent — if continuing, chooses the next agent to speak. This ensures user input and termination conditions are handled before moving the conversation forward.", "source": {"path": "Develop AI Agents on Azure", "module": "Orchestrate a multi-agent solution using the Microsoft Agent Framework", "unit": "Use group chat orchestration", "url": "https://learn.microsoft.com/en-us/training/modules/orchestrate-semantic-kernel-multi-agent-solution/6-use-group-chat-orchestration?pivots=text"}},
  {"id": 69, "topic": "agentic", "type": "mc_single", "question": "A team is building a multi-agent solution where the best agent to handle each part of the task cannot be determined in advance and expertise requirements emerge dynamically during processing. Which Microsoft Agent Framework orchestration pattern is best suited to this scenario?", "options": [{"id": "A", "text": "Sequential orchestration"}, {"id": "B", "text": "Concurrent orchestration"}, {"id": "C", "text": "Group chat orchestration"}, {"id": "D", "text": "Handoff orchestration"}], "correct": ["D"], "explanation": "The Use handoff orchestration unit states that handoff orchestration is ideal when tasks need specialized knowledge but the number or order of agents cannot be determined in advance, and when expertise requirements emerge dynamically during processing. Sequential orchestration uses a fixed, predetermined order. Concurrent orchestration runs all agents simultaneously on the same task. Group chat orchestration is collaborative but does not perform dynamic routing based on content classification.", "source": {"path": "Develop AI Agents on Azure", "module": "Orchestrate a multi-agent solution using the Microsoft Agent Framework", "unit": "Use handoff orchestration", "url": "https://learn.microsoft.com/en-us/training/modules/orchestrate-semantic-kernel-multi-agent-solution/7-use-handoff-orchestration?pivots=text"}},
  {"id": 70, "topic": "agentic", "type": "mc_single", "question": "Magentic orchestration in the Microsoft Agent Framework uses a dedicated Magentic manager that maintains a **dynamic task ledger**. What does this ledger record?", "options": [{"id": "A", "text": "Azure resource costs and quota consumption for each agent invocation"}, {"id": "B", "text": "Goals, subgoals, and execution plans that are built and refined as the workflow progresses"}, {"id": "C", "text": "Token counts and model latency metrics for performance benchmarking"}, {"id": "D", "text": "User authentication tokens and session state for multi-turn conversations"}], "correct": ["B"], "explanation": "The Use Magentic orchestration unit explains that the Magentic manager maintains a shared context, tracks progress, and builds a dynamic task ledger that records goals, subgoals, and execution plans, which are refined as the workflow progresses. This ledger is central to the pattern's emphasis on documenting the approach as much as delivering the final solution. The other options describe operational or security concerns not mentioned in the unit's ledger description.", "source": {"path": "Develop AI Agents on Azure", "module": "Orchestrate a multi-agent solution using the Microsoft Agent Framework", "unit": "Use Magentic orchestration", "url": "https://learn.microsoft.com/en-us/training/modules/orchestrate-semantic-kernel-multi-agent-solution/8-use-magentic-orchestration?pivots=text"}},
  {"id": 71, "topic": "agentic", "type": "hotspot", "question": "Fill in the blanks about A2A agent discovery and hosting.\n\nWhen an A2A agent is hosted, it exposes its capabilities through a structured document called an **[BLANK_1]**, which is typically served at the standard endpoint `/.well-known/agent-card.json`. A client that wants to interact with the agent first retrieves this document, then initializes a connection using the agent's **[BLANK_2]** found within that document.", "blanks": [{"id": "B1", "prompt": "The structured document that describes an agent's capabilities, skills, and endpoints", "options": [{"id": "a", "text": "Agent Manifest"}, {"id": "b", "text": "Agent Card"}, {"id": "c", "text": "Agent Schema"}, {"id": "d", "text": "Service Descriptor"}], "correct": "b"}, {"id": "B2", "prompt": "The property in the document that tells the client where the A2A service can be accessed", "options": [{"id": "a", "text": "Subscription key"}, {"id": "b", "text": "Endpoint URL"}, {"id": "c", "text": "Tenant ID"}, {"id": "d", "text": "Resource group name"}], "correct": "b"}], "explanation": "The Define an A2A agent unit explains that an Agent Card is the structured document (like a digital business card) that exposes an agent's identity, capabilities, skills, and — critically — its Endpoint URL showing where the A2A service can be accessed. The Host an A2A server unit confirms it is served at the standard `/.well-known/agent-card.json` endpoint so clients can discover and connect to the agent.", "source": {"path": "Develop AI Agents on Azure", "module": "Discover Azure AI Agents with A2A", "unit": "Define an A2A agent", "url": "https://learn.microsoft.com/en-us/training/modules/discover-agents-with-a2a/2-define-a2a-agent?pivots=text"}},
  {"id": 72, "topic": "agentic", "type": "sequence", "question": "A developer is setting up an A2A agent server. Arrange the following steps in the correct implementation order.", "items": [{"id": "S1", "text": "Define the agent's skills and Agent Card"}, {"id": "S2", "text": "Initialize a request handler that links the Agent Executor with a Task Store"}, {"id": "S3", "text": "Set up the server application (e.g., Starlette) providing the Agent Card and request handler"}, {"id": "S4", "text": "Start the server using an ASGI server (e.g., Uvicorn) to listen on the network"}], "correct_order": ["S1", "S2", "S3", "S4"], "explanation": "The Host an A2A server unit provides an explicit four-step setup sequence: (1) define agent skills and Agent Card; (2) initialize a request handler linking the Agent Executor with a Task Store; (3) set up the server application with the Agent Card and request handler; (4) start the server using an ASGI server like Uvicorn. This order ensures all components are configured before the server begins accepting incoming requests.", "source": {"path": "Develop AI Agents on Azure", "module": "Discover Azure AI Agents with A2A", "unit": "Host an A2A server", "url": "https://learn.microsoft.com/en-us/training/modules/discover-agents-with-a2a/4-host-a2a-agent-server?pivots=text"}},
  {"id": 73, "topic": "agentic", "type": "mc_single", "question": "When publishing a Foundry agent to Microsoft 365 with **Organization** scope rather than **Shared** scope, what key difference applies?", "options": [{"id": "A", "text": "Organization scope publishes only to SharePoint; Shared scope publishes to all Microsoft 365 apps"}, {"id": "B", "text": "Organization scope requires admin approval and appears under 'Built by your org'; Shared scope is immediately available under 'Your agents' without admin approval"}, {"id": "C", "text": "Organization scope uses a dedicated Azure subscription; Shared scope uses the Foundry project subscription"}, {"id": "D", "text": "Organization scope supports only Teams; Shared scope supports Teams and Copilot simultaneously"}], "correct": ["B"], "explanation": "The Understand Foundry agent publishing options unit describes two distribution scopes: Shared scope makes the agent available immediately under 'Your agents' in Teams without admin approval and is best for personal testing or small team pilots; Organization scope makes the agent available to everyone in the tenant under 'Built by your org' but requires admin approval, making it suitable for production deployments. Both scopes can target Teams and Microsoft Copilot.", "source": {"path": "Develop AI Agents on Azure", "module": "Integrate your agent with Microsoft 365", "unit": "Understand Foundry agent publishing options", "url": "https://learn.microsoft.com/en-us/training/modules/integrate-foundry-agent-with-m365/2-understand-publishing-options?pivots=text"}},
  {"id": 74, "topic": "agentic", "type": "mc_single", "question": "Microsoft Work IQ connects AI agents to Microsoft 365 data and is built on which protocol that enables AI assistants to connect to external data sources and tools?", "options": [{"id": "A", "text": "OpenAPI 3.0"}, {"id": "B", "text": "Azure Service Bus"}, {"id": "C", "text": "Model Context Protocol (MCP)"}, {"id": "D", "text": "GraphQL"}], "correct": ["C"], "explanation": "The Access Microsoft 365 data with Work IQ unit explicitly states that Work IQ is built on the Model Context Protocol (MCP), an open protocol that enables AI assistants to connect to external data sources and tools. Work IQ acts as an MCP server specifically designed for Microsoft 365 data, exposing tools, resources, and prompts that agents can discover and use to access emails, meetings, documents, Teams messages, and people information.", "source": {"path": "Develop AI Agents on Azure", "module": "Integrate your agent with Microsoft 365", "unit": "Access Microsoft 365 data with Work IQ", "url": "https://learn.microsoft.com/en-us/training/modules/integrate-foundry-agent-with-m365/5-access-m365-data-workiq?pivots=text"}},
  {"id": 75, "topic": "agentic", "type": "mc_single", "question": "In Microsoft Foundry workflow patterns, which pattern explicitly pauses execution to request human input or approval before the workflow continues?", "options": [{"id": "A", "text": "Sequential"}, {"id": "B", "text": "Human-in-the-loop"}, {"id": "C", "text": "Group chat"}, {"id": "D", "text": "Parallel fan-out"}], "correct": ["B"], "explanation": "The Identify Workflow Patterns unit defines the human-in-the-loop pattern as one that introduces pauses where user input or approval is required before the workflow can continue — it explicitly asks a question, waits for a response, and then resumes. Sequential workflows follow a fixed, step-by-step path without pausing. Group chat enables dynamic multi-agent collaboration. 'Parallel fan-out' is not one of the three predefined patterns described in the unit.", "source": {"path": "Develop AI Agents on Azure", "module": "Build agent-driven workflows using Microsoft Foundry", "unit": "Identify Workflow Patterns", "url": "https://learn.microsoft.com/en-us/training/modules/build-agent-workflows-microsoft-foundry/3-identify-workflow-patterns?pivots=text"}},
  {"id": 76, "topic": "agentic", "type": "hotspot", "question": "Fill in the blanks about Power Fx usage in Microsoft Foundry agent workflows.\n\nPower Fx is an Excel-like language used in workflows to manipulate data and control flow. Formulas can reference **[BLANK_1]** variables, which store data captured or created during workflow execution for use in subsequent nodes. To iterate over a collection and apply the same formula to each item, a workflow uses a **[BLANK_2]** node powered by a Power Fx expression.", "blanks": [{"id": "B1", "prompt": "The type of Power Fx variable that stores data captured during workflow execution", "options": [{"id": "a", "text": "Global"}, {"id": "b", "text": "Local"}, {"id": "c", "text": "Static"}, {"id": "d", "text": "Persistent"}], "correct": "b"}, {"id": "B2", "prompt": "The type of workflow node used to iterate over a collection with Power Fx", "options": [{"id": "a", "text": "While-loop"}, {"id": "b", "text": "Switch-case"}, {"id": "c", "text": "For-each"}, {"id": "d", "text": "Do-until"}], "correct": "c"}], "explanation": "The Apply Power Fx in Workflows unit explains that Power Fx formulas reference two variable types: system variables (contextual workflow information) and local variables (data captured during execution used in subsequent nodes). It also states that For-each nodes use Power Fx to iterate over collections, applying the same set of actions to each item — for example, `ForAll(Local.ItemList, Upper(Name))` applies a formula to every item in a list.", "source": {"path": "Develop AI Agents on Azure", "module": "Build agent-driven workflows using Microsoft Foundry", "unit": "Apply Power Fx in Workflows", "url": "https://learn.microsoft.com/en-us/training/modules/build-agent-workflows-microsoft-foundry/6-apply-power-fx?pivots=text"}},
  {"id": 77, "topic": "agentic", "type": "sequence", "question": "An agent in the Microsoft Foundry portal receives a user message that requires a tool call. Arrange the tool-calling lifecycle steps in the correct order as described in the Foundry agent tools documentation.", "items": [{"id": "S1", "text": "User sends a message to the agent"}, {"id": "S2", "text": "Agent analyzes the request and determines which tools are needed"}, {"id": "S3", "text": "Agent invokes the appropriate tools with relevant parameters"}, {"id": "S4", "text": "Tools execute and return results to the agent"}, {"id": "S5", "text": "Agent incorporates results into a natural language response and returns it to the user"}], "correct_order": ["S1", "S2", "S3", "S4", "S5"], "explanation": "The Extend agent capabilities with tools unit describes the tool-calling lifecycle as a five-step automatic process: (1) the user sends a message; (2) the agent analyzes the request to determine which tools are needed; (3) the agent invokes the tools with relevant parameters; (4) the tools execute and return results; (5) the agent incorporates results into a natural language response. This seamless integration means developers do not need to write complex orchestration code.", "source": {"path": "Develop AI Agents on Azure", "module": "Develop AI agents with Microsoft Foundry and Visual Studio Code", "unit": "Extend agent capabilities with tools", "url": "https://learn.microsoft.com/en-us/training/modules/develop-ai-agents-azure-vs-code/7-extend-agent-capabilities?pivots=text"}},
  {"id": 78, "topic": "agentic", "type": "mc_single", "question": "A developer wants to connect a Foundry agent to an external third-party REST API that already has an OpenAPI 3.0 specification. According to the custom tool options available in Foundry Agent Service, which tool type should be used?", "options": [{"id": "A", "text": "Azure Functions tool"}, {"id": "B", "text": "Custom function (function calling) tool"}, {"id": "C", "text": "OpenAPI specification tool"}, {"id": "D", "text": "Azure Logic Apps tool"}], "correct": ["C"], "explanation": "The Options for implementing custom tools unit states that OpenAPI specification tools allow you to connect an Azure AI Agent to an external API using an OpenAPI 3.0 specification, providing standardized, automated, and scalable API integrations. Azure Functions tools are for event-driven applications with triggers and bindings. Custom function tools are for integrating custom logic in various programming languages without an existing specification. Azure Logic Apps is a low-code/no-code option for adding workflow connectors, not for directly consuming an existing OpenAPI 3.0 spec.", "source": {"path": "Develop AI Agents on Azure", "module": "Integrate custom tools into your agent", "unit": "Options for implementing custom tools", "url": "https://learn.microsoft.com/en-us/training/modules/build-agent-with-custom-tools/3-custom-tool-options?pivots=text"}},
  {"id": 79, "topic": "genai-foundry", "type": "mc_single", "question": "The Microsoft Foundry model catalog organizes models into two broad categories. Which statement correctly describes the billing distinction between these categories?", "options": [{"id": "A", "text": "Models sold directly by Azure are billed through your Azure subscription, while models from partners and the community have their own licensing and pricing."}, {"id": "B", "text": "Models sold directly by Azure are free tier, while partner models require a separate marketplace purchase per request."}, {"id": "C", "text": "Both categories are billed identically through your Azure subscription but differ only in model size."}, {"id": "D", "text": "Partner and community models are billed through your Azure subscription, while Azure-direct models require a separate OpenAI account."}], "correct": ["A"], "explanation": "The Foundry model catalog contains 'Foundry Models sold directly by Azure,' which are billed through your Azure subscription (including Azure OpenAI models and models from Microsoft and other providers), and 'Foundry Models from partners and community,' which have their own independent licensing and pricing. The distinction is not about free vs. paid tiers but about who controls billing.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Select, deploy, and evaluate Microsoft Foundry models", "unit": "Explore the model catalog", "url": "https://learn.microsoft.com/en-us/training/modules/model-catalog-evaluate/2-explore-model-catalog?pivots=text"}},
  {"id": 80, "topic": "genai-foundry", "type": "mc_single", "question": "A developer needs to filter models in the Foundry catalog that are specifically trained on medical literature. Which filter attribute should they use?", "options": [{"id": "A", "text": "Capabilities"}, {"id": "B", "text": "Inference tasks"}, {"id": "C", "text": "Industry"}, {"id": "D", "text": "Collection"}], "correct": ["C"], "explanation": "The model catalog filter attribute 'Industry' shows models trained on industry-specific datasets such as medical literature, legal documents, or specific language corpora. These specialized models often outperform general-purpose models in their respective domains. The 'Capabilities' filter covers abilities like reasoning or tool calling, and 'Inference tasks' covers tasks like text generation or summarization.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Select, deploy, and evaluate Microsoft Foundry models", "unit": "Explore the model catalog", "url": "https://learn.microsoft.com/en-us/training/modules/model-catalog-evaluate/2-explore-model-catalog?pivots=text"}},
  {"id": 81, "topic": "genai-foundry", "type": "mc_single", "question": "A team is selecting a model for a real-time customer chat application where user experience depends on fast first responses. Which benchmark metric should they prioritize?", "options": [{"id": "A", "text": "MMLU-Pro score"}, {"id": "B", "text": "Time to first token (TTFT)"}, {"id": "C", "text": "HarmBench Attack Success Rate (ASR)"}, {"id": "D", "text": "Cost per output tokens"}], "correct": ["B"], "explanation": "Time to first token (TTFT) measures how long it takes until the first token arrives when using streaming, which directly impacts perceived responsiveness in interactive applications. For real-time chat where user experience depends on responsiveness, TTFT is the key performance metric. MMLU-Pro measures general knowledge quality, ASR measures safety robustness, and cost metrics address budget concerns.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Select, deploy, and evaluate Microsoft Foundry models", "unit": "Select models using benchmarks", "url": "https://learn.microsoft.com/en-us/training/modules/model-catalog-evaluate/3-select-models-benchmarks?pivots=text"}},
  {"id": 82, "topic": "genai-foundry", "type": "mc_single", "question": "A company must deploy a model where all data must remain within the European Union data zone, and they need pay-per-token billing rather than reserved capacity. Which deployment type should they select?", "options": [{"id": "A", "text": "Global Standard"}, {"id": "B", "text": "Data Zone Standard"}, {"id": "C", "text": "Data Zone Provisioned"}, {"id": "D", "text": "Standard"}], "correct": ["B"], "explanation": "Data Zone Standard deployments ensure data stays within a specific data zone (such as EU) on a pay-per-token basis and are best for scenarios requiring EU/US data zone compliance. Global Standard uses any Azure region and doesn't guarantee data zone residency. Data Zone Provisioned provides reserved PTUs (not pay-per-token) within a data zone. Standard is for single-region residency, not a broader data zone.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Select, deploy, and evaluate Microsoft Foundry models", "unit": "Deploy models to endpoints", "url": "https://learn.microsoft.com/en-us/training/modules/model-catalog-evaluate/4-deploy-models?pivots=text"}},
  {"id": 83, "topic": "genai-foundry", "type": "mc_single", "question": "When deploying a model in the Microsoft Foundry portal, what value does a developer use in the `model` parameter of API requests to route to their specific deployment?", "options": [{"id": "A", "text": "The endpoint URL of the deployment"}, {"id": "B", "text": "The model's catalog provider name"}, {"id": "C", "text": "The deployment name assigned during configuration"}, {"id": "D", "text": "The SKU of the virtual machine hosting the deployment"}], "correct": ["C"], "explanation": "During deployment, you assign a deployment name (which defaults to the model name but can be customized). In inference code, the `model` parameter of API requests uses this deployment name to route requests to the correct deployment. The endpoint URL is a separate connection detail used to reach the service, not the routing identifier within API calls.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Select, deploy, and evaluate Microsoft Foundry models", "unit": "Deploy models to endpoints", "url": "https://learn.microsoft.com/en-us/training/modules/model-catalog-evaluate/4-deploy-models?pivots=text"}},
  {"id": 84, "topic": "genai-foundry", "type": "mc_single", "question": "A developer wants to use the Microsoft Foundry SDK to build an application that includes cloud evaluations and tracing for AI agent behavior. Which client object should they create?", "options": [{"id": "A", "text": "OpenAI client using the Azure OpenAI endpoint"}, {"id": "B", "text": "AzureOpenAI client using the Azure OpenAI endpoint"}, {"id": "C", "text": "AIProjectClient using the project endpoint"}, {"id": "D", "text": "AsyncOpenAI client using the project endpoint"}], "correct": ["C"], "explanation": "The AIProjectClient from the azure-ai-projects package connects to the project endpoint and provides Foundry-native operations including agents, cloud evaluations, tracing/observability, and project metadata. The OpenAI and AzureOpenAI clients are used for model inference tasks and do not provide Foundry-specific features like evaluations and tracing.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Develop a generative AI chat app with Microsoft Foundry", "unit": "Choose an endpoint and SDK", "url": "https://learn.microsoft.com/en-us/training/modules/foundry-sdk/03-microsoft-foundry-sdk?pivots=text"}},
  {"id": 85, "topic": "genai-foundry", "type": "mc_single", "question": "A developer migrating from the ChatCompletions API to the Responses API wants to maintain multi-turn conversation state without manually tracking history. Which Responses API feature supports this?", "options": [{"id": "A", "text": "The `instructions` parameter, which stores all prior turns"}, {"id": "B", "text": "The `previous_response_id` parameter that links responses together"}, {"id": "C", "text": "Setting `stream=True` to receive incremental context updates"}, {"id": "D", "text": "The `conversation_messages` list appended on each call"}], "correct": ["B"], "explanation": "The Responses API includes a `previous_response_id` parameter that links a new call to a prior response, maintaining conversation context across multiple API calls without the developer having to manually manage a message history list. This is one of the key advantages of the Responses API over the ChatCompletions API, which requires manual conversation tracking.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Develop a generative AI chat app with Microsoft Foundry", "unit": "Generate responses with the Responses API", "url": "https://learn.microsoft.com/en-us/training/modules/foundry-sdk/04-responses-api?pivots=text"}},
  {"id": 86, "topic": "genai-foundry", "type": "mc_single", "question": "A developer uses the ChatCompletions API to implement a multi-turn chat loop. After each model response, what must the developer do to preserve conversational context in the next turn?", "options": [{"id": "A", "text": "Pass a `previous_response_id` parameter to the next API call"}, {"id": "B", "text": "Manually append the assistant message to the conversation_messages list and include it in the next call"}, {"id": "C", "text": "Use the `stream=True` parameter so context is automatically retained"}, {"id": "D", "text": "Set `temperature=0` to ensure deterministic context retention"}], "correct": ["B"], "explanation": "Unlike the Responses API, the ChatCompletions API does not provide stateful response tracking. Developers must write code to manually track conversation history by appending both the user's message and the assistant's response to the conversation_messages list, which is then submitted in full on every subsequent API call.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Develop a generative AI chat app with Microsoft Foundry", "unit": "Generate responses with the ChatCompletions API", "url": "https://learn.microsoft.com/en-us/training/modules/foundry-sdk/05-openai-api?pivots=text"}},
  {"id": 87, "topic": "genai-foundry", "type": "mc_single", "question": "A model is asked to calculate the factorial of 52. Rather than relying on its training data approximation, it needs to compute the exact value. Which tool should be specified in the Responses API call?", "options": [{"id": "A", "text": "web_search"}, {"id": "B", "text": "file_search"}, {"id": "C", "text": "function"}, {"id": "D", "text": "code_interpreter"}], "correct": ["D"], "explanation": "The code_interpreter tool provides the model with a sandboxed Python runtime in which it can generate and run Python code dynamically. This is ideal for exact mathematical computations. The web_search tool retrieves current internet information, file_search searches indexed document collections, and the function tool calls developer-defined application functions.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Develop generative AI apps that use tools", "unit": "Use the code_interpreter tool", "url": "https://learn.microsoft.com/en-us/training/modules/use-generative-ai-tools/03-code-interpreter?pivots=text"}},
  {"id": 88, "topic": "genai-foundry", "type": "mc_single", "question": "A generative AI app needs to answer employee questions about internal HR policies stored in PDF files. The company wants a simple grounding solution without setting up Azure AI Search. Which tool is the best fit?", "options": [{"id": "A", "text": "web_search"}, {"id": "B", "text": "file_search"}, {"id": "C", "text": "code_interpreter"}, {"id": "D", "text": "function"}], "correct": ["B"], "explanation": "The file_search tool allows the model to search uploaded documents stored in a vector store and provide grounded answers from private or domain-specific files such as HR policy PDFs. It uses semantic retrieval over indexed document chunks. web_search accesses public internet data, code_interpreter runs Python code, and function calls developer-defined application logic.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Develop generative AI apps that use tools", "unit": "Use the file_search tool", "url": "https://learn.microsoft.com/en-us/training/modules/use-generative-ai-tools/05-file-search?pivots=text"}},
  {"id": 89, "topic": "genai-foundry", "type": "mc_single", "question": "An application uses the function tool and calls `responses.create()` with a `get_inventory()` function definition. After the model returns a function call in its output, what must the application do before the model can generate a final grounded answer?", "options": [{"id": "A", "text": "Re-submit the original prompt with a higher temperature setting"}, {"id": "B", "text": "Execute the function in application code and return the output as a `function_call_output` message in a follow-up call"}, {"id": "C", "text": "Append the function definition JSON to the conversation history and retry"}, {"id": "D", "text": "Pass the function call object directly as the `previous_response_id` parameter"}], "correct": ["B"], "explanation": "The function tool pattern requires the application—not the model—to execute the function. When the model returns a function_call in its output, the developer runs the corresponding function in their application code, then submits the result back as a `function_call_output` item in a new Responses API call. The model then uses that result to complete its response.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Develop generative AI apps that use tools", "unit": "Use the function tool", "url": "https://learn.microsoft.com/en-us/training/modules/use-generative-ai-tools/06-function?pivots=text"}},
  {"id": 90, "topic": "genai-foundry", "type": "mc_single", "question": "A team is building a RAG solution using Azure AI Search. They want the best retrieval accuracy for their generative AI application. Which search technique does Microsoft recommend for generative AI applications?", "options": [{"id": "A", "text": "Keyword search only"}, {"id": "B", "text": "Semantic search only"}, {"id": "C", "text": "Vector search only"}, {"id": "D", "text": "Hybrid search combining keyword, semantic, and vector search"}], "correct": ["D"], "explanation": "Azure AI Search supports keyword, semantic, vector, and hybrid search techniques. The unit explicitly states that hybrid search—which combines keyword, semantic, and vector approaches—is recommended for generative AI applications because it provides the most accurate results by leveraging the strengths of each technique.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Optimize generative AI model performance with Microsoft Foundry", "unit": "Ground your model with Retrieval Augmented Generation", "url": "https://learn.microsoft.com/en-us/training/modules/optimize-generative-ai-model-performance/3-retrieval-augmented-generation?pivots=text"}},
  {"id": 91, "topic": "genai-foundry", "type": "mc_single", "question": "A travel agency wants every AI response to use a specific brand voice with short paragraphs, and detailed system messages with few-shot examples are not producing consistent enough results. Which optimization strategy best addresses this need?", "options": [{"id": "A", "text": "Increase the temperature parameter to improve output diversity"}, {"id": "B", "text": "Add more documents to the Azure AI Search index"}, {"id": "C", "text": "Fine-tune the model on examples that demonstrate the desired brand voice"}, {"id": "D", "text": "Switch from the Responses API to the ChatCompletions API"}], "correct": ["C"], "explanation": "Fine-tuning is the appropriate strategy when prompt engineering alone fails to produce consistent style, tone, or format. By training the model on labeled examples that demonstrate the desired brand voice and formatting, the patterns become embedded in the model's weights, producing reliable behavior across all interactions. This is one of the key use cases for fine-tuning described in the module.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Optimize generative AI model performance with Microsoft Foundry", "unit": "Fine-tune a model for consistent behavior", "url": "https://learn.microsoft.com/en-us/training/modules/optimize-generative-ai-model-performance/4-fine-tune-model?pivots=text"}},
  {"id": 92, "topic": "genai-foundry", "type": "mc_single", "question": "During model evaluation in Microsoft Foundry portal, which metric measures whether a model's responses are based on provided context rather than speculation, with a binary (grounded/not grounded) assessment option?", "options": [{"id": "A", "text": "Fluency"}, {"id": "B", "text": "Groundedness"}, {"id": "C", "text": "ROUGE"}, {"id": "D", "text": "Coherence"}], "correct": ["B"], "explanation": "Groundedness is a generation quality metric that evaluates whether responses are based on provided context rather than speculation. Groundedness Pro offers a binary assessment (grounded or not grounded) useful for factual accuracy requirements. Fluency evaluates linguistic quality, coherence assesses logical flow, and ROUGE is an NLP metric focused on recall for summarization tasks.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Select, deploy, and evaluate Microsoft Foundry models", "unit": "Evaluate model performance", "url": "https://learn.microsoft.com/en-us/training/modules/model-catalog-evaluate/5-evaluate-performance?pivots=text"}},
  {"id": 93, "topic": "genai-foundry", "type": "mc_multi", "question": "A developer is choosing between the Foundry SDK (AIProjectClient) and the OpenAI SDK for a new application. According to Microsoft Foundry guidance, which TWO scenarios should lead the developer to choose the Foundry SDK over the OpenAI SDK?", "options": [{"id": "A", "text": "The application needs to use the ChatCompletions API for maximum cross-platform compatibility"}, {"id": "B", "text": "The application needs to build and manage AI agents using the Foundry Agent Service"}, {"id": "C", "text": "The application requires cloud evaluations to validate AI response quality"}, {"id": "D", "text": "The developer wants to port existing OpenAI Python code with minimal changes"}], "correct": ["B", "C"], "explanation": "Microsoft recommends the Foundry SDK (AIProjectClient) when building apps that need Foundry-specific capabilities such as the Foundry Agent Service for building and managing AI agents, and cloud evaluations for testing and validating AI responses. Maximum cross-platform compatibility and minimal code changes for existing OpenAI code are reasons to use the OpenAI SDK instead.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Develop a generative AI chat app with Microsoft Foundry", "unit": "Choose an endpoint and SDK", "url": "https://learn.microsoft.com/en-us/training/modules/foundry-sdk/03-microsoft-foundry-sdk?pivots=text"}},
  {"id": 94, "topic": "genai-foundry", "type": "sequence", "question": "Arrange the correct order of steps in the RAG (Retrieval Augmented Generation) pattern when a user submits a question to a grounded generative AI application.", "items": [{"id": "S1", "text": "Convert the user question into an embedding and search the index for semantically relevant content"}, {"id": "S2", "text": "Add the retrieved document passages to the prompt as context"}, {"id": "S3", "text": "User submits a question to the application"}, {"id": "S4", "text": "Send the augmented prompt to the language model"}, {"id": "S5", "text": "Model generates a response grounded in the retrieved context"}], "correct_order": ["S3", "S1", "S2", "S4", "S5"], "explanation": "The RAG pattern follows these steps: (1) user submits a question, (2) the question is converted to an embedding and used to search the index (Retrieve), (3) retrieved passages are injected into the prompt (Augment), (4) the augmented prompt is sent to the model, and (5) the model generates a grounded response (Generate). This is the three-step retrieve-augment-generate pattern described in the unit.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Optimize generative AI model performance with Microsoft Foundry", "unit": "Ground your model with Retrieval Augmented Generation", "url": "https://learn.microsoft.com/en-us/training/modules/optimize-generative-ai-model-performance/3-retrieval-augmented-generation?pivots=text"}},
  {"id": 95, "topic": "genai-foundry", "type": "sequence", "question": "A developer is using the function tool with the Responses API. Arrange the steps of the function tool interaction pattern in the correct order.", "items": [{"id": "S1", "text": "Application runs the matching function in its own code"}, {"id": "S2", "text": "Developer provides function definitions in the tools array of the API call"}, {"id": "S3", "text": "Model incorporates the function output into the final response"}, {"id": "S4", "text": "Model emits a function_call item indicating it needs the function to run"}, {"id": "S5", "text": "Application returns the function result as a function_call_output in a follow-up API call"}], "correct_order": ["S2", "S4", "S1", "S5", "S3"], "explanation": "The function tool workflow is: (1) developer defines tools in the tools array, (2) model evaluates the prompt and emits a function_call, (3) application executes the function, (4) application submits the result as a function_call_output, (5) model generates the final grounded answer using that output. The model never runs application code directly—it only requests that the application do so.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Develop generative AI apps that use tools", "unit": "Use the function tool", "url": "https://learn.microsoft.com/en-us/training/modules/use-generative-ai-tools/06-function?pivots=text"}},
  {"id": 96, "topic": "genai-foundry", "type": "sequence", "question": "A team is deciding which optimization strategy to apply to a generative AI model. Arrange the recommended decision framework steps in the correct order.", "items": [{"id": "S1", "text": "Add fine-tuning if the model still doesn't maintain consistent style and tone"}, {"id": "S2", "text": "Start with prompt engineering: test system messages, few-shot examples, and parameter tuning"}, {"id": "S3", "text": "Add RAG if the model needs access to specific, current, or private data"}, {"id": "S4", "text": "Combine strategies as needed for the application's specific requirements"}], "correct_order": ["S2", "S3", "S1", "S4"], "explanation": "The unit describes a specific incremental decision framework: (1) start with prompt engineering as the foundation, (2) add RAG if factual accuracy with domain-specific data is needed, (3) add fine-tuning if behavioral consistency remains insufficient, and (4) combine all strategies as needed. This order avoids unnecessary cost and complexity while building up to the optimization level required.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Optimize generative AI model performance with Microsoft Foundry", "unit": "Compare and combine optimization strategies", "url": "https://learn.microsoft.com/en-us/training/modules/optimize-generative-ai-model-performance/5-compare-combine-strategies?pivots=text"}},
  {"id": 97, "topic": "genai-foundry", "type": "sequence", "question": "Arrange the typical workflow for building a generative AI application using the Microsoft Foundry portal in the correct order.", "items": [{"id": "S1", "text": "Customize and iterate on the generated code in your development environment"}, {"id": "S2", "text": "Explore prompts and settings in the Model playground"}, {"id": "S3", "text": "Use the Code tab in the playground to generate SDK code samples"}, {"id": "S4", "text": "Return to the playground to test new ideas and update the application"}], "correct_order": ["S2", "S3", "S1", "S4"], "explanation": "The Foundry portal workflow described in the unit is: (1) explore in the playground to test prompts, adjust settings, and find what works; (2) generate code samples using the Code tab which pre-populates endpoint, model name, and current settings; (3) take the generated code and customize it for specific needs; (4) iterate by returning to the playground to test new ideas, then updating code accordingly.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Develop a generative AI chat app with Microsoft Foundry", "unit": "Explore with the model playground", "url": "https://learn.microsoft.com/en-us/training/modules/foundry-sdk/02-chat-playground?pivots=text"}},
  {"id": 98, "topic": "genai-foundry", "type": "hotspot", "question": "Complete the following statements about optimization strategies in Microsoft Foundry by selecting the correct option for each blank.\n\nWhen the primary goal is to improve **factual accuracy** by connecting the model to up-to-date, domain-specific data, you should use [BLANK_1]. When the model already has good factual knowledge but inconsistently follows a specific output format despite detailed prompts, you should use [BLANK_2]. Both strategies rely on [BLANK_3] as their underlying foundation for guiding model behavior.", "blanks": [{"id": "B1", "prompt": "BLANK_1: The strategy for improving factual accuracy with domain-specific data", "options": [{"id": "a", "text": "RAG (Retrieval Augmented Generation)"}, {"id": "b", "text": "Fine-tuning"}, {"id": "c", "text": "Model distillation"}], "correct": "a"}, {"id": "B2", "prompt": "BLANK_2: The strategy for enforcing consistent output format", "options": [{"id": "a", "text": "RAG (Retrieval Augmented Generation)"}, {"id": "b", "text": "Fine-tuning"}, {"id": "c", "text": "Embedding generation"}], "correct": "b"}, {"id": "B3", "prompt": "BLANK_3: The foundational strategy that supports both RAG and fine-tuning", "options": [{"id": "a", "text": "Prompt engineering"}, {"id": "b", "text": "Vector search indexing"}, {"id": "c", "text": "Content filtering"}], "correct": "a"}], "explanation": "The compare-and-combine unit frames the optimization spectrum as follows: RAG 'optimizes for context' by retrieving factual, domain-specific data to ground responses; fine-tuning 'optimizes the model' by embedding consistent behavioral patterns into model weights; and prompt engineering is the foundation that supports both directions—used to instruct how the model behaves while RAG or fine-tuning are layered on top when prompting alone is insufficient.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Optimize generative AI model performance with Microsoft Foundry", "unit": "Compare and combine optimization strategies", "url": "https://learn.microsoft.com/en-us/training/modules/optimize-generative-ai-model-performance/5-compare-combine-strategies?pivots=text"}},
  {"id": 99, "topic": "genai-foundry", "type": "hotspot", "question": "A developer configures a fine-tuning job in Microsoft Foundry. Match each scenario to the correct fine-tuning technique.\n\nScenario A: You have a curated dataset of ideal prompt-and-response pairs showing the exact tone and format you want. You use [BLANK_1].\n\nScenario B: You want to align the model to human judgment by providing pairs of preferred and non-preferred responses, with lower computational cost than traditional RL. You use [BLANK_2].", "blanks": [{"id": "B1", "prompt": "BLANK_1: Fine-tuning technique using labeled prompt-response pairs", "options": [{"id": "a", "text": "Supervised fine-tuning (SFT)"}, {"id": "b", "text": "Reinforcement fine-tuning (RFT)"}, {"id": "c", "text": "Direct Preference Optimization (DPO)"}], "correct": "a"}, {"id": "B2", "prompt": "BLANK_2: Fine-tuning technique using preferred/non-preferred response pairs", "options": [{"id": "a", "text": "Supervised fine-tuning (SFT)"}, {"id": "b", "text": "Reinforcement fine-tuning (RFT)"}, {"id": "c", "text": "Direct Preference Optimization (DPO)"}], "correct": "c"}], "explanation": "Microsoft Foundry offers three fine-tuning techniques: Supervised fine-tuning (SFT) trains on labeled prompt-response pairs and works best when there are clear, well-defined expected outputs. Direct Preference Optimization (DPO) aligns the model based on human preferences via preferred/non-preferred response pairs and is computationally lighter than traditional reinforcement learning. Reinforcement fine-tuning (RFT) uses a grader to reward better responses iteratively and suits complex tasks with many possible solutions.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Optimize generative AI model performance with Microsoft Foundry", "unit": "Fine-tune a model for consistent behavior", "url": "https://learn.microsoft.com/en-us/training/modules/optimize-generative-ai-model-performance/4-fine-tune-model?pivots=text"}},
  {"id": 100, "topic": "genai-foundry", "type": "hotspot", "question": "Complete the following statements about benchmarks in the Microsoft Foundry model leaderboard.\n\nThe [BLANK_1] benchmark measures how well a model resists generating unsafe content, where a **lower** value indicates a safer model. The [BLANK_2] benchmark is used to evaluate code generation tasks as part of quality assessment. The [BLANK_3] metric provides a high-level quality overview by averaging accuracy scores across multiple benchmark datasets.", "blanks": [{"id": "B1", "prompt": "BLANK_1: Safety benchmark measuring resistance to unsafe content (lower is safer)", "options": [{"id": "a", "text": "HarmBench (Attack Success Rate)"}, {"id": "b", "text": "ToxiGen (F1 score)"}, {"id": "c", "text": "WMDP (Weapons of Mass Destruction Proxy)"}], "correct": "a"}, {"id": "B2", "prompt": "BLANK_2: Quality benchmark used to evaluate code generation tasks", "options": [{"id": "a", "text": "GPQA"}, {"id": "b", "text": "HumanEval+"}, {"id": "c", "text": "Arena-Hard"}], "correct": "b"}, {"id": "B3", "prompt": "BLANK_3: High-level metric averaging accuracy across multiple benchmark datasets", "options": [{"id": "a", "text": "Latency P95"}, {"id": "b", "text": "Quality index"}, {"id": "c", "text": "Generated tokens per second (GTPS)"}], "correct": "b"}], "explanation": "In Microsoft Foundry benchmarks: HarmBench calculates the Attack Success Rate (ASR) where lower values indicate safer models that better resist generating unsafe content. HumanEval+ (along with MBPP+) is used to assess code generation quality as part of the quality benchmark suite. The Quality index provides a high-level overview by averaging accuracy scores across multiple benchmark datasets covering reasoning, knowledge, math, and coding.", "source": {"path": "Develop generative AI apps on Microsoft Foundry", "module": "Select, deploy, and evaluate Microsoft Foundry models", "unit": "Select models using benchmarks", "url": "https://learn.microsoft.com/en-us/training/modules/model-catalog-evaluate/3-select-models-benchmarks?pivots=text"}},
  {"id": 101, "topic": "computer-vision", "type": "mc_single", "question": "Which Azure AI Video Indexer capability requires Limited Access approval before it can be used?", "options": [{"id": "A", "text": "Speech transcription"}, {"id": "B", "text": "Facial recognition"}, {"id": "C", "text": "Scene segmentation"}, {"id": "D", "text": "Sentiment analysis"}], "correct": ["B"], "explanation": "The Azure Video Indexer documentation states that facial recognition requires Limited Access approval, adhering to Microsoft's Responsible AI standard. Other capabilities such as speech transcription, scene segmentation, and sentiment analysis do not require this additional approval.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Analyze video", "unit": "Understand Azure Video Indexer capabilities", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-video/2-understand-video-indexer-capabilities?pivots=text"}},
  {"id": 102, "topic": "computer-vision", "type": "mc_single", "question": "A developer wants to detect adult or violent themes automatically in uploaded videos. Which Azure Video Indexer capability should they rely on?", "options": [{"id": "A", "text": "Labels"}, {"id": "B", "text": "Sentiment analysis"}, {"id": "C", "text": "Content moderation"}, {"id": "D", "text": "Scene segmentation"}], "correct": ["C"], "explanation": "According to the Understand Azure Video Indexer capabilities unit, content moderation is the feature specifically designed for detection of adult or violent themes in the video. Labels identify objects or themes, sentiment measures positive/negative tone, and scene segmentation breaks video into scenes.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Analyze video", "unit": "Understand Azure Video Indexer capabilities", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-video/2-understand-video-indexer-capabilities?pivots=text"}},
  {"id": 103, "topic": "computer-vision", "type": "mc_multi", "question": "A media company wants to extend the default recognition capabilities of Azure Video Indexer to handle domain-specific terminology and internal brand names. Which two custom models should they create? (Choose two.)", "options": [{"id": "A", "text": "A custom People model"}, {"id": "B", "text": "A custom Language model"}, {"id": "C", "text": "A custom Brands model"}, {"id": "D", "text": "A custom Animation model"}], "correct": ["B", "C"], "explanation": "The Extract custom insights unit explains that a custom Language model can be trained to detect and transcribe organization-specific terminology not in common usage, and a custom Brands model recognizes specific names as brands such as products, projects, or companies. A People model is for face recognition, and Animation model is not one of the three custom model types listed.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Analyze video", "unit": "Extract custom insights", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-video/3-extract-custom-insights?pivots=text"}},
  {"id": 104, "topic": "computer-vision", "type": "sequence", "question": "What is the correct order of steps to create and use a custom Language model in Azure Video Indexer via the web portal?", "items": [{"id": "S1", "text": "Select the Language tab under Content model customization"}, {"id": "S2", "text": "Add a model and give it a name"}, {"id": "S3", "text": "Upload text files containing domain-specific vocabulary"}, {"id": "S4", "text": "Select the green Train option"}, {"id": "S5", "text": "Select the new language model when uploading or re-indexing a video"}], "correct_order": ["S1", "S2", "S3", "S4", "S5"], "explanation": "The Customize a Language model how-to article describes this exact sequence: navigate to Content model customization, choose the Language tab, add a named model, upload text files, click Train, and then apply the model to videos. Training must happen after files are uploaded and before the model can be applied to new videos.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Azure AI Video Indexer documentation", "unit": "Customize a Language model in Azure AI Video Indexer", "url": "https://learn.microsoft.com/en-us/azure/azure-video-indexer/customize-language-model-how-to"}},
  {"id": 105, "topic": "computer-vision", "type": "mc_single", "question": "You want to embed Video Indexer player and insights panels inside your company's intranet portal without granting employees access to the full Video Indexer account. Which approach should you use?", "options": [{"id": "A", "text": "Grant each employee a Viewer role on the Video Indexer account"}, {"id": "B", "text": "Embed Azure Video Indexer widgets in a custom HTML page"}, {"id": "C", "text": "Export video insights to JSON and host them separately"}, {"id": "D", "text": "Use ARM templates to provision a separate Video Indexer account for the intranet"}], "correct": ["B"], "explanation": "The Use Video Analyzer widgets and APIs unit states that the widgets used in the Azure Video Indexer portal can be embedded in custom HTML interfaces, enabling you to share insights from specific videos without giving users full access to your Video Indexer account. The REST API approach requires account-level access tokens rather than scoped embeds.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Analyze video", "unit": "Use Video Analyzer widgets and APIs", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-video/4-use-video-indexer-widgets-apis?pivots=text"}},
  {"id": 106, "topic": "computer-vision", "type": "mc_single", "question": "Which Video Indexer REST API call pattern is used to obtain an access token before calling other API operations?", "options": [{"id": "A", "text": "GET https://api.videoindexer.ai/<location>/Accounts/<accountId>/Videos"}, {"id": "B", "text": "POST https://api.videoindexer.ai/<location>/Accounts/<accountId>/Videos"}, {"id": "C", "text": "GET https://api.videoindexer.ai/Auth/<location>/Accounts/<accountId>/AccessToken"}, {"id": "D", "text": "POST https://management.azure.com/subscriptions/<sub>/providers/Microsoft.VideoIndexer/accounts"}], "correct": ["C"], "explanation": "According to the Use Video Analyzer widgets and APIs unit, the access token is retrieved via a GET call to `https://api.videoindexer.ai/Auth/<location>/Accounts/<accountId>/AccessToken`. This token is then used as a query parameter on subsequent REST API calls.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Analyze video", "unit": "Use Video Analyzer widgets and APIs", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-video/4-use-video-indexer-widgets-apis?pivots=text"}},
  {"id": 107, "topic": "computer-vision", "type": "hotspot", "question": "Complete the following statements about Azure AI Video Indexer account types by selecting the correct option for each blank.\n\n**Blank 1**: A __________ account provides up to 2,400 minutes of free indexing and does not require an Azure subscription.\n\n**Blank 2**: Classic accounts were retired on __________.", "blanks": [{"id": "B1", "prompt": "Account type that provides 2,400 free minutes without an Azure subscription", "options": [{"id": "a", "text": "Trial"}, {"id": "b", "text": "ARM-based paid"}, {"id": "c", "text": "Classic"}, {"id": "d", "text": "Enterprise"}], "correct": "a"}, {"id": "B2", "prompt": "Date when classic accounts were retired", "options": [{"id": "a", "text": "June 30, 2023"}, {"id": "b", "text": "December 31, 2023"}, {"id": "c", "text": "June 30, 2024"}, {"id": "d", "text": "January 1, 2025"}], "correct": "c"}], "explanation": "The Azure AI Video Indexer accounts overview page states that the trial account provides up to 2,400 minutes of free indexing without requiring an Azure subscription, and that classic accounts were retired on June 30, 2024. ARM-based paid accounts are the current production account type.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Azure AI Video Indexer documentation", "unit": "Azure AI Video Indexer accounts", "url": "https://learn.microsoft.com/en-us/azure/azure-video-indexer/accounts-overview"}},
  {"id": 108, "topic": "computer-vision", "type": "mc_single", "question": "Which feature of paid (ARM-based) Azure Video Indexer accounts is NOT available on trial accounts?", "options": [{"id": "A", "text": "Video upload via the Video Indexer website"}, {"id": "B", "text": "Role Based Access Control (RBAC) user management"}, {"id": "C", "text": "Speech transcription"}, {"id": "D", "text": "Access to the Video Indexer REST API"}], "correct": ["B"], "explanation": "According to the accounts overview page, ARM-based paid accounts give access to security and management capabilities such as Role Based Access Control (RBAC) user management and Azure Monitor integration. Both trial and paid accounts support video upload, speech transcription, and REST API access.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Azure AI Video Indexer documentation", "unit": "Azure AI Video Indexer accounts", "url": "https://learn.microsoft.com/en-us/azure/azure-video-indexer/accounts-overview"}},
  {"id": 109, "topic": "computer-vision", "type": "mc_single", "question": "A developer is building a client application that uses the Azure AI Vision service to analyze images. When the client app authenticates using key-based authentication, where is the authorization key found?", "options": [{"id": "A", "text": "In the Azure Active Directory token endpoint"}, {"id": "B", "text": "In the Azure portal or Microsoft Foundry portal for the resource"}, {"id": "C", "text": "In the ARM template output variables"}, {"id": "D", "text": "In the Azure AI Vision SDK configuration file"}], "correct": ["B"], "explanation": "The Provision an Azure Vision resource unit states that the authorization key (used in key-based authentication) can be found and managed in the Azure portal, or if working in a Microsoft Foundry project, in the Microsoft Foundry portal. The endpoint URL follows the pattern `https://<resource_name>.cognitiveservices.azure.com/`.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Analyze images", "unit": "Provision an Azure Vision resource", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-images/2-provision-computer-vision-resource?pivots=text"}},
  {"id": 110, "topic": "computer-vision", "type": "mc_single", "question": "A user attempts to upload a video to Azure Video Indexer using a YouTube URL, but the upload fails. What is the reason?", "options": [{"id": "A", "text": "YouTube URLs are encrypted and cannot be decoded by Video Indexer"}, {"id": "B", "text": "URLs from streaming services such as YouTube are not supported"}, {"id": "C", "text": "The file must be under 2 GB and YouTube videos often exceed this limit"}, {"id": "D", "text": "Only SAS URLs from Azure Blob Storage are supported for URL uploads"}], "correct": ["B"], "explanation": "The upload and index media documentation explicitly states: 'You cannot use URLs from streaming services such as YouTube.' Valid URL inputs include a publicly accessible direct-access URL or a SAS URL from Azure Storage. The 2 GB limit applies to file uploads, not this restriction, and the constraint is specifically about streaming services.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Azure AI Video Indexer documentation", "unit": "Upload and index media with Azure AI Video Indexer", "url": "https://learn.microsoft.com/en-us/azure/azure-video-indexer/upload-index-media"}},
  {"id": 111, "topic": "computer-vision", "type": "sequence", "question": "What is the correct sequence of steps for using the Azure Vision Python SDK to extract text from an image using the Read OCR feature?", "items": [{"id": "S1", "text": "Install the azure-ai-vision-imageanalysis package"}, {"id": "S2", "text": "Instantiate an ImageAnalysisClient with the resource endpoint and key"}, {"id": "S3", "text": "Call analyze() with the image data and VisualFeatures.READ specified"}, {"id": "S4", "text": "Iterate over blocks, lines, and words in the readResult to extract text"}], "correct_order": ["S1", "S2", "S3", "S4"], "explanation": "The Read text with Azure Vision Image Analysis unit shows this exact pattern: install the SDK package, create an ImageAnalysisClient with endpoint and credential, call analyze() specifying VisualFeatures.READ (and optionally a language), and then process the response which is structured as blocks > lines > words.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Read text in images", "unit": "Read text with Azure Vision Image Analysis", "url": "https://learn.microsoft.com/en-us/training/modules/read-text-images-documents-with-computer-vision-service/4-use-read-api?pivots=text"}},
  {"id": 112, "topic": "computer-vision", "type": "mc_single", "question": "When using the Azure AI Face service Detect method, which Python client class should you instantiate to connect to the endpoint?", "options": [{"id": "A", "text": "ImageAnalysisClient"}, {"id": "B", "text": "ComputerVisionClient"}, {"id": "C", "text": "FaceClient"}, {"id": "D", "text": "CognitiveServicesCredentials"}], "correct": ["C"], "explanation": "The Detect and analyze faces unit shows that the Face service Python SDK uses a `FaceClient` object instantiated with the endpoint and an `AzureKeyCredential`. The `ImageAnalysisClient` is for Azure Vision image analysis, and `ComputerVisionClient` is from the older SDK not described in this unit.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Detect, analyze, and recognize faces", "unit": "Detect and analyze faces", "url": "https://learn.microsoft.com/en-us/training/modules/detect-analyze-recognize-faces/3-detect-analyze-faces?pivots=text"}},
  {"id": 113, "topic": "computer-vision", "type": "hotspot", "question": "Complete the following statements about Azure AI Video Indexer deployment and audio capabilities.\n\n**Blank 1**: Azure AI Video Indexer enabled by Azure __________ runs video analysis on edge devices and is suited for industries with strict data residency requirements.\n\n**Blank 2**: The cloud-based Video Indexer speaker enumeration model can detect up to __________ speakers in a single audio file.", "blanks": [{"id": "B1", "prompt": "Azure service that enables edge deployment of Video Indexer", "options": [{"id": "a", "text": "Arc"}, {"id": "b", "text": "Stack"}, {"id": "c", "text": "IoT Hub"}, {"id": "d", "text": "Kubernetes Service"}], "correct": "a"}, {"id": "B2", "prompt": "Maximum number of speakers detected in a single audio file", "options": [{"id": "a", "text": "8"}, {"id": "b", "text": "16"}, {"id": "c", "text": "32"}, {"id": "d", "text": "64"}], "correct": "b"}], "explanation": "The Video Indexer overview states that Video Indexer enabled by Azure Arc runs on edge devices via Arc-enabled Kubernetes clusters and is particularly suited for industries with strict data residency requirements. The speaker enumeration audio model can detect up to 16 speakers in a single audio file.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Azure AI Video Indexer documentation", "unit": "What is Azure AI Video Indexer?", "url": "https://learn.microsoft.com/en-us/azure/azure-video-indexer/video-indexer-overview"}},
  {"id": 114, "topic": "computer-vision", "type": "mc_single", "question": "When analyzing an image with the Azure Vision Python SDK and you want the response to include a bounding box for each detected person, which VisualFeatures enumeration value should you specify?", "options": [{"id": "A", "text": "VisualFeatures.OBJECTS"}, {"id": "B", "text": "VisualFeatures.PEOPLE"}, {"id": "C", "text": "VisualFeatures.CAPTION"}, {"id": "D", "text": "VisualFeatures.DENSE_CAPTIONS"}], "correct": ["B"], "explanation": "According to the Analyze an image unit, VisualFeatures.PEOPLE returns the bounding box for detected people, while VisualFeatures.OBJECTS returns bounding boxes for general detected objects. CAPTION generates a single natural language caption and DENSE_CAPTIONS generates more detailed captions for detected objects.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Analyze images", "unit": "Analyze an image", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-images/3-analyze-image?pivots=text"}},
  {"id": 115, "topic": "computer-vision", "type": "hotspot", "question": "Complete the following statements about image requirements for Azure Vision image analysis.\n\n**Blank 1**: The maximum file size accepted for image analysis is __________ MB.\n\n**Blank 2**: Images must be in JPEG, PNG, GIF, or __________ format.", "blanks": [{"id": "B1", "prompt": "Maximum file size in MB", "options": [{"id": "a", "text": "2"}, {"id": "b", "text": "4"}, {"id": "c", "text": "8"}, {"id": "d", "text": "16"}], "correct": "b"}, {"id": "B2", "prompt": "Fourth supported image format alongside JPEG, PNG, and GIF", "options": [{"id": "a", "text": "TIFF"}, {"id": "b", "text": "WEBP"}, {"id": "c", "text": "BMP"}, {"id": "d", "text": "SVG"}], "correct": "c"}], "explanation": "The Analyze an image unit specifies that the file size must be less than 4 megabytes (MB) and the image must be in JPEG, PNG, GIF, or BMP format. Images must also be greater than 50 x 50 pixels in dimensions.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Analyze images", "unit": "Analyze an image", "url": "https://learn.microsoft.com/en-us/training/modules/analyze-images/3-analyze-image?pivots=text"}},
  {"id": 116, "topic": "computer-vision", "type": "mc_single", "question": "When using the Azure Vision Read API (VisualFeatures.READ), how is the OCR response text organized in the returned JSON?", "options": [{"id": "A", "text": "Paragraphs > sentences > tokens"}, {"id": "B", "text": "Pages > columns > rows"}, {"id": "C", "text": "Blocks > lines > words"}, {"id": "D", "text": "Sections > paragraphs > words"}], "correct": ["C"], "explanation": "The Read text with Azure Vision Image Analysis unit specifies that OCR results are broken down into blocks (with the current service using one block), then lines, then words. Text values are included at both the line and word levels, allowing developers to read entire lines or extract individual words.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Read text in images", "unit": "Read text with Azure Vision Image Analysis", "url": "https://learn.microsoft.com/en-us/training/modules/read-text-images-documents-with-computer-vision-service/4-use-read-api?pivots=text"}},
  {"id": 117, "topic": "computer-vision", "type": "sequence", "question": "A developer needs to choose the right Azure AI service for reading text. Arrange these use-case descriptions in order from most suited for Azure Vision to most suited for Azure Document Intelligence.", "items": [{"id": "S1", "text": "Reading text from street signs and store names in photographs"}, {"id": "S2", "text": "Cataloging and analyzing large volumes of scanned image-based content (Digital Asset Management)"}, {"id": "S3", "text": "Extracting key-value pairs and tables from invoices and receipts"}, {"id": "S4", "text": "Using prebuilt models for common structured document types like W-2 forms"}], "correct_order": ["S1", "S2", "S3", "S4"], "explanation": "The Explore Azure AI options for reading text unit describes Azure Vision as best for photographs containing text (street signs, store names) and Digital Asset Management scenarios, while Azure Document Intelligence is specifically designed for extracting structured data, key-value pairs, and tables from forms, invoices, and receipts, especially with prebuilt models.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Read text in images", "unit": "Explore Azure AI options for reading text", "url": "https://learn.microsoft.com/en-us/training/modules/read-text-images-documents-with-computer-vision-service/2-options-read-text?pivots=text"}},
  {"id": 118, "topic": "computer-vision", "type": "mc_single", "question": "Which responsible AI consideration is specifically highlighted in the face-based solutions unit because facial data is personally identifiable?", "options": [{"id": "A", "text": "Reliability and safety"}, {"id": "B", "text": "Data privacy and security"}, {"id": "C", "text": "Inclusiveness"}, {"id": "D", "text": "Accountability"}], "correct": ["B"], "explanation": "The Responsible AI considerations for face-based solutions unit explicitly identifies data privacy and security as a key consideration because facial data is personally identifiable and should be considered sensitive and private, requiring adequate protection for model training and inferencing data.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Detect, analyze, and recognize faces", "unit": "Responsible AI considerations for face-based solutions", "url": "https://learn.microsoft.com/en-us/training/modules/detect-analyze-recognize-faces/5-understand-considerations-for-face-analysis?pivots=text"}},
  {"id": 119, "topic": "computer-vision", "type": "mc_single", "question": "A detected face ID returned by the Azure Face service is cached for how long before it expires if not persisted to a Person Group?", "options": [{"id": "A", "text": "1 hour"}, {"id": "B", "text": "12 hours"}, {"id": "C", "text": "24 hours"}, {"id": "D", "text": "48 hours"}], "correct": ["C"], "explanation": "The Verify and identify faces unit states that a unique ID is assigned to a detected face and retained in the service resource for 24 hours. Face IDs added to a Person Group as persisted faces no longer expire after this 24-hour window.", "source": {"path": "Develop computer vision solutions in Azure", "module": "Detect, analyze, and recognize faces", "unit": "Verify and identify faces", "url": "https://learn.microsoft.com/en-us/training/modules/detect-analyze-recognize-faces/4-compare-match-detected-faces?pivots=text"}},
